edients","items":[{"t":"b","text":"2 quarts half & half","subs":[]},{"t":"b","text":"2 cups sugar","subs":[]},{"t":"b","text":"2 pints cream","subs":[]},{"t":"b","text":"3 eggs","subs":[]},{"t":"b","text":"½ teaspoon vanilla","subs":[]},{"t":"b","text":"Any fruit you like (optional, for flavor)","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Mix the Base:**","subs":[{"t":"b","text":"In a large bowl, whisk together the half & half, sugar, cream, eggs, and vanilla until the sugar dissolves and the mixture is well combined."}]},{"t":"n","text":"**Add Fruit (Optional):**","subs":[{"t":"b","text":"If you’d like to make a fruit-flavored ice cream, blend in the fruit of your choice (fresh or frozen). You can mash or puree the fruit for a smoother texture or leave it in chunks for added texture."}]},{"t":"n","text":"**Freeze:**","subs":[{"t":"b","text":"Pour the mixture into your ice cream maker. Follow the manufacturer's instructions for your ice cream maker to churn until the ice cream reaches the desired consistency."}]},{"t":"n","text":"**Serve:**","subs":[{"t":"b","text":"Once the ice cream is ready, you can serve it immediately or transfer it to an airtight container and store it in the freezer until ready to enjoy."}]}]}],"stub":false,"source":null},{"id":"honey-butter","title":"Honey Butter","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"½ cup butter, softened","subs":[]},{"t":"b","text":"1 egg yolk","subs":[]},{"t":"b","text":"1 teaspoon vanilla","subs":[]},{"t":"b","text":"½ cup honey","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Whip the softened butter until creamy.","subs":[]},{"t":"n","text":"Add the vanilla and egg yolk, and continue whipping until combined.","subs":[]},{"t":"n","text":"Gradually add the honey while whipping until smooth and fluffy.","subs":[]},{"t":"n","text":"Makes 1 cup.","subs":[]}]}],"stub":false,"source":null},{"id":"honey-candy","title":"Honey Candy","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup honey","subs":[]},{"t":"b","text":"1 cup sugar","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Cook honey and sugar together in a pan until it reaches the crack stage in cold water (or 300°F).","subs":[]},{"t":"n","text":"Pour the mixture onto a buttered surface.","subs":[]},{"t":"n","text":"Let it cool enough to handle and stretch with bare hands.","subs":[]}]}],"stub":false,"source":null},{"id":"mother-goose-popcorn","title":"Mother Goose Popcorn","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup sugar","subs":[]},{"t":"b","text":"Butter the size of an egg","subs":[]},{"t":"b","text":"3 tablespoons water","subs":[]},{"t":"b","text":"1½ teaspoons vanilla","subs":[]},{"t":"b","text":"2-3 drops of food coloring","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Place sugar, butter, water, vanilla, and food coloring together in a saucepan and bring to a boil.","subs":[]},{"t":"n","text":"Pour the mixture into a large pan.","subs":[]},{"t":"n","text":"Add 4 quarts of popped corn and stir until the popcorn is coated and sugary.","subs":[]}]}],"stub":false,"source":null},{"id":"pb-pretzel-yogurt-bark","title":"PB Pretzel Yogurt Bark","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"16 oz vanilla Greek yogurt, fat free","subs":[]},{"t":"b","text":"¼ c PB Fit powder","subs":[]},{"t":"b","text":"1 tbsp honey","subs":[]},{"t":"b","text":"2 tbsp natural peanut butter","subs":[]},{"t":"b","text":"½ c salted mini pretzels, crushed","subs":[]},{"t":"b","text":"¼ c mini chocolate chips","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Line a baking sheet with parchment paper.","subs":[]},{"t":"n","text":"In a medium mixing bowl, whisk together the Greek yogurt and PB Fit until completely combined.","subs":[]},{"t":"n","text":"Spread evenly over the parchment to about ⅛ inch thick.","subs":[]},{"t":"n","text":"Drizzle with the honey and peanut butter, then sprinkle with the pretzels and mini chocolate chips.","subs":[]},{"t":"n","text":"Freeze for 4+ hours. Once completely frozen, peel off the parchment and break the bark into pieces.","subs":[]},{"t":"n","text":"One serving is about ⅙ of the bark. Store in the freezer for up to 1 week.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"6","active":"5 min","total":"4 hrs","calories":"191","macros":"20c/7f/12p"},"sourceLabel":"Mamele Macro Meals · Nov '22"},{"id":"peach-cobbler","title":"Peach Cobbler","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 cups fresh peaches, peeled and sliced","subs":[]},{"t":"b","text":"1 cup sugar (for peaches)","subs":[]},{"t":"b","text":"1 cube butter (for pan)","subs":[]}]},{"label":"Batter","items":[{"t":"b","text":"1 cup sifted flour","subs":[]},{"t":"b","text":"1 teaspoon salt","subs":[]},{"t":"b","text":"¾ cup sugar","subs":[]},{"t":"b","text":"2 teaspoons baking powder","subs":[]},{"t":"b","text":"A pinch of nutmeg or cinnamon","subs":[]},{"t":"b","text":"¾ cup milk","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Prepare Peaches:**","subs":[{"t":"b","text":"Peel and slice 2 cups of fresh peaches. Cover them with 1 cup of sugar and set aside to let the peaches release their juice."}]},{"t":"n","text":"**Melt Butter:**","subs":[{"t":"b","text":"Melt 1 cube of butter in an 8-inch square pan. After melting, remove from heat and allow to cool slightly."}]},{"t":"n","text":"**Make the Batter:**","subs":[{"t":"b","text":"In a separate bowl, sift together the flour, salt, sugar, baking powder, and nutmeg or cinnamon. Add ¾ cup milk to the dry ingredients and stir to combine into a smooth batter."}]},{"t":"n","text":"**Assemble Cobbler:**","subs":[{"t":"b","text":"Spoon the batter over the melted butter in the pan. Do not stir!"},{"t":"b","text":"Gently spoon the peaches (with their juice) on top of the batter. Do not stir! The batter will rise around the peaches as it bakes."}]},{"t":"n","text":"**Bake:**","subs":[{"t":"b","text":"Bake at 350°F for 1 hour, or until the top is golden and bubbly."}]},{"t":"n","text":"**Serve:**","subs":[{"t":"b","text":"Serve warm or cold, with whipped cream or ice cream, if desired. This cobbler can also be made with other fruits or canned fruits if fresh peaches aren't available."}]}]}],"stub":false,"source":null},{"id":"rice-pudding","title":"Rice Pudding","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"3 cups milk","subs":[]},{"t":"b","text":"3 eggs","subs":[]},{"t":"b","text":"⅔ cup sugar","subs":[]},{"t":"b","text":"¾ cup cooked rice","subs":[]},{"t":"b","text":"1 tsp vanilla","subs":[]},{"t":"b","text":"1 tbsp butter","subs":[]},{"t":"b","text":"⅛ tsp salt","subs":[]},{"t":"b","text":"½ cup raisins","subs":[]},{"t":"b","text":"¼ cup uncooked rice","subs":[]},{"t":"b","text":"Nutmeg, for sprinkling","subs":[]},{"t":"b","text":"¼ tsp cinnamon","subs":[]},{"t":"b","text":"¼ tsp ginger","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Scald milk and butter in a pan over medium heat","subs":[]},{"t":"n","text":"In a separate bowl, beat eggs with salt and sugar until stiff","subs":[]},{"t":"n","text":"Slowly add the milk to the egg mixture, stirring continuously","subs":[]},{"t":"n","text":"Add cooked rice, raisins, vanilla, cinnamon, and ginger","subs":[]},{"t":"n","text":"Grease a casserole dish, pour in the mixture, and sprinkle with nutmeg","subs":[]},{"t":"n","text":"Bake at 325°F for 20-25 minutes","subs":[]}]}],"stub":false,"source":null},{"id":"sticky-bun-chex-mix","title":"Sticky Bun Chex Mix","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"8 cups Rice Chex cereal","subs":[]},{"t":"b","text":"1 cup Cashew Coconut Caramel Sauce (recipe below)","subs":[]},{"t":"b","text":"½ cup coconut sugar","subs":[]},{"t":"b","text":"2 tsp. ground cinnamon","subs":[]},{"t":"b","text":"Pinch of sea salt","subs":[]},{"t":"b","text":"**Optional add-ins:**","subs":[]},{"t":"b","text":"White chocolate chips","subs":[]},{"t":"b","text":"Unsweetened flaked coconut","subs":[]},{"t":"b","text":"Mini chocolate chips","subs":[]},{"t":"b","text":"Chopped pecans or sliced almonds","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Pour Rice Chex cereal into a large bowl. In a small bowl combine the coconut sugar, cinnamon and sea salt; set aside.","subs":[]},{"t":"n","text":"Add the caramel sauce to a sauce pan over low heat. Mix until smooth and pourable. Pour over the top of the cereal. Use a large spatula to scrape the sides of the bowl and stir until the cereal is well-coated.","subs":[]},{"t":"n","text":"Once coated in caramel, pour the cereal into a large Ziploc bag with the sugar/cinnamon mixture. Shake until well-coated. Dump out onto a baking sheet lined with parchment or wax paper. Allow to cool before eating. Enjoy! CASHEW COCONUT CARAMEL SAUCE ¾ cup salted cashews ¾ cup raw honey ½ cup softened coconut butter (heat in the microwave and stir well) 2-3 Tbs. water ½ tsp. caramel or vanilla extract","subs":[]},{"t":"n","text":"Soak cashews in water for 1 hour. Drain and place in a high-powered blender with the rest of the ingredients and blend until smooth. Store in the fridge until ready to use.","subs":[]},{"t":"n","text":"When ready to use, place the caramel sauce in a saucepan over low heat and stir until warm and melted.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"10 servings","calories":"265","macros":"45.5c/8f/3p","per":"serving"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"strawberry-cheesecake-bowl","title":"Strawberry Cheesecake Bowl","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2/3 cup plain Greek yogurt","subs":[]},{"t":"b","text":"2 Tbs. unsweetened almond milk","subs":[]},{"t":"b","text":"4g sugar-free, fat-free cheesecake pudding mix","subs":[]},{"t":"b","text":"150g sliced strawberries","subs":[]},{"t":"b","text":"8g graham cracker crumbs","subs":[]},{"t":"b","text":"1 Tbs. sliced almonds","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Stir Greek yogurt, almond milk and pudding mix together in a bowl. Top with fresh strawberries, almonds and graham cracker crumbs.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"1 serving","calories":"225","macros":"26c/5f/19p"},"sourceLabel":"Clean Simple Eats · Summer '18"},{"id":"sugar-almonds","title":"Sugar Almonds","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup sugar","subs":[]},{"t":"b","text":"½ tsp vanilla or maple flavoring","subs":[]},{"t":"b","text":"1 tablespoon light corn syrup","subs":[]},{"t":"b","text":"1 tablespoon butter","subs":[]},{"t":"b","text":"¼ cup water","subs":[]},{"t":"b","text":"½ tsp salt","subs":[]},{"t":"b","text":"2 cups almonds","subs":[]},{"t":"b","text":"1 tsp cinnamon","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"In a heavy saucepan, combine sugar, water, corn syrup, and salt. Stir over low heat until the sugar is dissolved.","subs":[]},{"t":"n","text":"Increase the heat and bring the mixture to a boil, cooking until it reaches the soft ball stage (238°F).","subs":[]},{"t":"n","text":"Remove from heat and blend in the vanilla or maple flavoring and butter.","subs":[]},{"t":"n","text":"Add the almonds and stir gently until the mixture becomes creamy and coats the nuts.","subs":[]},{"t":"n","text":"Turn out the mixture onto a sheet of wax paper and separate the nuts.","subs":[]},{"t":"n","text":"Allow to cool and harden before serving.","subs":[]}]}],"stub":false,"source":null}, ug or a bowl with cooking spray. Whisk all mug cake ingredients together until well combined. Microwave for 1 minute.","subs":[]},{"t":"n","text":"In a small bowl, whisk together all the ingredients to make the cream.","subs":[]},{"t":"n","text":"Top warm mug cake with cream mixture and crumbled graham crackers. 49 PB","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"1 serving","calories":"235","macros":"25c/7f/18p"},"sourceLabel":"Clean Simple Eats · Summer '18"},{"id":"toasted-coconut-cashew-butter","title":"Toasted Coconut Cashew Butter","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"280g roasted, salted cashews","subs":[]},{"t":"b","text":"60g unsweetened coconut flakes","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Place cashews and coconut into a blender and blend until smooth, scraping down the sides in between blends if needed. Pour into a jar or container and store in the fridge.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"1 cup / 16 servings","calories":"100","macros":"5c/8.5f/3p","per":"Tbs"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"yogurt-bowl-with-homemade-maple-granola","title":"Yogurt Bowl with Homemade Maple Granola","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Homemade Granola:**","subs":[]},{"t":"b","text":"3 c old-fashioned oats","subs":[]},{"t":"b","text":"1 c cooked quinoa","subs":[]},{"t":"b","text":"½ c pecans","subs":[]},{"t":"b","text":"1 c pumpkin seeds","subs":[]},{"t":"b","text":"½ c dried cranberries","subs":[]},{"t":"b","text":"2½ c Honeycrisp apples, chopped","subs":[]},{"t":"b","text":"4 tbsp butter, melted","subs":[]},{"t":"b","text":"¾ c pure maple syrup","subs":[]},{"t":"b","text":"½ c pumpkin puree","subs":[]},{"t":"b","text":"2 tsp cinnamon, ½ tsp nutmeg, ½ tsp ginger, 1½ tsp pumpkin pie spice, ½ tsp salt","subs":[]},{"t":"b","text":"2 tsp vanilla extract","subs":[]},{"t":"b","text":"2 tbsp honey, divided","subs":[]},{"t":"b","text":"**Yogurt Bowl (per serving):**","subs":[]},{"t":"b","text":"1 c vanilla Greek yogurt, nonfat","subs":[]},{"t":"b","text":"¼ c granola","subs":[]},{"t":"b","text":"2 tbsp strawberries, halved","subs":[]},{"t":"b","text":"2 tbsp blueberries","subs":[]},{"t":"b","text":"2 tbsp raspberries","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 325°F. Line two baking sheets with parchment paper.","subs":[]},{"t":"n","text":"In a large mixing bowl, mix together the oats, quinoa, pecans, pumpkin seeds, cranberries, and apples.","subs":[]},{"t":"n","text":"In a medium mixing bowl, whisk together the butter, maple syrup, pumpkin puree, cinnamon, nutmeg, ginger, pumpkin pie spice, salt, and vanilla until smooth.","subs":[]},{"t":"n","text":"Mix the wet ingredients into the dry until well coated. Spread half the granola onto each baking sheet — a thin layer makes for better granola.","subs":[]},{"t":"n","text":"Bake for 60–70 minutes, tossing every 20 minutes for an even cook. Halfway through, drizzle the honey over the granola.","subs":[]},{"t":"n","text":"Cool completely before storing. The granola makes about 20 ¼-c servings (about 184 cal, 24c/8f/4p per serving of granola alone).","subs":[]},{"t":"n","text":"For each bowl, serve ¼ c granola over 1 c Greek yogurt with 2 tbsp each of strawberries, blueberries, and raspberries.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"20","active":"10 min","total":"1 hr 30 min","calories":"349","macros":"37c/9f/30p"},"sourceLabel":"Mamele Macro Meals · Oct '22"},{"id":"zebra-caramel-corn","title":"Zebra Caramel Corn","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"12 cups (½ cup kernels) air-popped popcorn","subs":[]},{"t":"b","text":"½ cup natural peanut butter or almond butter","subs":[]},{"t":"b","text":"½ cup raw honey","subs":[]},{"t":"b","text":"1 tsp. vanilla extract","subs":[]},{"t":"b","text":"¼ cup dark chocolate chips","subs":[]},{"t":"b","text":"¼ cup white chocolate chips","subs":[]},{"t":"b","text":"Pinch of sea salt","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Pour popped popcorn into a large bowl.","subs":[]},{"t":"n","text":"In a saucepan, melt the peanut butter, honey and vanilla over medium heat. Stir until pourable.","subs":[]},{"t":"n","text":"Pour over the popcorn and stir until well-coated. Pour out onto a sheet of parchement paper and let cool.","subs":[]},{"t":"n","text":"In two separate bowls, microwave the chocolate chip flavors, 30 seconds at a time until completely melted and smooth, stirring in between. Pour the dark chocolate into a Ziploc sandwich bag. Cut a small hole in one corner and drizzle over the popcorn. Repeat with the white chocolate. Sprinkle sea salt over the top and store in the fridge to cool.","subs":[]},{"t":"n","text":"Once the chocolate is hardened, separate into 8 servings. Enjoy!","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"8 servings","calories":"265","macros":"38c/11f/4p","per":"serving"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"chocolate-pie","title":"Chocolate Pie","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 nine-inch baked pastry shell","subs":[]},{"t":"b","text":"2 squares unsweetened chocolate","subs":[]},{"t":"b","text":"3¾ cups milk","subs":[]},{"t":"b","text":"1¼ cups sugar","subs":[]},{"t":"b","text":"1 tablespoon cornstarch","subs":[]},{"t":"b","text":"1 cup heavy cream","subs":[]},{"t":"b","text":"½ teaspoon salt","subs":[]},{"t":"b","text":"4 egg yolks","subs":[]},{"t":"b","text":"3 teaspoons vanilla","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Melt the Chocolate:**","subs":[{"t":"p","text":"In a small saucepan, heat the unsweetened chocolate and ½ cup of milk over low heat. Stir constantly until the chocolate is melted and smooth."}]},{"t":"n","text":"**Prepare the Filling:**","subs":[{"t":"p","text":"In a separate saucepan, combine the sugar, cornstarch, salt, the remaining 2¾ cups of milk, and the beaten egg yolks. Beat the mixture with a rotary beater or wire whisk until well blended."}]},{"t":"n","text":"**Combine and Cook:**","subs":[{"t":"p","text":"Stir in the melted chocolate mixture into the egg yolk mixture. Cook over medium heat, stirring constantly, until the mixture thickens and begins to boil. Once it reaches a boil, cook for an additional minute."}]},{"t":"n","text":"**Finish the Filling:**","subs":[{"t":"p","text":"Remove the saucepan from heat and stir in the vanilla."}]},{"t":"n","text":"**Assemble the Pie:**","subs":[{"t":"p","text":"Pour the chocolate mixture into the prepared baked pastry shell. Place a piece of plastic wrap directly on the surface of the hot filling to prevent a skin from forming."}]},{"t":"n","text":"**Refrigerate:**","subs":[{"t":"p","text":"Chill the pie in the refrigerator for at least 3 hours to allow the filling to set."}]},{"t":"n","text":"**Serve:**","subs":[{"t":"p","text":"Before serving, spread whipped cream over the top for a rich, creamy finish."}]}]}],"stub":false,"source":null},{"id":"coconut-cream-pie","title":"Coconut Cream Pie","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[]},{"label":"For the Coconut Crust","items":[{"t":"b","text":"1 1/4 cup all-purpose flour","subs":[]},{"t":"b","text":"1 stick COLD unsalted butter (1/2 cup)","subs":[]},{"t":"b","text":"1/3 cup shredded sweetened coconut","subs":[]},{"t":"b","text":"1/2 tsp salt","subs":[]},{"t":"b","text":"3-5 Tb ice-cold coconut-flavored water (a coffee mug with water and 1/2-1 tsp coconut extract)","subs":[]}]},{"label":"For the Coconut Cream Pie","items":[{"t":"b","text":"5.1 oz box instant vanilla pudding","subs":[]},{"t":"b","text":"15 oz can cream of coconut","subs":[]},{"t":"b","text":"1/2 cup coconut milk (or cow's milk)","subs":[]},{"t":"b","text":"12 oz cream cheese, softened","subs":[]},{"t":"b","text":"2 cups heavy whipping cream","subs":[]},{"t":"b","text":"1 tsp vanilla extract","subs":[]},{"t":"b","text":"3 Tb sugar","subs":[]},{"t":"b","text":"1 cup toasted coconut","subs":[]}]},{"label":"Directions","items":[]},{"label":"For the Crust","items":[{"t":"n","text":"Cut the butter into small cubes and place in the freezer to make sure it's very cold","subs":[]},{"t":"n","text":"Place 1/3 cup shredded coconut in the food processor and pulse to finely chop. Then add the flour and salt, pulsing again","subs":[]},{"t":"n","text":"Pour a couple of ounces of coconut rum over ice to chill. Add the cold butter to the flour mixture and pulse until it's finely chopped and mixed into the flour, resembling oatmeal or little pellets","subs":[]},{"t":"n","text":"One tablespoon at a time, pulse in the chilled coconut-flavored water (a few tsp coconut extract in a coffee mug of water) until the dough clumps together, firm but not sticky. Usually takes about 4 tablespoons","subs":[]},{"t":"n","text":"Dump the dough onto plastic wrap, form into a disk, wrap, and refrigerate for at least 30 minutes","subs":[]},{"t":"n","text":"Preheat the oven to 375°F. Roll the chilled dough out on a floured surface into a 14-inch circle","subs":[]},{"t":"n","text":"Gently roll the dough over the rolling pin to transfer it to the pie pan. Don't stretch it—just move it gently into the pan. Turn the edges under and crimp to seal","subs":[]},{"t":"n","text":"Place a large piece of foil over the dough and gently shape it over the crust. Fill with pie weights or dried beans and bake for 15 minutes.","subs":[]},{"t":"n","text":"Remove the foil and weights, then bake for another 10 minutes. Cool completely before filling","subs":[]},{"t":"n","text":"Spread coconut onto a baking sheet and toast for 3-5 minutes until golden, then remove and cool. Don't leave the coconut unattended—it can burn quickly!","subs":[]}]},{"label":"For the Filling","items":[{"t":"n","text":"Place instant pudding mix in a large jar or airtight container. Add cream of coconut and milk. Cover tightly and shake for 1-2 minutes until well combined. Refrigerate","subs":[]},{"t":"n","text":"Using an electric mixer, whip heavy cream with vanilla and sugar. Transfer to a separate bowl and refrigerate","subs":[]},{"t":"n","text":"Beat cream cheese until light and fluffy. Slowly beat in the pudding mixture a little at a time, scraping the bowl regularly to ensure smoothness","subs":[]},{"t":"n","text":"Fold in half of the whipped cream until smooth","subs":[]},{"t":"n","text":"Scoop the filling into the cooled pie crust. Top with the remaining whipped cream and generously sprinkle with toasted coconut","subs":[]},{"t":"n","text":"Chill for at least 4 hours, preferably overnight for best results","subs":[]}]}],"stub":false,"source":null},{"id":"cookie-crumb-pie-crust","title":"Cookie Crumb Pie Crust","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 cups fine vanilla wafer crumbs","subs":[]},{"t":"b","text":"½ cup butter, melted","subs":[]},{"t":"b","text":"¼ cup sugar","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Combine all ingredients and press the mixture evenly into the bottom and up the sides of a 9-inch pie plate.","subs":[]},{"t":"n","text":"Bake at 400°F for 10 minutes.","subs":[]}]}],"stub":false,"source":null},{"id":"cream-cheese-crust","title":"Cream Cheese Crust","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 (4-oz) package cream cheese, softened","subs":[]},{"t":"b","text":"½ cup butter, softened","subs":[]},{"t":"b","text":"1½ cups flour","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Combine the cream cheese and butter together, mixing well.","subs":[]},{"t":"n","text":"Gradually stir in the flour until the dough forms.","subs":[]},{"t":"n","text":"Roll out the dough between two sheets of waxed paper.","subs":[]},{"t":"n","text":"Transfer to a 9-inch pie plate and prick the dough with a fork to prevent shrinkage.","subs":[]},{"t":"n","text":"Bake at 350°F for 12-15 minutes or until golden brown.","subs":[]}]}],"stub":false,"source":null},{"id":"cream-pie-filling","title":"Cream Pie Filling","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"5 tablespoons cornstarch","subs":[]},{"t":"b","text":"1 cup sugar","subs":[]},{"t":"b","text":"¼ teaspoon salt","subs":[]},{"t":"b","text":"2 ½ cups milk","subs":[]},{"t":"b","text":"¾ cup half & half cream","subs":[]},{"t":"b","text":"3 egg yolks (or 2 whole eggs for a slightly less smooth filling)","subs":[]},{"t":"b","text":"2 tablespoons butter","subs":[]},{"t":"b","text":"1 cup whipping cream","subs":[]},{"t":"b","text":"1 baked 9-inch pie crust","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a 3-quart saucepan, mix together the cornstarch, sugar, and salt.","subs":[]},{"t":"n","text":"Add the milk and cream and cook over medium heat, stirring constantly, until the mixture becomes smooth and thick.","subs":[]},{"t":"n","text":"Pour a small amount of the hot mixture into the egg yolks to temper them. Blend thoroughly, then return the egg mixture to the saucepan.","subs":[]},{"t":"n","text":"Cook for another 2-3 minutes, stirring constantly.","subs":[]},{"t":"n","text":"Remove from heat and stir in the butter and vanilla.","subs":[]}]},{"label":"For Coconut Cream Pie","items":[{"t":"n","text":"Add ½ cup of coconut (toasted if desired) to the pie filling, then pour it into the baked pie crust.","subs":[]},{"t":"n","text":"Chill for 3-4 hours.","subs":[]},{"t":"n","text":"Once ready to serve, whip the cream and spread it over the pie. Top with an additional ½ cup of coconut.","subs":[]}]},{"label":"For Banana Cream Pie","items":[{"t":"n","text":"Slice 2 bananas and arrange them in the bottom of the baked pie crust.","subs":[]},{"t":"n","text":"Pour the prepared filling over the bananas.","subs":[]},{"t":"n","text":"Chill for 3-4 hours.","subs":[]},{"t":"n","text":"When ready to serve, whip the cream and spread it over the pie.","subs":[]}]}],"stub":false,"source":null},{"id":"dear-abbys-famous-pecan-pie","title":"Dear Abby’s Famous Pecan Pie","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 (9-inch) unbaked pie crust","subs":[]},{"t":"b","text":"1 cup light corn syrup","subs":[]},{"t":"b","text":"1 cup firmly packed brown sugar","subs":[]},{"t":"b","text":"3 eggs, slightly beaten","subs":[]},{"t":"b","text":"½ cup butter, melted","subs":[]},{"t":"b","text":"1 teaspoon salt","subs":[]},{"t":"b","text":"1 teaspoon vanilla","subs":[]},{"t":"b","text":"1 heaping cup pecan halves (or walnuts)","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Prepare the Pie Crust:**","subs":[{"t":"p","text":"Preheat your oven to 350°F. Prepare the 9-inch pie crust in a pie dish."}]},{"t":"n","text":"**Make the Filling:**","subs":[{"t":"p","text":"In a large bowl, combine the corn syrup, brown sugar, eggs, melted butter, salt, and vanilla. Mix well until fully combined."}]},{"t":"n","text":"**Assemble the Pie:**","subs":[{"t":"p","text":"Pour the filling mixture into the prepared pie crust. Sprinkle the pecan (or walnut) halves evenly over the top."}]},{"t":"n","text":"**Bake:**","subs":[{"t":"p","text":"Bake the pie in the preheated oven for 45 to 50 minutes or until the center is set. (You can check by inserting a toothpick—it should come out clean when the pie is done.) If the crust or pie begins to get too brown, cover it with foil for the remainder of the baking time."}]},{"t":"n","text":"**Serve:**","subs":[{"t":"p","text":"Allow the pie to cool slightly. You can serve it plain, or top it with whipped cream or ice cream for an extra indulgent treat!"}]}]}],"stub":false,"source":null},{"id":"deep-dish-apple-pie","title":"Deep Dish Apple Pie","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 cups apples, peeled and sliced","subs":[]}]},{"label":"For the Filling","items":[{"t":"b","text":"1 cup sugar","subs":[]},{"t":"b","text":"¼ teaspoon salt","subs":[]},{"t":"b","text":"2 tablespoons cornstarch","subs":[]},{"t":"b","text":"A few drops of lemon flavoring or fresh lemon juice","subs":[]},{"t":"b","text":"1 teaspoon cinnamon","subs":[]}]},{"label":"For the Topping (for Apple Brown Betty option)","items":[{"t":"b","text":"1 cup flour","subs":[]},{"t":"b","text":"1 cube butter (1/2 cup)","subs":[]},{"t":"b","text":"1 cup brown sugar","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Prepare the Apple Filling:**","subs":[{"t":"p","text":"In a large bowl, blend together sugar, salt, cornstarch, lemon flavoring (or fresh lemon juice), and cinnamon. Sprinkle this mixture over the sliced apples. Let the apples stand for 1 hour to allow the flavors to meld."}]},{"t":"n","text":"**Assemble the Pie:**","subs":[{"t":"p","text":"Place the apple mixture into a deep dish pie pan. Cover with pie dough. Bake in a 350°F oven for about 1 hour, or until the crust is golden brown and the apples are tender."}]}]},{"label":"Apple Brown Betty Option","items":[{"t":"b","text":"Follow the same steps as the Deep Dish Apple Pie, but instead of a traditional pie crust, make the topping.","subs":[]},{"t":"b","text":"Blend together 1 cup flour, 1 cup brown sugar, and 1 cube butter until crumbly.","subs":[]},{"t":"b","text":"Spread this topping evenly over the apple filling and bake in the same 350°F oven for about 1 hour.","subs":[]}]}],"stub":false,"source":null},{"id":"fresh-peach-pie","title":"Fresh Peach Pie","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 cups boiling water","subs":[]},{"t":"b","text":"1/4 teaspoon salt","subs":[]},{"t":"b","text":"1½ cups cold water","subs":[]},{"t":"b","text":"1 (3 oz) box orange Jell-O","subs":[]},{"t":"b","text":"2½ cups sugar","subs":[]},{"t":"b","text":"¾ cup cornstarch","subs":[]},{"t":"b","text":"¼ cup lemon juice","subs":[]},{"t":"b","text":"4 cups fully ripe peaches","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Prepare the Cornstarch Paste:**","subs":[{"t":"p","text":"In a bowl, combine ¾ cup cornstarch, salt, and sugar. Add 1½ cups cold water and stir until smooth."}]},{"t":"n","text":"**Boil Water and Combine:**","subs":[{"t":"p","text":"Bring 2 cups of water to a boil. Slowly add the cornstarch mixture to the boiling water, stirring constantly. Cook over medium heat for about 3 minutes or until the mixture becomes very thick."}]},{"t":"n","text":"**Add Lemon Juice and Chill:**","subs":[{"t":"p","text":"Remove the mixture from the heat and stir in the lemon juice. Let the mixture cool to room temperature, then chill thoroughly in the refrigerator."}]},{"t":"n","text":"**Prepare the Peaches:**","subs":[{"t":"p","text":"Peel and slice the ripe peaches, being careful to slice them evenly."}]},{"t":"n","text":"**Assemble the Pie:**","subs":[{"t":"p","text":"Once the glaze is fully chilled, carefully stir enough glaze to coat each slice of peach. Pour the glazed peaches into pre-baked pie crusts (this recipe makes enough for 3 - 9-inch pies)."}]},{"t":"n","text":"**Serve:**","subs":[{"t":"p","text":"Top with whipped cream and serve immediately."}]}]}],"stub":false,"source":null},{"id":"graham-cracker-pie-crust","title":"Graham Cracker Pie Crust","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 cups graham cracker crumbs","subs":[]},{"t":"b","text":"½ cup butter, melted","subs":[]},{"t":"b","text":"¼ cup sugar","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Combine all ingredients and press the mixture evenly into the bottom and up the sides of a 9-inch pie plate.","subs":[]},{"t":"n","text":"Bake at 400°F for 10 minutes.","subs":[]}]}],"stub":false,"source":null},{"id":"mud-pie","title":"Mud Pie","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"20-24 Oreo cookies (including icing), crushed","subs":[]},{"t":"b","text":"½ cup butter","subs":[]},{"t":"b","text":"½ gallon ice cream (cookies ‘n cream or mint chocolate chip)","subs":[]}]},{"label":"For the Sauce","items":[{"t":"b","text":"4 squares semi-sweet baking chocolate","subs":[]},{"t":"b","text":"1 tablespoon butter","subs":[]},{"t":"b","text":"¼ cup evaporated milk*(Alternatively, you can use Hershey’s Chocolate Fudge Sauce)*","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Prepare the Crust:**","subs":[{"t":"p","text":"Melt the butter. Mix the melted butter with the crushed Oreo cookies. Press the mixture into a 9-inch pie pan and freeze for several hours."}]},{"t":"n","text":"**Fill the Pie:**","subs":[{"t":"p","text":"Once the crust is frozen, fill the crust with the ice cream, shaping it into a round form. Freeze again until the ice cream is nice and firm."}]},{"t":"n","text":"**Make the Sauce:**","subs":[{"t":"p","text":"Melt the chocolate in a saucepan. Add 1 tablespoon of butter and ¼ cup of evaporated milk. Stir until smooth and remove from heat to cool. *(If you are using Hershey’s Fudge Sauce, make sure it's cooled in the fridge before using.)*"}]},{"t":"n","text":"**Assemble the Pie:**","subs":[{"t":"p","text":"Once the ice cream is firm, pour the cooled chocolate sauce over the top of the pie and spread it evenly. Sprinkle with chopped pecans or walnuts."}]},{"t":"n","text":"**Serve:**","subs":[{"t":"p","text":"Before slicing, dip the knife in hot water for 15-20 seconds to make cutting easier. You can top each slice with whipped cream and a cherry for an extra special touch!"}]}]}],"stub":false,"source":null},{"id":"pie-crust-martha-stewart","title":"Pie Crust (Martha Stewart)","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2½ cups flour","subs":[]},{"t":"b","text":"2 sticks unsalted butter (cut into small pieces)","subs":[]},{"t":"b","text":"1 tsp salt","subs":[]},{"t":"b","text":"1 tsp sugar","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Blend the flour, butter, salt, and sugar in a food processor until the mixture resembles coarse oatmeal.","subs":[]},{"t":"n","text":"Gradually add ¼ to ½ cup ice water, pulsing as you go until the dough forms.","subs":[]},{"t":"n","text":"Wrap the dough in plastic wrap and chill for 1 hour.","subs":[]},{"t":"n","text":"Roll out and place in a pie pan when ready to use.","subs":[]},{"t":"p","text":"*Tip:* Always work with chilled ingredients for best results.","subs":[]}]}],"stub":false,"source":null},{"id":"pie-pastry","title":"Pie Pastry","category":"Desserts","subcategory":"Pies & Crusts","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 cups sifted flour","subs":[]},{"t":"b","text":"1 tsp salt","subs":[]},{"t":"b","text":"¾ cup shortening (chilled in the freezer)","subs":[]},{"t":"b","text":"2 tsp sugar","subs":[]},{"t":"b","text":"3½ - 4 tbsp ice water","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Mix the flour and salt together in a bowl.","subs":[]},{"t":"n","text":"Cut the chilled shortening into the flour using a pastry blender or two knives until the mixture resembles pea-sized pieces.","subs":[]},{"t":"n","text":"Gradually add the ice water, mixing with fingers or a fork until the dough holds together.","subs":[]},{"t":"n","text":"Roll out the dough on a pastry cloth, then place it in a pie pan.","subs":[]},{"t":"n","text":"Bake at 450°F for 5-8 minutes, or until golden brown.","subs":[]}]}],"stub":false,"source":null},{"id":"almond-flax-protein-bites","title":"Almond Flax Protein Bites","category":"Desserts","subcategory":"Protein Bites &  and 1 tablespoon of cooking oil, bring to a boil and add the pasta","subs":[]},{"t":"n","text":"In a separate bowl, mix the sugar, flour, and ½ teaspoon of salt, stir in pineapple juice and beaten eggs, then cook until the mixture thickens","subs":[]},{"t":"n","text":"Allow the egg mixture to cool to room temperature","subs":[]},{"t":"n","text":"Drain the cooked pasta and rinse well with cold water","subs":[]},{"t":"n","text":"Combine the cooled pasta with the egg mixture and refrigerate overnight","subs":[]},{"t":"n","text":"The next day, add the mandarin oranges, pineapple tidbits, crushed pineapple (with juice), miniature marshmallows, bananas, lemon juice, and Cool Whip","subs":[]},{"t":"n","text":"Mix everything together and refrigerate until ready to serve","subs":[]},{"t":"n","text":"Garnish with strawberries cut into fourths before serving","subs":[]}]}],"stub":false,"source":null},{"id":"frozen-strawberry-salad","title":"Frozen Strawberry Salad","category":"Desserts","subcategory":"Sweet Salads & Jello","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 (8 oz) cream cheese, softened","subs":[]},{"t":"b","text":"¾ cup sugar","subs":[]},{"t":"b","text":"½ cup chopped nuts","subs":[]},{"t":"b","text":"Vanilla or almond extract, to taste","subs":[]},{"t":"b","text":"1 large can crushed pineapple, drained","subs":[]},{"t":"b","text":"1 (9 oz) carton Cool Whip","subs":[]},{"t":"b","text":"1 (10 oz) package frozen strawberries","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large bowl, combine the softened cream cheese, sugar, and Cool Whip. Mix well.","subs":[]},{"t":"n","text":"Add the chopped nuts, pineapple, and frozen strawberries. Blend until smooth.","subs":[]},{"t":"n","text":"Pour the mixture into molds or bowls and freeze.","subs":[]},{"t":"n","text":"Remove from the freezer about an hour before serving to allow it to soften slightly.","subs":[]}]}],"stub":false,"source":null},{"id":"fruit-trifle","title":"Fruit Trifle","c  and heat on the stove until dissolved.","subs":[]},{"t":"n","text":"Remove from the heat and mix in the remaining ingredients.","subs":[]},{"t":"n","text":"Freeze overnight.","subs":[]},{"t":"n","text":"To serve, combine with 7-Up.","subs":[]}]}],"stub":false,"source":null},{"id":"eggnog","title":"Eggnog","category":"Drinks & Shakes","subcategory":"Cold","sections":[{"label":"Ingredients","items":[{"t":"b","text":"12 egg yolks","subs":[]},{"t":"b","text":"1 qt milk","subs":[]},{"t":"b","text":"1 ½ cups sugar","subs":[]},{"t":"b","text":"1 qt heavy cream","subs":[]},{"t":"b","text":"1 tsp vanilla extract","subs":[]},{"t":"b","text":"1 tsp nutmeg","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Combine all ingredients in a blender and mix.","subs":[]},{"t":"n","text":"Serve chilled.","subs":[]}]}],"stub":false,"source":null},{"id":"frosty-citrus-punch","title":"Frosty Citrus Punch","category":"Drinks & Shakes","subcategory":"Cold","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 liters 7-Up or Sprite","subs":[]},{"t":"b","text":"½ cup lemon or lime juice","subs":[]},{"t":"b","text":"½ gallon lime sherbet (or any citrus-flavored sherbet you prefer)","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Pour the soda into a large punch bowl.","subs":[]},{"t":"n","text":"Stir in the lemon or lime juice.","subs":[]},{"t":"n","text":"Add scoops of sherbet to float on top of the punch.","subs":[]},{"t":"n","text":"Serve as is, or blend together for a smoothie-like texture.","subs":[]}]}],"stub":false,"source":null},{"id":"homemade-rootbeer","title":"Homemade Rootbeer","category":"Drinks & Shakes","subcategory":"Cold","sections":[{"label":"Makes 4 gallons","items":[]},{"label":"Ingredients","items":[{"t":"b","text":"5 pounds sugar","subs":[]},{"t":"b","text":"6 cups hot water","subs":[]},{"t":"b","text":"4 cups ice","subs":[]},{"t":"b","text":"Very cold water (enough to make 4 gallons, about 3½ gallons)","subs":[]},{"t":"b","text":"2 (2 oz) bottles Root Beer Extract (McCormick or Hires)","subs":[]},{"t":"b","text":"6 pounds dry ice (broken into pieces)","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Dissolve Sugar**","subs":[{"t":"p","text":"In a 5-gallon drink cooler, add the hot water and then the sugar. Stir until the sugar is completely dissolved."}]},{"t":"n","text":"**Add Ice**","subs":[{"t":"p","text":"Add the 4 cups of ice and stir with a long spoon until the ice is mostly melted."}]},{"t":"n","text":"**Add Cold Water and Extract**","subs":[{"t":"p","text":"Add enough very cold water to the cooler to make 4 gallons of liquid. Then add the Root Beer Extract. The colder the water, the more carbon dioxide will be generated from the dry ice, creating a fizzy effect."}]},{"t":"n","text":"**Prepare the Dry Ice**","subs":[{"t":"p","text":"Dry ice comes in a paper bag. Leave it in the bag and break it into smaller pieces by gently tapping it with a hammer. Wear gloves while handling dry ice, as it can burn your skin."}]},{"t":"n","text":"**Add Dry Ice**","subs":[{"t":"p","text":"Slowly add pieces of dry ice to the root beer mixture a few pieces at a time. The dry ice will cause the mixture to bubble and \"smoke\" like a witch's cauldron. This creates a dramatic party effect!"}]},{"t":"n","text":"**Let it Boil**","subs":[{"t":"p","text":"Let the mixture \"boil\" for about 20-30 minutes. Stir the root beer every 5 minutes, but do not seal the container tightly—otherwise, the lid may pop off due to the pressure buildup."}]},{"t":"n","text":"**Serve and Enjoy**","subs":[{"t":"p","text":"Once the dry ice has evaporated and the mixture has cooled, you can scoop out the slush that forms at the bottom of the container—perfect for a hot day! Serve it with an ice cream scoop. You can also make root beer floats by adding homemade ice cream."}]}]}],"stub":false,"source":null},{"id":"lemon-water","title":"Lemon Water","category":"Drinks & Shakes","subcategory":"Cold","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 gallon water","subs":[]},{"t":"b","text":"2 ½ cups sugar","subs":[]},{"t":"b","text":"1 tbsp citric acid","subs":[]},{"t":"b","text":"1 tbsp lemon extract","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"In a large pitcher or container, combine the water, sugar, citric acid, and lemon extract.","subs":[]},{"t":"n","text":"Stir until the sugar is fully dissolved.","subs":[]},{"t":"n","text":"Serve chilled, or store in the fridge and enjoy later as a refreshing lemonade.","subs":[]}]}],"stub":false,"source":null},{"id":"orange-julius","title":"Orange Julius","category":"Drinks & Shakes","subcategory":"Cold","sections":[{"label":"Ingredients","items":[{"t":"b","text":"6 oz can of orange juice","subs":[]},{"t":"b","text":"1 tsp vanilla extract","subs":[]},{"t":"b","text":"1 cup milk","subs":[]},{"t":"b","text":"¼ cup sugar","subs":[]},{"t":"b","text":"1 cup water","subs":[]},{"t":"b","text":"Ice","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"In a blender, combine the orange juice, vanilla extract, milk, sugar, and water. Blend until well-mixed.","subs":[]},{"t":"n","text":"Gradually add ice while blending until your desired thickness is reached.","subs":[]},{"t":"n","text":"Serve immediately and enjoy a refreshing, creamy citrus drink!","subs":[]}]}],"stub":false,"source":null},{"id":"peach-pleaser","title":"Peach Pleaser","category":"Drinks & Shakes","subcategory":"Cold","sections":[{"label":"Ingredients","items":[{"t":"b","text":"16 oz can of peach nectar","subs":[]},{"t":"b","text":"½ tsp almond extract","subs":[]},{"t":"b","text":"2 cups fresh fruit (peaches or other preferred fruit)","subs":[]},{"t":"b","text":"1 cup orange juice","subs":[]},{"t":"b","text":"1 cup milk","subs":[]},{"t":"b","text":"1 tsp vanilla extract","subs":[]},{"t":"b","text":"1 pint softened vanilla ice cream","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"In a blender, combine the peach nectar, almond extrac h heat. Brown the beef, breaking it into small pieces. As it cooks, add the onion, bell pepper, and garlic, and cook 3–5 minutes.","subs":[]},{"t":"n","text":"Add the green chilies, tomatoes, corn, and seasonings. Mix and cook 5–6 minutes. Add the cooked rice and mix; cook another 2–5 minutes.","subs":[]},{"t":"n","text":"Split into 4 servings and top each with green onions, 25 g avocado, and fresh lime juice.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"25 min","total":"25 min","calories":"197","macros":"16c/5f/22p"},"sourceLabel":"Mamele Macro Meals · Nov '22"},{"id":"philly-fried-rice","title":"Philly Fried Rice","category":"Main Dishes","subcategory":"Beef & Pork","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 to 1.25 lbs ground beef","subs":[]},{"t":"b","text":"1 cup diced onion","subs":[]},{"t":"b","text":"1 cup diced bell pepper","subs":[]},{"t":"b","text":"2 to 2.5 cups cooked rice","subs":[]},{"t":"b","text":"1 packet au jus seasoning","subs":[]},{"t":"b","text":"¼ cup water","subs":[]},{"t":"b","text":"Spicy ranch","subs":[]},{"t":"b","text":"Crispy fried onions","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Brown ground beef","subs":[]},{"t":"n","text":"Add onion and pepper, cook until soft","subs":[]},{"t":"n","text":"Stir in rice","subs":[]},{"t":"n","text":"Add au jus seasoning and water","subs":[]},{"t":"n","text":"Mix well and cook until heated through","subs":[]},{"t":"n","text":"Top with spicy ranch and fried onions","subs":[]}]}],"stub":false,"source":null},{"id":"porcupine-meatballs","title":"Porcupine Meatballs","category":"Main Dishes","subcategory":"Beef & Pork","sections":[{"label":"Ingredients","items":[{"t":"b","text":"16 oz. lean ground turkey","subs":[]},{"t":"b","text":"Season-all seasoning","subs":[]},{"t":"b","text":"Salt + pepper","subs":[]},{"t":"b","text":"1 cup cooked white jasmine rice","subs":[]},{"t":"b","text":"2 cups marinara sauce","subs":[]},{"t":"b","text":"4 cups cooked spaghetti squash","subs":[]},{"t":"b","text":"4 Tbsp. Parmesan cheese","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 400 degrees. Cut spaghetti squash into 2-inch rings. Place on a baking sheet lined with parchment paper, spray tops with cooking spray and sprinkle with sea salt. Bake 20 minutes, then flip. Bake another 20 minutes. Let cool until you can hold in your hands. Rake into a bowl like spaghetti. Set aside.","subs":[]},{"t":"n","text":"Lower the oven temperature to 375 degrees. In a medium sized bowl mix raw ground turkey, cooked rice and seasonings together. Scoop into balls and place in a greased 9x13 baking pan. Pour 1 cup sauce over the top until well coated. Bake for 45 minutes. (reserve the other ½ of the sauce to use when serving).","subs":[]},{"t":"n","text":"Serve ¼ of the warm meatballs over 1 cup spaghetti squash. Top with ¼ cup sauce and 1 Tbs. Parmesan cheese. Season with salt + pepper if needed. 85 PB","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"350","macros":"33c/12f/27p"},"sourceLabel":"Clean Simple Eats · Summer '18"},{"id":"pot-roast-with-carrots-and-potatoes","title":"Pot Roast with Carrots and Potatoes","category":"Main Dishes","subcategory":"Beef & Pork","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2.25–3 lb chuck roast","subs":[]},{"t":"b","text":"½ onion, thickly sliced","subs":[]},{"t":"b","text":"1 oz au jus gravy mix","subs":[]},{"t":"b","text":"1 packet (1 oz) ranch seasoning mix","subs":[]},{"t":"b","text":"5–6 pepperoncini peppers, whole","subs":[]},{"t":"b","text":"1 lb russet potatoes (about 2–3 large), cut into large chunks","subs":[]},{"t":"b","text":"1 lb carrots, cut into large chunks","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Add the chuck roast and onion to a slow cooker. Pour the seasonings on top and place the pepperoncinis over everything. Cook on low for a total of 10 hours.","subs":[]},{"t":"n","text":"After 6 hours, add the potatoes and carrots and cook for the remaining 4 hours. Season with salt and pepper to taste.","subs":[]},{"t":"n","text":"Serving size is about 4 oz pot roast, 150 g potatoes, and 150 g carrots and onions.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"6","active":"10 min","total":"10 hrs","calories":"371","macros":"35c/7f/42p"},"sourceLabel":"Mamele Macro Meals · Nov '22"},{"id":"roasted-winter-squash-sausage","title":"Roasted Winter Squash & Sausage","category":"Main Dishes","subcategory":"Beef & Pork","sections":[{"label":"Ingredients","items":[{"t":"b","text":"5 large chicken sausage links","subs":[]},{"t":"b","text":"24 oz. butternut squash, peeled","subs":[]},{"t":"b","text":"4 cups Brussels sprouts","subs":[]},{"t":"b","text":"1 red onion","subs":[]},{"t":"b","text":"2 cloves garlic","subs":[]},{"t":"b","text":"1 Tbs. fresh rosemary, chopped (1 tsp. dried)","subs":[]},{"t":"b","text":"1 Tbs. fresh sage, chopped (1 tsp. dried)","subs":[]},{"t":"b","text":"Dash sea salt","subs":[]},{"t":"b","text":"Dash ground pepper","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 425 degrees.","subs":[]},{"t":"n","text":"Slice the chicken sausage. Cube the butternut squash. Trim the Brussels sprouts and slice them in half. Cut the red onion in half and then slice thick. Mince the garlic cloves.","subs":[]},{"t":"n","text":"Combine the sausage and veggies together in a large bowl with the spices and seasonings. Spread out onto a baking sheet lined with foil or parchment paper. Spray tops with cooking spray and roast for 20 minutes or until veggies are lightly browned and tender. Weigh the entire recipe and divide the weight by four to get the amount needed to fill one serving. Enjoy warm.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"330","macros":"33c/12f/23p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"salisbury-steaks","title":"Salisbury Steaks","category":"Main Dishes","subcategory":"Beef & Pork","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 lb ground beef","subs":[]},{"t":"b","text":"1 cup bread crumbs","subs":[]},{"t":"b","text":"⅛ teaspoon pepper","subs":[]},{"t":"b","text":"½ teaspoon dry mustard","subs":[]},{"t":"b","text":"¼ cup ketchup","subs":[]},{"t":"b","text":"⅓ cup evaporated milk","subs":[]},{"t":"b","text":"1 medium onion, chopped","subs":[]},{"t":"b","text":"1 teaspoon seasoned salt","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Mix the ground beef with bread crumbs, pepper, dry mustard, ketchup, evaporated milk, onion, and seasoned salt","subs":[]},{"t":"n","text":"Shape the mixture into patties and brown on the stove","subs":[]},{"t":"n","text":"In a separate bowl, mix together 1 can of cream of mushroom soup and 1 cup of milk","subs":[]},{"t":"n","text":"Pour the soup mixture over the browned patties","subs":[]},{"t":"n","text":"Cover the pan and cook on low for 20 minutes","subs":[]}]}],"stub":false,"source":null},{"id":"skillet-pork-chops-and-apples","title":"Skillet Pork Chops and Apples","category":"Main Dishes","subcategory":"Beef & Pork","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 c brown rice","subs":[]},{"t":"b","text":"2 tbsp olive oil, divided","subs":[]},{"t":"b","text":"4 4-oz pork chops","subs":[]},{"t":"b","text":"1 tsp salt and pepper","subs":[]},{"t":"b","text":"1 c chicken bone broth","subs":[]},{"t":"b","text":"1 tsp coarse Dijon mustard","subs":[]},{"t":"b","text":"1 tbsp fresh sage, chopped","subs":[]},{"t":"b","text":"1 tsp fresh rosemary","subs":[]},{"t":"b","text":"1 tsp dried thyme","subs":[]},{"t":"b","text":"2 Gala apples, sliced","subs":[]},{"t":"b","text":"1 red onion, chopped","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a rice cooker or pressure cooker, cook the rice according to the package directions.","subs":[]},{"t":"n","text":"In a large skillet (cast iron recommended), heat 1 tbsp olive oil over medium-high heat. Season both sides of the pork chops with salt and pepper and sear 3–5 minutes per side.","subs":[]},{"t":"n","text":"In a small mixing bowl, whisk together the bone broth and Dijon. Set aside.","subs":[]},{"t":"n","text":"Remove the pork from the skillet. Add the remaining tbsp of olive oil, the onions, and the apples, along with the sage, rosemary, and thyme. Sauté 5 minutes.","subs":[]},{"t":"n","text":"Add the broth to the skillet and return the pork chops. Mix to combine, turn the heat to medium-low, and simmer 3–4 minutes.","subs":[]},{"t":"n","text":"Serve ½ c rice with 1 pork chop and ¼ of the apples and onions.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"25 min","total":"25 min","calories":"467","macros":"36c/19f/38p"},"sourceLabel":"Mamele Macro Meals · Nov '22"},{"id":"steak-baked-potato","title":"Steak & Baked Potato","category":"Main Dishes","subcategory":"Beef & Pork","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1.5 to 2 lbs steak","subs":[]},{"t":"b","text":"2 to 3 russet potatoes","subs":[]},{"t":"b","text":"Olive oil","subs":[]},{"t":"b","text":"Salt and pepper","subs":[]},{"t":"b","text":"Garlic powder","subs":[]},{"t":"b","text":"Butter or Greek yogurt","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Preheat oven to 400","subs":[]},{"t":"n","text":"Rub potatoes with oil and salt, bake 50 to 60 minutes","subs":[]},{"t":"n","text":"Season steak with salt, pepper, garlic","subs":[]},{"t":"n","text":"Sear in hot pan or grill to preferred doneness","subs":[]},{"t":"n","text":"Rest 5 minutes, slice and serve","subs":[]}]},{"label":"Serve with","items":[{"t":"b","text":"Salad or green beans","subs":[]}]}],"stub":false,"source":null},{"id":"sunday-pot-roast","title":"Sunday Pot Roast","category":"Main Dishes","subcategory":"Beef & Pork","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 2½-lb beef chuck pot roast","subs":[]},{"t":"b","text":"Salt and pepper to taste","subs":[]},{"t":"b","text":"1 medium onion, sliced","subs":[]},{"t":"b","text":"2 bay leaves","subs":[]},{"t":"b","text":"3 potatoes, cut in fourths","subs":[]},{"t":"b","text":"3 carrots, sliced diagonally","subs":[]},{"t":"b","text":"1 large parsnip, sliced diagonally","subs":[]},{"t":"b","text":"2 large celery stalks, sliced diagonally","subs":[]},{"t":"b","text":"1 tsp dried rosemary","subs":[]},{"t":"b","text":"½ tsp dried thyme","subs":[]},{"t":"b","text":"½ cup beef broth","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Trim any excess fat from the beef chuck roast. Cut the beef into serving-size pieces and season with salt and pepper to taste.","subs":[]},{"t":"n","text":"Cut up the vegetables (potatoes, carrots, parsnip, celery, and onion) into desired pieces.","subs":[]},{"t":"n","text":"Place vegetables, onion, and bay leaves in the slow cooker. Sprinkle with rosemary and thyme.","subs":[]},{"t":"n","text":"Arrange the beef cubes over the vegetables. Pour the beef broth over the beef.","subs":[]},{"t":"n","text":"Cover and cook on LOW for about 8-9 hours, or until the beef is tender.","subs":[]},{"t":"n","text":"Remove the beef from the slow cooker and place it on a large serving platter. Arrange the vegetables around the beef and discard the bay leaves.","subs":[]},{"t":"n","text":"Serve the pot roast with juices from the slow cooker or with homemade gravy (see below).","subs":[]}]},{"label":"For Gravy","items":[{"t":"n","text":"Ladle the juices from the slow cooker and place them in a saucepan. Heat to a boil.","subs":[]},{"t":"n","text":"For each cup of juice, mix ¼ cup cold water and 2 tablespoons flour until smooth.","subs":[]},{"t":"n","text":"Add this mixture to the boiling juices, stirring constantly.","subs":[]},{"t":"n","text":"Cook until the gravy has thickened, then serve with the pot roast.","subs":[]}]}],"stub":false,"source":null},{"id":"asian-rice-bowl","title":"Asian Rice Bowl","category":"Main Dishes","subcatego lly. Once it begins to boil, turn heat down to low and continue to whisk until the sauce thickens. Remove from heat and season with salt and pepper.","subs":[]},{"t":"n","text":"Add mayo and mustard to the sauce. Pour over pasta, tuna and veggies. Stir gently until well combined. Transfer to a greased 8x8 baking dish. Sprinkle parmesan cheese and paprika over the top. Bake for 25 minutes. Slice into four equal portions. Enjoy warm.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"350","macros":"36c/11f/26p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"honey-lime-chicken-enchiladas","title":"Honey-Lime Chicken Enchiladas","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 whole grain tortillas","subs":[]},{"t":"b","text":"8 oz. cooked chicken breast, shredded","subs":[]},{"t":"b","text":"¼ cup fresh minced onion","subs":[]},{"t":"b","text":"¼ cup nonfat, plain Greek yogurt","subs":[]},{"t":"b","text":"2 Tbs. honey","subs":[]},{"t":"b","text":"2 Tbs. lime juice","subs":[]},{"t":"b","text":"1 tsp. chili powder","subs":[]},{"t":"b","text":"Dash garlic powder","subs":[]},{"t":"b","text":"½ cup green enchilada sauce","subs":[]},{"t":"b","text":"2 lite Laughing Cow cheese wedge","subs":[]},{"t":"b","text":"¼ cup low-fat, shredded mozzarella cheese","subs":[]},{"t":"b","text":"4 Tbs. fresh Pico De Gallo or salsa","subs":[]},{"t":"b","text":"32 asparagus spears","subs":[]},{"t":"b","text":"2 tsp. olive oil","subs":[]},{"t":"b","text":"Dash of sea salt + pepper","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Add Greek yogurt, honey, lime juice, chili powder and garlic powder to a large Ziploc bag. Massage ingredients together until well combined. Add cooked, shredded chicken and onion to the bag. Massage all ingredients until well combined. Store in the fridge and let marinate 2+ hours.","subs":[]},{"t":"n","text":"Preheat oven to 350 degrees. Weigh chicken mixture and divide by 4. Fill each tortilla with ¼ of the chicken mixture. Roll up tight and place in a greased 9x13 baking dish.","subs":[]},{"t":"n","text":"Beat the Laughing Cow cheese until smooth, then beat in the enchilada sauce. Pour the mixture over the top of the tortillas and then sprinkle with shredded mozzarella.","subs":[]},{"t":"n","text":"Bake for 30 minutes. Top with fresh salsa, salt and pepper to taste.","subs":[]},{"t":"n","text":"Turn oven heat up to 400. Place asparagus on a baking sheet lined with parchment paper. Drizzle olive oil over the top and sprinkle with salt and pepper. Roast for 8 minutes. Enjoy on the side. PB","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"340","macros":"39c/8f/28p"},"sourceLabel":"Clean Simple Eats · Summer '18"},{"id":"poppyseed-chicken-casserole","title":"Poppyseed Chicken Casserole","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 1/2 lbs boneless skinless chicken","subs":[]},{"t":"b","text":"2 (10 3/4 ounce) cans cream of chicken soup","subs":[]},{"t":"b","text":"16 ounces sour cream","subs":[]},{"t":"b","text":"60 Ritz crackers, crushed","subs":[]},{"t":"b","text":"1 tablespoon poppy seeds","subs":[]},{"t":"b","text":"1/2 cup butter, melted","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 350°F","subs":[]},{"t":"n","text":"Place chicken in a pan, cover with water, bring to a boil, then reduce heat and simmer until tender and no longer pink (about 10 minutes). Once cool enough, cut into bite-size pieces","subs":[]},{"t":"n","text":"In a 13x9 inch pan, mix soup with sour cream and spread evenly","subs":[]},{"t":"n","text":"Sprinkle the chicken over the soup mixture","subs":[]},{"t":"n","text":"Place Ritz crackers in a plastic bag and gently crush. Add poppy seeds, shake to combine, then pour melted butter over the crackers and shake again","subs":[]},{"t":"n","text":"Sprinkle cracker mixture over the chicken","subs":[]},{"t":"p","text":"Bake for 30-40 minutes until bubbling around the edges and crackers are golden brown","subs":[]}]}],"stub":false,"source":null},{"id":"spaghetti-pizza-pie","title":"Spaghetti Pizza Pie","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"5 oz. uncooked whole grain spaghetti","subs":[]},{"t":"b","text":"½ cup chopped yellow onions","subs":[]},{"t":"b","text":"½ tsp. fresh, minced garlic","subs":[]},{"t":"b","text":"1 cup chopped spinach","subs":[]},{"t":"b","text":"½ cup lowfat cottage cheese","subs":[]},{"t":"b","text":"2 beaten eggs","subs":[]},{"t":"b","text":"8 oz. raw lean ground turkey","subs":[]},{"t":"b","text":"1 cup marinara sauce","subs":[]},{"t":"b","text":"½ cup low-fat, shredded mozzarella cheese","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 350 degrees. Cook the spaghetti according to the directions on the package.","subs":[]},{"t":"n","text":"Spray a frying pan with cooking spray and sauté onions, garlic and spinach over medium heat until onions are tender. Add the cottage cheese and cook until melted. Remove from heat and place in a bowl.","subs":[]},{"t":"n","text":"Add the cooked spaghetti and beaten egg to the bowl, stir until well combined. Press into two greased 9” pie pans to form a crust.","subs":[]},{"t":"n","text":"Brown the turkey in a pan over med/high heat. Combine cooked ground turkey and marinara sauce, then spread evenly over the spaghetti crusts. Sprinkle cheese on top and bake for 30 minutes. Let stand for five minutes, then cut each pie into four slices and serve warm.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"345","macros":"33c/11f/28p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"spaghetti-squash-bacon-fritters","title":"Spaghetti Squash & Bacon Fritters","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"6 cups roasted spaghetti squash","subs":[]},{"t":"b","text":"4 slices turkey bacon","subs":[]},{"t":"b","text":"4 large eggs","subs":[]},{"t":"b","text":"2 / cup Kodiak Cakes Buttermilk Mix","subs":[]},{"t":"b","text":"3","subs":[]},{"t":"b","text":"1 cup grated Parmesan cheese","subs":[]},{"t":"b","text":"6 chopped green onions","subs":[]},{"t":"b","text":"½ tsp. sea salt","subs":[]},{"t":"b","text":"**Toppings per serving:**","subs":[]},{"t":"b","text":"1 Tbs. nonfat, plain Greek yogurt","subs":[]},{"t":"b","text":"1 Tbs. fresh salsa","subs":[]},{"t":"b","text":"1 Tbs. green onions, chopped","subs":[]},{"t":"b","text":"**Side per serving:**","subs":[]},{"t":"b","text":"2 / cup pomegranate seeds","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Roast spaghetti squash according to directions in the Food Prep Guide. Once cooled, place squash in a paper towel and wring out the liquid with your hands over the sink. Try to get as much of the liquid out as you can.","subs":[]},{"t":"n","text":"Chop the bacon and cook it in a frying pan over medium-high heat until crispy; set aside.","subs":[]},{"t":"n","text":"Beat the eggs with an electric mixture on high for 2 minutes. Add the Kodiak Cakes Mix and beat until well combined. Add the spaghetti squash, parmesan cheese, green onion, bacon and sea salt. Mix until well combined.","subs":[]},{"t":"n","text":"Heat a skillet to medium-high heat. Once hot, spray with cooking spray and spoon ¼ cup of the mixture onto the skillet. Shape and flatten the top so the fritter is level. Repeat with the remaining mixture. Cook until the bottom side is golden brown, then flip the fritter over. Once both sides are golden brown, remove from the pan and top with Greek yogurt, salsa and green onions. Enjoy pomegranate seeds on the side.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"350","macros":"33c/13f/26p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"stuffed-acorn-squash","title":"Stuffed Acorn Squash","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 acorn squash","subs":[]},{"t":"b","text":"Spray oil","subs":[]},{"t":"b","text":"1 tbsp olive oil","subs":[]},{"t":"b","text":"1 small yellow onion, chopped","subs":[]},{"t":"b","text":"2 garlic cloves, minced","subs":[]},{"t":"b","text":"1 lb 99% lean ground turkey","subs":[]},{"t":"b","text":"1 tsp salt and pepper, 1 tbsp dried parsley, 2 tbsp Italian seasoning (divided), 1 tsp dried thyme, 1 tsp dried basil, ½ tsp red pepper flakes","subs":[]},{"t":"b","text":"10 oz cauliflower rice","subs":[]},{"t":"b","text":"2 15-oz cans diced tomatoes","subs":[]},{"t":"b","text":"¼ c parmesan, freshly grated","subs":[]},{"t":"b","text":"½ c fresh basil, chopped","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 425°F.","subs":[]},{"t":"n","text":"Cut the acorn squash in half lengthwise and scrape out the seeds. Lightly spray the flesh with oil and season with salt and pepper to taste. Place flesh side down on a baking sheet and roast for 25 minutes, or until soft and tender.","subs":[]},{"t":"n","text":"While the squash cooks, prepare the filling. In a large skillet, heat the olive oil over medium-high heat. Add the onion, garlic, and ground turkey and sauté until the meat is cooked through, about 5–7 minutes. Add the salt, pepper, parsley, 1 tbsp of the Italian seasoning, thyme, dried basil, and red pepper flakes.","subs":[]},{"t":"n","text":"Add the cauliflower rice, tomatoes, and remaining 1 tbsp Italian seasoning. Mix until well combined. Cover, turn the heat to low, and simmer about 5 minutes, until the squash is done.","subs":[]},{"t":"n","text":"Season the squash flesh with salt and pepper to taste. Each serving is 1 acorn squash and ¼ of the filling, topped with parmesan and fresh basil.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"15 min","total":"35 min","calories":"371","macros":"42c/7f/35p"},"sourceLabel":"Mamele Macro Meals · Oct '22"},{"id":"supreme-pizza-popovers","title":"Supreme Pizza Popovers","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"6 oz. raw lean ground turkey ½ cup chopped mushrooms","subs":[]},{"t":"b","text":"½ tsp. fresh minced garlic ½ cup chopped green bell peppers","subs":[]},{"t":"b","text":"½ tsp. Italian seasoning ¼ cup chopped red onions","subs":[]},{"t":"b","text":"¼ tsp. dried parsley ¼ cup sliced black olives","subs":[]},{"t":"b","text":"¼ tsp. sea salt","subs":[]},{"t":"b","text":"1 ¼ cup self-rising flour","subs":[]},{"t":"b","text":"¼ tsp. dried minced onion 2/3 cup nonfat, plain Greek yogurt","subs":[]},{"t":"b","text":"1/8 tsp. ground black pepper 1 Tbs. water","subs":[]},{"t":"b","text":"1/8 tsp. paprika ½ cup traditional pizza sauce","subs":[]},{"t":"b","text":"Pinch of fennel seeds 1 cup low-fat, shredded mozzarella","subs":[]},{"t":"b","text":"Pinch of red pepper flakes cheese","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 450 degrees.","subs":[]},{"t":"n","text":"Add the ground turkey to a greased skillet. Cook over medium heat until browned. Add all the seasonings and stir until well combined. Chop the veggies then add them to the skillet with the turkey; cook until tender. Transfer to a bowl and weigh the mixture. Divide the weight by four to get the amount needed for one serving.","subs":[]},{"t":"n","text":"Place the self-rising flour, Greek yogurt and water into a mixing bowl. Knead until well combined. If the dough is too dry, add a little water. Weigh the dough and divide it into four equal balls. Flatten each ball and roll out thin into a circle.","subs":[]},{"t":"n","text":"Place 2 Tbs. of the sauce and 2 Tbs. of the cheese into the middle of each dough round and fill with one serving of the turkey mixture. Fold the edges of the dough up over the top of the mixture and pinch together. Place the popovers seam down into the muffin tin. Bake for 15-20 minutes. Enjoy one popover per serving.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"345","macros":"37c/10.5f/25p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"sweet-potato-pie","title":"Sweet Potato Pie","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"24 oz. raw sweet potatoes","subs":[]},{"t":"b","text":"8 slices turkey bacon","subs":[]},{"t":"b","text":"4 large eggs","subs":[]},{"t":"b","text":"½ cup parmesan cheese, grated","subs":[]},{"t":"b","text":"¼ cup green onions, sliced","subs":[]},{"t":"b","text":"2 tsp. minced garlic","subs":[]},{"t":"b","text":"Dash of ground cumin","subs":[]},{"t":"b","text":"Dash of sea salt","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Cook sweet potatoes whole, according to the directions in the Food Prep Guide.","subs":[]},{"t":"n","text":"Chop bacon and cook in a small frying pan over medium heat until crispy.","subs":[]},{"t":"n","text":"Place the cooked sweet potatoes, bacon, eggs, six tablespoons grated Parmesan cheese, green onions, garlic, cumin and sea salt together in a bowl. Beat with a hand mixer until smooth.","subs":[]},{"t":"n","text":"Place mixture into a greased pie round or an 8x8 baking dish. Sprinkle the remaining two tablespoons of Parmesan cheese on top. Bake for 30-35 minutes or until edges begin to brown. Slice into four equal portions. Enjoy warm.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"340","macros":"36c/11f/24p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"tater-tot-casserole","title":"Tater Tot Casserole","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"Cooked hamburger","subs":[]},{"t":"b","text":"Peas & carrots (partially cooked)","subs":[]},{"t":"b","text":"Tater tots","subs":[]},{"t":"b","text":"1 can cream of chicken soup","subs":[]},{"t":"b","text":"1 can cream of mushroom soup","subs":[]},{"t":"b","text":"A little milk","subs":[]},{"t":"b","text":"Cheese (for topping)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Layer the cooked hamburger, partially cooked peas and carrots, and tater tots in a baking dish.","subs":[]},{"t":"n","text":"Mix together the cream of chicken soup, cream of mushroom soup, and a little milk. Add the mixture to the layers.","subs":[]},{"t":"n","text":"Top with cheese.","subs":[]},{"t":"n","text":"Bake at 350°F for 30 minutes, or until it bubbles.","subs":[]}]}],"stub":false,"source":null},{"id":"tomato-herb-spaghetti-squash","title":"Tomato Herb Spaghetti Squash","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Squash:**","subs":[]},{"t":"b","text":"2 large spaghetti squash, cut in half lengthwise","subs":[]},{"t":"b","text":"Spray oil","subs":[]},{"t":"b","text":"1 tsp salt and pepper","subs":[]},{"t":"b","text":"**Meatballs:**","subs":[]},{"t":"b","text":"16 oz 99% lean ground turkey","subs":[]},{"t":"b","text":"¼ c panko","subs":[]},{"t":"b","text":"2 garlic cloves, minced","subs":[]},{"t":"b","text":"½ c fresh basil, chopped","subs":[]},{"t":"b","text":"Salt and pepper","subs":[]},{"t":"b","text":"Spray oil","subs":[]},{"t":"b","text":"1 tbsp olive oil","subs":[]},{"t":"b","text":"**Sauce:**","subs":[]},{"t":"b","text":"4 c Rao's Tomato Herb Sauce","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 400°F.","subs":[]},{"t":"n","text":"Spray the flesh of the spaghetti squash with oil and season with salt and pepper. Place cut side down on a baking sheet and roast 25–30 minutes, until the flesh shreds easily with a fork.","subs":[]},{"t":"n","text":"In a large mixing bowl, mix together the meatball ingredients except the olive oil. Spray your hands with oil and form 16 1-oz meatballs.","subs":[]},{"t":"n","text":"In a large skillet or pot, heat the olive oil over medium-high heat. Sear the meatballs on all sides and cook until almost done. Add the sauce, reduce the heat to low, cover, and simmer 5–10 minutes.","subs":[]},{"t":"n","text":"Serve 1 c sauce and 4 meatballs over half a spaghetti squash.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"15 min","total":"45 min","calories":"405","macros":"30c/17f/33p"},"sourceLabel":"Mamele Macro Meals · Nov '22"},{"id":"tuna-noodle-casserole","title":"Tuna Noodle Casserole","category":"Main Dishes","subcategory":"Casseroles & Bakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 6-oz package medium noodles","subs":[]},{"t":"b","text":"1 can tuna, drained","subs":[]},{"t":"b","text":"½ cup mayonnaise","subs":[]},{"t":"b","text":"1 cup diced celery","subs":[]},{"t":"b","text":"1 cup chopped onion","subs":[]},{"t":"b","text":"¼ cup diced green pepper","subs":[]},{"t":"b","text":"1 tsp salt","subs":[]},{"t":"b","text":"1 can cream of celery soup","subs":[]},{"t":"b","text":"1 can cream of chicken soup","subs":[]},{"t":"b","text":"1 cup milk","subs":[]},{"t":"b","text":"2 cups grated cheese","subs":[]},{"t":"b","text":"Buttered bread crumbs (for topping)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Cook noodles in boiling water until tender, then drain.","subs":[]},{"t":"n","text":"Combine the cooked noodles, drained tuna, mayonnaise, diced vegetables (celery, onion, and green pepper), and salt in a large bowl.","subs":[]},{"t":"n","text":"In a separate bowl, blend the cream of celery soup and cream of chicken soup with the milk. Heat the mixture thoroughly.","subs":[]},{"t":"n","text":"Add the grated cheese to the soup mixture, stirring until the cheese melts and is well combined.","subs":[]},{"t":
