ide. 105 PB","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings heat. Spray chicken with cooking spray and sprinkle","calories":"350","macros":"35c/11f/27p"},"sourceLabel":"Clean Simple Eats · Summer '18"},{"id":"peruvian-chicken-with-cilantro-jalape-o-sauce","title":"Peruvian Chicken with Cilantro Jalapeño Sauce","category":"Main Dishes","subcategory":"Chicken & Turkey","sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Marinade:**","subs":[]},{"t":"b","text":"16 oz chicken breast","subs":[]},{"t":"b","text":"5 garlic cloves, minced","subs":[]},{"t":"b","text":"½ c cilantro, chopped","subs":[]},{"t":"b","text":"1 tbsp extra virgin olive oil","subs":[]},{"t":"b","text":"½ tbsp white wine vinegar","subs":[]},{"t":"b","text":"½ c coconut aminos or low-sodium soy sauce","subs":[]},{"t":"b","text":"1 lime, juiced","subs":[]},{"t":"b","text":"1 tbsp paprika, ½ tbsp ground cumin, 1 tsp oregano, ½ tsp cayenne","subs":[]},{"t":"b","text":"**Side:**","subs":[]},{"t":"b","text":"1 c jasmine rice","subs":[]},{"t":"b","text":"**Cilantro Jalapeño Sauce:**","subs":[]},{"t":"b","text":"½ c plain Greek yogurt, fat free","subs":[]},{"t":"b","text":"1 jalapeño, seeds and membranes removed","subs":[]},{"t":"b","text":"¾ c cilantro, chopped","subs":[]},{"t":"b","text":"3 garlic cloves, minced","subs":[]},{"t":"b","text":"1 lime, juiced","subs":[]},{"t":"b","text":"1 tsp red wine vinegar","subs":[]},{"t":"b","text":"1 tbsp extra virgin olive oil","subs":[]},{"t":"b","text":"2 tbsp queso fresco, crumbled","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large zip-top bag or mixing bowl, combine the marinade ingredients. Refrigerate for at least 20 minutes or up to overnight.","subs":[]},{"t":"n","text":"In a pressure cooker or rice cooker, make the rice.","subs":[]},{"t":"n","text":"After marinating, preheat the oven to 400°F and line a baking sheet with foil.","subs":[]},{"t":"n","text":"Place the chicken and some of the marinade on the baking sheet. Bake for 20–22 minutes.","subs":[]},{"t":"n","text":"While the chicken cooks, blend together the sauce ingredients in a food processor or blender.","subs":[]},{"t":"n","text":"Serve 4 oz chicken over ½ c rice with ¼ of the sauce.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"10 min","total":"55 min","calories":"401","macros":"27c/13f/44p"},"sourceLabel":"Mamele Macro Meals · Sept '22"},{"id":"sanpete-bbq-turkey","title":"Sanpete BBQ Turkey","category":"Main Dishes","subcategory":"Chicken & Turkey","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 parts Sprite","subs":[]},{"t":"b","text":"1 part oil","subs":[]},{"t":"b","text":"1 part soy sauce","subs":[]},{"t":"b","text":"Garlic powder, to taste","subs":[]},{"t":"b","text":"Turkey meat (sliced or cubed)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a bowl, create the sauce by mixing Sprite, oil, soy sauce, and garlic powder.","subs":[]},{"t":"n","text":"Add the turkey meat to the sauce, ensuring it is fully coated, and let it marinate overnight in the refrigerator.","subs":[]},{"t":"n","text":"Preheat the grill to medium-high heat.","subs":[]},{"t":"n","text":"Cook the marinated turkey on the barbecue, turning as needed until fully cooked.","subs":[]}]}],"stub":false,"source":null},{"id":"sheet-pan-greek-chicken","title":"Sheet Pan Greek Chicken","category":"Main Dishes","subcategory":"Chicken & Turkey","sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Greek Chicken and Veggies:**","subs":[]},{"t":"b","text":"1 red bell pepper, chopped","subs":[]},{"t":"b","text":"1 yellow bell pepper, chopped","subs":[]},{"t":"b","text":"½ small red onion, cut into chunks","subs":[]},{"t":"b","text":"1 c cherry tomatoes","subs":[]},{"t":"b","text":"½ c artichoke hearts","subs":[]},{"t":"b","text":"2 garlic cloves, minced","subs":[]},{"t":"b","text":"16 oz chicken breast","subs":[]},{"t":"b","text":"1 lemon, juiced","subs":[]},{"t":"b","text":"½ tbsp olive oil","subs":[]},{"t":"b","text":"Salt and pepper to taste, ½ tbsp smoked paprika, 1 tbsp oregano","subs":[]},{"t":"b","text":"**Sauce:**","subs":[]},{"t":"b","text":"2 tbsp olive oil","subs":[]},{"t":"b","text":"½ tbsp balsamic vinegar","subs":[]},{"t":"b","text":"½ tsp smoked paprika, 1 tsp oregano","subs":[]},{"t":"b","text":"**Sides:**","subs":[]},{"t":"b","text":"¼ c fat free feta","subs":[]},{"t":"b","text":"1 c jasmine rice","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 400°F.","subs":[]},{"t":"n","text":"On a lined baking sheet, arrange the bell peppers, onions, tomatoes, artichoke hearts, garlic, and chicken. Drizzle with the lemon juice and olive oil and season with the oregano, smoked paprika, and salt and pepper to taste.","subs":[]},{"t":"n","text":"In a small mixing bowl, whisk together the sauce ingredients. Pour over the chicken and veggies. Bake 20–25 minutes, until the chicken reaches 165°F.","subs":[]},{"t":"n","text":"Make the rice according to the package instructions.","subs":[]},{"t":"n","text":"When the sheet pan comes out, sprinkle the feta evenly over everything. Split into four portions and serve over the rice.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"15 min","total":"35 min","calories":"427","macros":"32c/15f/41p"},"sourceLabel":"Mamele Macro Meals · Dec '23"},{"id":"skillet-baked-ziti","title":"Skillet Baked Ziti","category":"Main Dishes","subcategory":"Chicken & Turkey","sections":[{"label":"","items":[{"t":"p","text":"Makes: 8 servings","subs":[]},{"t":"p","text":"Prep Time: 10 mins","subs":[]},{"t":"p","text":"Cook Time: 20 mins","subs":[]}]},{"label":"Ingredients","items":[{"t":"b","text":"1 tablespoon olive oil","subs":[]},{"t":"b","text":"3 -4 large garlic cloves, minced","subs":[]},{"t":"b","text":"1/4 teaspoon red pepper flakes","subs":[]},{"t":"b","text":"Table salt and ground black pepper","subs":[]},{"t":"b","text":"1 (28-ounce) can crushed tomatoes (we used Muir Glen fw/basil) (A combo of tomato sauce and diced to all together)","subs":[]},{"t":"b","text":"4 cups water","subs":[]},{"t":"b","text":"1 pound ziti","subs":[]},{"t":"b","text":"1/2 cup heavy cream","subs":[]},{"t":"b","text":"1/2 cup parmesan cheese, grated","subs":[]},{"t":"b","text":"1/4 cup minced fresh basil leaves, or dried to taste","subs":[]},{"t":"b","text":"1 cup mozzarella cheese, shredded","subs":[]}]},{"label":"Directions","items":[{"t":"p","text":"Making the Minutes Count: Measure the water and the pasta before you begin cooking. Prep the Parmesan and basil while the pasta cooks.","subs":[]},{"t":"n","text":"Adjust oven rack to middle position and heat oven to 375 degrees.","subs":[{"t":"n","text":"If using sausage, brown in a separate NON-STICK pan, drain and set aside."}]},{"t":"n","text":"Combine oil, garlic, pepper flakes, and 1/2 teaspoon salt in 12-inch, ovensafe nonstick skillet and saute over medium-high heat until fragrant, about 1 minute. Add crushed tomatoes, water, ziti, and 1/2 teaspoon salt. Cover and cook, stirring often and adjusting heat as needed to maintain vigorous simmer, until ziti is almost tender but barely al dente (almost still a bit hard), about 8-10 minutes. Do not overcook! Pasta will continue cooking in the oven.","subs":[]},{"t":"n","text":"Stir in cream, parmesan, and basil (and sausage if using). Season with salt and pepper to taste. Sauce will be runny! Sprinkle mozzarella evenly over ziti. Transfer skillet to oven and bake until cheese has melted and browned, about 10 minutes. Serve.","subs":[]},{"t":"p","text":"Tip: If you are in a hurry you can broil the top quickly, which is what I usually do. Makes for more saucey pasta which I like. You can also brown some Italian sausage (hot or mild) and add it to the pasta right before putting it in the oven, for a heartier meal.","subs":[]}]}],"stub":false,"source":null},{"id":"slow-cooker-honey-garlic-chicken","title":"Slow Cooker Honey Garlic Chicken","category":"Main Dishes","subcategory":"Chicken & Turkey","sections":[{"label":"Ingredients","items":[{"t":"b","text":"16 oz chicken thighs, boneless, skinless","subs":[]},{"t":"b","text":"12 oz red potatoes, quartered","subs":[]},{"t":"b","text":"12 oz baby carrots","subs":[]},{"t":"b","text":"10 oz green beans, trimmed","subs":[]},{"t":"b","text":"1 tbsp dried parsley","subs":[]},{"t":"b","text":"½ c coconut aminos or low-sodium soy sauce","subs":[]},{"t":"b","text":"⅓ c honey","subs":[]},{"t":"b","text":"¼ c ketchup","subs":[]},{"t":"b","text":"3 garlic cloves, minced","subs":[]},{"t":"b","text":"1 tsp dried basil, 1 tsp oregano, 1 tsp salt and pepper","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a slow cooker, combine all the ingredients and mix until well combined.","subs":[]},{"t":"n","text":"Cook on low for 6 hours.","subs":[]},{"t":"n","text":"Serving size is 4 oz chicken and ¼ of the veggies and sauce.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"5 min","total":"6 hrs","calories":"407","macros":"48c/7f/38p"},"sourceLabel":"Mamele Macro Meals · Oct '22"},{"id":"twice-baked-southwest-sweet-potatoes","title":"Twice-Baked Southwest Sweet Potatoes","category":"Main Dishes","subcategory":"Chicken & Turkey","sections":[{"label":"Ingredients","items":[{"t":"b","text":"400g raw sweet potato","subs":[]},{"t":"b","text":"12 oz. lean ground turkey","subs":[]},{"t":"b","text":"2 Tbs. Taco seasoning","subs":[]},{"t":"b","text":"½ cup black beans, drained and rinsed","subs":[]},{"t":"b","text":"½ cup diced red bell pepper","subs":[]},{"t":"b","text":"1 cup diced broccoli","subs":[]},{"t":"b","text":"½ cup diced yellow onion","subs":[]},{"t":"b","text":"½ cup shredded mozzarella cheese","subs":[]},{"t":"b","text":"4 oz. guacamole","subs":[]},{"t":"b","text":"4 Tbs. non-fat, plain Greek yogurt","subs":[]},{"t":"b","text":"4 Tbs. fresh salsa","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 425 degrees. Poke holes in sweet potatoes, place on a baking sheet lined with parchment paper, spray the tops with cooking spray and sprinkle with sea salt. Bake 30 minutes, flip. Bake another 30 minutes and remove from the oven. Add to a large bowl (with or without peel) and mash up.","subs":[]},{"t":"n","text":"In a large frying pan or skillet, brown turkey with taco seasoning over medium/high heat. Add veggies and sauté a few minutes. Add turkey, veggies and beans to the bowl of sweet potatoes. Stir until well combined.","subs":[]},{"t":"n","text":"Place mixture in a greased 9x13 baking dish or back into skins then sprinkle with cheese. Return to the oven for 10-15 minutes. Divide into 4 equal portions and enjoy warm. Garnish each serving with 1 oz. guacamole, 1 Tbs. Greek yogurt and 1 Tbs. salsa. 104 PB","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"345","macros":"33c/12f/26p"},"sourceLabel":"Clean Simple Eats · Summer '18"},{"id":"warm-spiced-chicken-vegetables","title":"Warm Spiced Chicken & Vegetables","category":"Main Dishes","subcategory":"Chicken & Turkey","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 c cauliflower florets","subs":[]},{"t":"b","text":"2 c broccoli florets","subs":[]},{"t":"b","text":"4 c red potatoes, cubed (600 g)","subs":[]},{"t":"b","text":"2 shallots, sliced","subs":[]},{"t":"b","text":"2 tbsp olive oil","subs":[]},{"t":"b","text":"1 tsp ginger powder (divided), 2½ tbsp garam masala (divided), 2 tsp salt (divided), 2 tsp pepper (divided)","subs":[]},{"t":"b","text":"16 oz chicken breast","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 425°F. Line 2 baking sheets with foil.","subs":[]},{"t":"n","text":"In a large mixing bowl, toss together the cauliflower, broccoli, red potatoes, shallots, olive oil, ½ tsp ginger powder, 2 tbsp garam masala, 1 tsp salt, and 1 tsp pepper.","subs":[]},{"t":"n","text":"Transfer the veggies to one baking sheet and roast for 40–45 minutes.","subs":[]},{"t":"n","text":"Season the chicken with the remaining ½ tsp ginger powder, ½ tbsp garam masala, 1 tsp salt, and 1 tsp pepper.","subs":[]},{"t":"n","text":"After the veggies have roasted about 15 minutes, put the chicken on the second baking sheet and bake for 20–25 minutes, until it reaches 165°F. The chicken and veggies should finish at about the same time.","subs":[]},{"t":"n","text":"Serving size is 4 oz chicken and ¼ of the veggies.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"15 min","total":"1 hr","calories":"385","macros":"26c/13f/41p"},"sourceLabel":"Mamele Macro Meals · Oct '22"},{"id":"baked-teriyaki-tofu","title":"Baked Teriyaki Tofu","category":"Main Dishes","subcategory":"Meatless","sections":[{"label":"Ingredients","items":[{"t":"b","text":"16 oz extra firm tofu","subs":[]},{"t":"b","text":"4 c broccoli florets","subs":[]},{"t":"b","text":"Spray oil","subs":[]},{"t":"b","text":"½ tsp salt and pepper","subs":[]},{"t":"b","text":"1 tbsp cornstarch","subs":[]},{"t":"b","text":"1 tbsp coconut aminos or low-sodium soy sauce","subs":[]},{"t":"b","text":"3 tbsp panko breadcrumbs","subs":[]},{"t":"b","text":"1 c rice","subs":[]},{"t":"b","text":"1 c teriyaki sauce, divided","subs":[]},{"t":"b","text":"¼ c green onions, chopped","subs":[]},{"t":"b","text":"1 tsp sesame seeds","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Press the tofu according to the package instructions (about 30 minutes). Do not skip this step.","subs":[]},{"t":"n","text":"Preheat the oven to 425°F. Line two baking sheets with foil.","subs":[]},{"t":"n","text":"Pour the broccoli onto the first baking sheet, spray with oil, and season with salt and pepper. Set aside.","subs":[]},{"t":"n","text":"Cut the tofu into ½-inch cubes and toss with the cornstarch in a mixing bowl. Add the coconut aminos and breadcrumbs to the same bowl and toss again until well coated.","subs":[]},{"t":"n","text":"Spread the tofu on the second baking sheet. Bake the tofu and broccoli for 25–30 minutes.","subs":[]},{"t":"n","text":"Make the rice according to the package instructions.","subs":[]},{"t":"n","text":"When the tofu and broccoli are done, toss the tofu in ½ c teriyaki sauce, reserving the rest to drizzle over the rice and broccoli.","subs":[]},{"t":"n","text":"Serve each bowl with ½ c rice, 1 c broccoli, 4 oz tofu, 1 tbsp green onion, and ¼ tsp sesame seeds.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"15 min","total":"1 hr","calories":"378","macros":"46c/10f/26p"},"sourceLabel":"Mamele Macro Meals · Dec '23"},{"id":"eggs-goldenrod","title":"Eggs Goldenrod","category":"Main Dishes","subcategory":"Meatless","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 cups white sauce","subs":[]},{"t":"b","text":"4 tablespoons butter","subs":[]},{"t":"b","text":"4 tablespoons flour","subs":[]},{"t":"b","text":"2 cups milk","subs":[]},{"t":"b","text":"4-5 eggs","subs":[]},{"t":"b","text":"Toast","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Boil the eggs","subs":[]},{"t":"n","text":"Chop the egg whites and stir into the white sauce","subs":[]},{"t":"n","text":"Push the yolks through a strainer to create a \"powder\" topping","subs":[]},{"t":"n","text":"Break the toast into pieces, top with the white sauce mixture, and sprinkle the yolk powder over the top","subs":[]}]}],"stub":false,"source":null},{"id":"beef-broccoli-ramen-stir-fry","title":"Beef & Broccoli Ramen Stir Fry","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Sauce:**","subs":[]},{"t":"b","text":"¼ c coconut aminos or low-sodium soy sauce","subs":[]},{"t":"b","text":"1 tbsp cornstarch","subs":[]},{"t":"b","text":"⅓ c beef bone broth","subs":[]},{"t":"b","text":"1 tbsp honey","subs":[]},{"t":"b","text":"2 tbsp hoisin sauce","subs":[]},{"t":"b","text":"1 tbsp rice vinegar","subs":[]},{"t":"b","text":"2 garlic cloves, minced","subs":[]},{"t":"b","t p chopped onion","subs":[]},{"t":"b","text":"1 tsp salt","subs":[]},{"t":"b","text":"1 tsp pepper","subs":[]},{"t":"b","text":"2½ cups water","subs":[]},{"t":"b","text":"1 tablespoon lemon juice","subs":[]},{"t":"b","text":"2 beef bouillon cubes","subs":[]},{"t":"b","text":"1 family-size (12 oz) package egg noodles","subs":[]},{"t":"b","text":"1 can (large) cream of mushroom soup","subs":[]},{"t":"b","text":"1½ to 2 cups sour cream","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Brown the ground beef, onions, and seasonings in a skillet.","subs":[]},{"t":"n","text":"Add the cream of mushroom soup, water, lemon juice, and bouillon cubes. Stir and simmer until the bouillon cubes are dissolved.","subs":[]},{"t":"n","text":"Add the egg noodles and cook until soft.","subs":[]},{"t":"n","text":"Remove from heat and stir in the sour cream.","subs":[]},{"t":"n","text":"Serve warm.","subs":[]}]}],"stub":false,"source":null},{"id":"beef-stroganoff-2","title":"Beef Stroganoff","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 tbsp butter","subs":[]},{"t":"b","text":"½ onion, diced","subs":[]},{"t":"b","text":"12 oz cremini or white mushrooms","subs":[]},{"t":"b","text":"1 tsp salt, ¼ tsp pepper","subs":[]},{"t":"b","text":"1 lb 93% lean ground beef","subs":[]},{"t":"b","text":"2 garlic cloves, minced","subs":[]},{"t":"b","text":"3 tbsp flour","subs":[]},{"t":"b","text":"3½ c beef broth","subs":[]},{"t":"b","text":"1 tbsp Worcestershire sauce","subs":[]},{"t":"b","text":"1 tbsp Dijon mustard","subs":[]},{"t":"b","text":"8 oz egg noodles","subs":[]},{"t":"b","text":"½ c light sour cream","subs":[]},{"t":"b","text":"4 tsp shredded parmesan","subs":[]},{"t":"b","text":"Chopped parsley, for serving (optional)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large skillet, melt the butter over medium-high heat. Add the onion, mushrooms, salt, and pepper and sauté 8–10 minutes, until the mushrooms are tender.","subs":[]},{"t":"n","text":"Add the ground beef and garlic. Cook 4–5 minutes, crumbling the beef as it browns.","subs":[]},{"t":"n","text":"Mix in the flour and cook 2–3 minutes, then add the beef broth, Worcestershire, and Dijon. Mix until combined.","subs":[]},{"t":"n","text":"Bring to a boil, then add the egg noodles. Reduce to a simmer and cover 5–6 minutes, until the noodles are cooked and most of the liquid is absorbed.","subs":[]},{"t":"n","text":"Reduce the heat to low and stir in the sour cream until fully combined. Split into 4 portions and top each with 1 tsp parmesan and chopped parsley if desired.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"15 min","total":"35 min","calories":"362","macros":"24c/14f/35p"},"sourceLabel":"Mamele Macro Meals · Nov '22"},{"id":"boss-baked-mac-cheese","title":"Boss Baked Mac & Cheese","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"3 cups cauliflower florets","subs":[]},{"t":"b","text":"4 oz. whole wheat macaroni or elbow pasta (uncooked)","subs":[]},{"t":"b","text":"1 Italian chicken sausage","subs":[]},{"t":"b","text":"2 slices turkey bacon","subs":[]},{"t":"b","text":"1 Tbs. grass-fed butter","subs":[]},{"t":"b","text":"1 Tbs. Kodiak Cakes Buttermilk Mix","subs":[]},{"t":"b","text":"1 cup fat-free milk","subs":[]},{"t":"b","text":"¼ tsp. sea salt","subs":[]},{"t":"b","text":"Dash of ground black pepper","subs":[]},{"t":"b","text":"½ cup low-fat, shredded cheddar cheese","subs":[]},{"t":"b","text":"6 Tbs. grated Parmesan cheese","subs":[]},{"t":"b","text":"1 slice Ezekiel bread","subs":[]},{"t":"b","text":"Dash of sea salt, garlic powder, paprika, thyme","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Heat oven to 350 degrees.","subs":[]},{"t":"n","text":"Bake cauliflower according to the directions in the Food Prep Guide. Cook macaroni according to the directions on the package. Drain and set aside.","subs":[]},{"t":"n","text":"Slice the chicken sausage into thin rounds and chop bacon into small pieces. Place in a frying pan over medium/high heat. Cook until fragrant and all sides are browned. Remove from heat and set aside.","subs":[]},{"t":"n","text":"In a large saucepan, melt the butter over low/medium heat. Add the Kodiak Cakes and stir until well combined. Slowly whisk in the milk and stir constantly until slightly thickened. Add in the sea salt, black pepper, cheddar cheese and 4 Tbs. of the parmesan cheese. Stir until the cheese is melted into the sauce. Add the cauliflower, macaroni, sausage and bacon to the sauce. Stir until well combined. Pour into an 8x8 baking dish.","subs":[]},{"t":"n","text":"Toast the Ezekiel bread in the toaster until browned on both side. Break into pieces and place in a blender. Pulse until it turns into bread crumbs. Combine the bread crumbs, 2 Tbs. parmesan cheese, sea salt, garlic powder, paprika and thyme together in a bowl. Sprinkle over the top of the macaroni. Bake for 25 minutes. Divide into four equal servings and enjoy warm.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"350","macros":"31.5c/14.5f/23.5p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"brown-butter-mushroom-pasta","title":"Brown Butter Mushroom Pasta","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"12 oz Rigatoni pasta (or your favorite pasta)","subs":[]},{"t":"b","text":"8 tablespoons salted butter, cut into tablespoon pieces","subs":[]},{"t":"b","text":"¼ cup chopped onion","subs":[]},{"t":"b","text":"12 oz cremini or baby bella mushrooms, sliced","subs":[]},{"t":"b","text":"4 cloves garlic, chopped","subs":[]},{"t":"b","text":"1/8 teaspoon dried thyme","subs":[]},{"t":"b","text":"Kosher salt and freshly ground black pepper, to taste","subs":[]},{"t":"b","text":"½ cup freshly grated Parmesan cheese (or mozzarella cheese)","subs":[]},{"t":"b","text":"For serving: chopped fresh parsley, crushed red pepper flakes, extra Parmesan cheese (optional)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Bring a large pot of water to a boil and season generously with salt. Once boiling, add the pasta and cook, stirring occasionally, until al dente. Reserve ½ cup of the pasta water and drain.","subs":[]},{"t":"n","text":"In a large skillet, melt the butter over medium heat.","subs":[{"t":"b","text":"Swirl occasionally until the butter starts to foam and smells nutty (about 3-4 minutes)."},{"t":"b","text":"Add the mushrooms and onion and cook, stirring occasionally, until the mushrooms are tender and browned (about 5 minutes)."},{"t":"b","text":"Add the garlic and thyme, cooking for 2 more minutes."},{"t":"b","text":"Season with salt and black pepper, to taste."}]},{"t":"n","text":"Add the cooked pasta to the skillet and stir in the reserved pasta water.","subs":[{"t":"b","text":"Reduce heat to low and add half of the Parmesan cheese, stirring gently until melted."},{"t":"b","text":"Add the remaining cheese and stir until fully melted. You can also use tongs to toss the pasta and cheese to avoid clumping."},{"t":"b","text":"Taste and season with more salt and pepper if necessary."}]},{"t":"n","text":"Transfer the pasta to plates or bowls.","subs":[{"t":"b","text":"Garnish with chopped parsley, crushed red pepper flakes, and extra Parmesan cheese if desired."}]}]}],"stub":false,"source":null},{"id":"california-club-tortilla-pizza","title":"California Club Tortilla Pizza","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 oz. cooked chicken breast","subs":[]},{"t":"b","text":"4 slices turkey bacon, chopped","subs":[]},{"t":"b","text":"4 brown rice tortillas","subs":[]},{"t":"b","text":"1 cup low-fat, shredded mozzarella cheese","subs":[]},{"t":"b","text":"¼ cup low-fat mayo","subs":[]},{"t":"b","text":"¼ cup fresh lemon juice","subs":[]},{"t":"b","text":"Dash ground black pepper","subs":[]},{"t":"b","text":"4 cups baby spring mix salad","subs":[]},{"t":"b","text":"2 vine tomatoes, sliced thin","subs":[]},{"t":"b","text":"60g avocado, sliced thin","subs":[]},{"t":"b","text":"Fresh basil, chopped","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 350 degrees.","subs":[]},{"t":"n","text":"Cook the chicken according to the directions in the Food Prep Guide. Shred and set aside.","subs":[]},{"t":"n","text":"Add the chopped bacon to a pan or skillet over medium-high heat. Cook until crispy.","subs":[]},{"t":"n","text":"Place the tortillas on a baking sheet lined with parchment paper. Layer one slice chopped bacon, 1 oz. shredded chicken and ¼ cup cheese to each tortilla. Bake for 10 minutes or until the cheese is melted and lightly brown.","subs":[]},{"t":"n","text":"While baking, combine the mayo, lemon juice and pepper in a small bowl. Toss with spring salad mix.","subs":[]},{"t":"n","text":"Top each tortilla pizza with sliced tomatoes, 15g sliced avocado, ¼ of the salad and fresh basil.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"345","macros":"33c/12f/26p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"cheesy-broccoli-bacon-penne","title":"Cheesy Broccoli & Bacon Penne","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 cups broccoli","subs":[]},{"t":"b","text":"4 oz. uncooked, whole-wheat penne pasta","subs":[]},{"t":"b","text":"Pinch of sea salt","subs":[]},{"t":"b","text":"1 Tbs. olive oil","subs":[]},{"t":"b","text":"6 slices turkey bacon, chopped","subs":[]},{"t":"b","text":"¼ cup fresh, minced yellow onion","subs":[]},{"t":"b","text":"1 tsp. fresh, minced garlic","subs":[]},{"t":"b","text":"¼ cup unsweetened almond milk","subs":[]},{"t":"b","text":"4 light Laughing Cow cheese wedges","subs":[]},{"t":"b","text":"½ cup low-fat, shredded mozzarella cheese","subs":[]},{"t":"b","text":"¼ cup grated Parmesan cheese","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Roast broccoli according to directions in the Food Prep Guide.","subs":[]},{"t":"n","text":"Cook the pasta with sea salt according to directions on package; drain. Remove the pot from the heat and add pasta back to the pot with the olive oil.","subs":[]},{"t":"n","text":"Heat a frying pan over medium-high heat. Spray with cooking spray and add the chopped bacon. Cook until crispy, then remove from pan. Turn the heat down to medium/low. Add the onions and garlic; sauté until tender. Add the almond milk and cheese wedges; stir until cheese is completely melted.","subs":[]},{"t":"n","text":"Add the cheese mixture, bacon and broccoli to the pasta. Stir until well combined. Stir in the shredded mozzarella and Parmesan cheeses. Weigh the entire recipe and divide the weight by four to get the amount needed to fill one serving. Enjoy warm. Add salt and pepper as needed, to taste.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"345","macros":"35c/12f/24p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"chicken-orzo-w-zucchini-tomato","title":"Chicken Orzo w/ Zucchini & Tomato","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 medium zucchinis (about 2 cups when sliced)","subs":[]},{"t":"b","text":"2 Roma tomatoes (about 2 cups when cut into wedges)","subs":[]},{"t":"b","text":"1 1/2 teaspoons Italian seasoning","subs":[]},{"t":"b","text":"1 cup orzo pasta (or half the package)","subs":[]},{"t":"b","text":"2 boneless, skinless chicken breasts (about 1 lb)","subs":[]},{"t":"b","text":"4 oz fresh mozzarella (cut into ½-inch cubes)","subs":[]},{"t":"b","text":"1 lemon (for juice and zest)","subs":[]},{"t":"b","text":"2 tablespoons fresh parsley (chopped, for garnish)","subs":[]},{"t":"b","text":"1/2 cup panko breadcrumbs","subs":[]},{"t":"b","text":"1/4 cup grated Parmesan cheese","subs":[]},{"t":"b","text":"2 tablespoons olive oil (for roasting and cooking)","subs":[]},{"t":"b","text":"Salt (to taste)","subs":[]},{"t":"b","text":"Pepper (to taste)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Wash and dry all produce. Adjust rack to upper position and preheat oven to 425°F. Bring a large pot of salted water to a boil. Slice zucchinis into ¼-inch-thick rounds. Cut tomatoes into ½-inch-thick wedges. Toss zucchini and tomato with 1 tablespoon olive oil and half the Italian seasoning on a baking sheet. Season with salt and pepper.","subs":[]},{"t":"n","text":"Roast zucchini and tomatoes in the oven until just shy of tender, about 10 minutes. Once the water is boiling, add 1 cup orzo to the pot (use the rest as you like). Cook, stirring occasionally, until al dente, about 9-11 minutes. Drain, then return to pot.","subs":[]},{"t":"n","text":"With your hand on top of each chicken breast, cut ¾ of the way through the middle, parallel to the cutting board, stopping before you slice through completely. Repeat with the other chicken breast. Open each up and season all over with salt, pepper, and the remaining Italian seasoning.","subs":[]},{"t":"n","text":"Heat a drizzle of olive oil in a large pan over medium-high heat. Add chicken and cook until no longer pink in the center, about 3-4 minutes per side. Remove from pan and set aside on a plate. Meanwhile, cut mozzarella into ½-inch cubes. Halve the lemon. Roughly chop the parsley.","subs":[]},{"t":"n","text":"Once veggies have roasted for 10 minutes, remove the baking sheet from the oven. Heat the broiler to high or increase oven temperature to 500°F. Sprinkle veggies with panko breadcrumbs, mozzarella, and Parmesan cheese. Broil (or bake) until panko is golden brown, cheese is melted, and veggies are tender, about 3-5 minutes.","subs":[]},{"t":"n","text":"Add juice from one lemon half and half the parsley to the pot with orzo and toss to combine. Season to taste with salt and pepper. Divide orzo between plates. Top with roasted veggies and chicken. Drizzle with any chicken juices from the plate and a squeeze of lemon. Garnish with remaining parsley and serve.","subs":[]}]}],"stub":false,"source":null},{"id":"chicken-pad-thai","title":"Chicken Pad Thai","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 oz. uncooked, pad thai, brown rice noodles","subs":[]},{"t":"b","text":"¼ cup natural peanut butter","subs":[]},{"t":"b","text":"¼ cup rice vinegar","subs":[]},{"t":"b","text":"2 Tbs. coconut aminos","subs":[]},{"t":"b","text":"2 Tbs. raw honey","subs":[]},{"t":"b","text":"1 Tbs. fresh, minced garlic","subs":[]},{"t":"b","text":"½ cup fresh, minced yellow onion","subs":[]},{"t":"b","text":"11 oz. raw chicken breast","subs":[]},{"t":"b","text":"2 cups chopped red bell peppers","subs":[]},{"t":"b","text":"1 cup sliced green onions","subs":[]},{"t":"b","text":"2 cups bean sprouts","subs":[]},{"t":"b","text":"**Toppings per serving:**","subs":[]},{"t":"b","text":"5g peanuts","subs":[]},{"t":"b","text":"½ lime, juice of","subs":[]},{"t":"b","text":"Fresh cilantro","subs":[]},{"t":"b","text":"Sea salt and pepper, to taste","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Cook the noodles according to directions on the package. Drain and set aside.","subs":[]},{"t":"n","text":"Whisk peanut butter, rice vinegar, coconut aminos and honey in a bowl. If sauce is too thick, add a little water; set aside.","subs":[]},{"t":"n","text":"Spray a skillet with cooking spray and add the minced garlic and onions. Chop the chicken and chicken to the skillet. Cook until all the sides are golden brown and the chicken is cooked through.","subs":[]},{"t":"n","text":"Add the veggies and sauce; cook until tender. Add the noodles last. Weigh the entire recipe and divide by four to get the amount needed to fill one serving. Garnish each serving with the toppings listed. Season with salt and pepper to taste.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"350","macros":"36c/11f/26p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"chicken-parmesan-pasta","title":"Chicken Parmesan Pasta","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 tablespoons Italian dressing (not the creamy kind)","subs":[]},{"t":"b","text":"3 boneless, skinless chicken breasts, cut into cubes","subs":[]},{"t":"b","text":"16 ounces rigatoni pasta (small/medium)","subs":[]},{"t":"b","text":"1 24-ounce jar marinara sauce (Delallo's recommended)","subs":[]},{"t":"b","text":"1/2 cup shredded mozzarella cheese","subs":[]},{"t":"b","text":"1/2 cup grated parmesan cheese","subs":[]},{"t":"b","text":"Salt and pepper to taste","subs":[]},{"t":"b","text":"Chopped fresh basil for garnish (optional)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Heat chicken and Italian dressing in a large 12-inch skillet over medium-high heat (or use a stock pot if you don’t have a large skillet)","subs":[]},{"t":"n","text":"Season chicken with salt and pepper to taste and cook until browned and just cooked through, about 5 minutes (depending on thickness of chicken)","subs":[]},{"t":"n","text":"Add pasta and marinara sauce to the skillet, then fill the empty marinara jar with water and add it to the skillet (use 2 cups of water if using a stockpot)","subs":[]},{"t":"n","text":"Stir the mixture lightly to combine and bring to a boil","subs":[]},{"t":"n","text":"Reduce to a simmer, cover, and cook for 15 minutes or until pasta is tender to your liking (see note)","subs":[]},{"t":"n","text":"Cover with grated parmesan and shredded mozzarella cheese, no need to stir","subs":[]},{"t":"n","text":"Continue to cook for 2-3 more minutes or until cheese is fully melted, or broil the entire skillet le-bowl","title":"Korean Chicken Noodle Bowl","category":"Main Dishes","subcategory":"Pasta & Pizza","sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Sauce:**","subs":[]},{"t":"b","text":"3 tbsp brown sugar","subs":[]},{"t":"b","text":"¼ c rice vinegar","subs":[]},{"t":"b","text":"¼ c coconut aminos or low-sodium soy sauce","subs":[]},{"t":"b","text":"1 tbsp sriracha (medium-high spice; use less for milder)","subs":[]},{"t":"b","text":"4 garlic cloves, minced","subs":[]},{"t":"b","text":"1 tbsp ginger, minced","subs":[]},{"t":"b","text":"1 lime, juiced","subs":[]},{"t":"b","text":"**Bowl:**","subs":[]},{"t":"b","text":"24 oz chicken breast, cut into bite-size pieces","subs":[]},{"t":"b","text":"1 tbsp cornstarch","subs":[]},{"t":"b","text":"2 tbsp extra virgin olive oil, divided","subs":[]},{"t":"b","text":"12 oz green beans","subs":[]},{"t":"b","text":"1 c edamame","subs":[]},{"t":"b","text":"½ tsp salt and pepper","subs":[]},{"t":"b","text":"2 tbsp chives, chopped","subs":[]},{"t":"b","text":"6 oz thin rice noodles (Maifun noodles)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a small mixing bowl, whisk together the sauce ingredients.","subs":[]},{"t":"n","text":"Add the chicken and cornstarch to a gallon-size zip-top bag and shake until well coated.","subs":[]},{"t":"n","text":"In a large skillet or wok, heat 1 tbsp olive oil over medium-high heat. Sauté the chicken for 5–7 minutes, until it reaches 165°F, getting a golden sear on all sides. Transfer to a plate. Add the remaining tbsp of olive oil, then the green beans, edamame, salt, and pepper; cook over medium-high heat for 6–8 minutes, until fork-tender. Reduce heat to low.","subs":[]},{"t":"n","text":"Add the sauce and chicken to the skillet and simmer for 5–10 minutes. Sprinkle the chives over the top.","subs":[]},{"t":"n","text":"While the sauce simmers, soak the rice noodles in hot water for 6–9 minutes.","subs":[]},{"t":"n","text":"Push the chicken and vegetables to one s text":"*1 roasted red pepper (I used the ones from the jar = easiest), sliced into small cubes*","subs":[]},{"t":"b","text":"*1/2 cup slivered almonds, toasted*","subs":[]},{"t":"b","text":"*1 batch of homemade basil pesto (basil, garlic, pine nuts, EVOO, parmesan, lemon juice)*","subs":[]},{"t":"b","text":"*1 cup real mayonnaise (I love Miracle Whip, but don't use it with this recipe)*","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a bowl, mix together chicken breast, roasted red pepper, slivered almonds, basil pesto, and mayo until just combined","subs":[]},{"t":"n","text":"Slightly broil your ciabatta rolls in the oven so they're warm and a little crispy (or use a panini maker after assembling the sandwich)","subs":[]},{"t":"n","text":"On the bottom half of the ciabatta roll, layer on muenster cheese, chicken mixture, tomato (seasoned with salt and pepper), and alfalfa sprouts","subs":[]},{"t":"n","text":"Top with the other half of the roll, and use a toothpick to hold it in place","subs":[]}]}],"stub":false,"source":null},{"id":"canning","title":"Canning","category":"Pantry & Extras","subcategory":"Canning & Preserving","sections":[{"label":"","items":[{"t":"img","text":"assets/canning.png","subs":[]}]}],"stub":false,"source":null},{"id":"chili-sauce","title":"Chili Sauce","category":"Pantry & Extras","subcategory":"Canning & Preserving","sections":[{"label":"Ingredients","items":[{"t":"b","text":"7 quarts peeled, mashed ripe tomatoes","subs":[]},{"t":"b","text":"4 chopped green peppers","subs":[]},{"t":"b","text":"3 cups chopped onions","subs":[]},{"t":"b","text":"4 cups white sugar","subs":[]},{"t":"b","text":"5 cups vinegar","subs":[]},{"t":"b","text":"3 cups brown sugar","subs":[]},{"t":"b","text":"6 tablespoons salt","subs":[]},{"t":"b","text":"Put spices in cheesecloth bag:","subs":[{"t":"b","text":"5 tablespoons whole pickling spice"},{"t":"b","text":"2 teaspoons cloves"},{"t":"b","text":"2 small hot chili peppers"},{"t":"b","text":"2 teaspoons nutmeg"},{"t":"b","text":"2 teaspoons cinnamon"}]}]},{"label":"Directions","items":[{"t":"n","text":"Boil until thick, for five or six hours on low heat","subs":[]},{"t":"n","text":"Stir often","subs":[]}]}],"stub":false,"source":null},{"id":"cooking-time-for-fruit","title":"Cooking Time For Fruit","category":"Pantry & Extras","subcategory":"Canning & Preserving","sections":[{"label":"","items":[{"t":"b","text":"**peaches:** 1 cup sugar, 18-minutes","subs":[]},{"t":"b","text":"**pears:** 1/2 cup sugar, 13-minutes","subs":[]},{"t":"b","text":"**raspberries:** 1 cup sugar, 10-14 minutes","subs":[]},{"t":"b","text":"**tomato juice:** 1/2 tsp salt, 4 quarts=10tbsp sugar, 10 minutes","subs":[]},{"t":"b","text":"**stewed tomatoes:** 1 tsp salt, 2 tsp sugar, 30 minutes","subs":[]}]}],"stub":false,"source":null},{"id":"dill-pickles","title":"Dill Pickles","category":"Pantry & Extras","subcategory":"Canning & Preserving","sections":[{"label":"Ingredients","items":[{"t":"b","text":"Fresh dill to cover the bottom of the jar","subs":[]},{"t":"b","text":"2 tablespoons uniodized salt, dissolved","subs":[]},{"t":"b","text":"1 clove garlic","subs":[]},{"t":"b","text":"¾ to 1 cup amber vinegar","subs":[]},{"t":"b","text":"1 cup hot water","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Prepare the jar by filling the bottom with dill","subs":[]},{"t":"n","text":"Dissolve 2 tablespoons of uniodized salt in the hot water","subs":[]},{"t":"n","text":"Add a clove of garlic to the jar","subs":[]},{"t":"n","text":"Pour in the amber vinegar and the saltwater mixture","subs":[]},{"t":"n","text":"Process the jar in boiling water for 5 minutes","subs":[]}]}],"stub":false,"source":null},{"id":"frozen-fruit-cocktail","title":"Frozen Fruit Cocktail","category":"Pantry & Extras","subcategory":"Canning & Preserving","sections":[{"label":"Ingredients","items":[{"t":"b","text":"3 cups diced peaches","subs":[]},{"t":"b","text":"3 cups diced pears","subs":[]},{"t":"b","text":"1 (20 oz) can crushed pineapple","subs":[]},{"t":"b","text":"1 cup sugar","subs":[]},{"t":"b","text":"½ cup frozen orange juice (diluted)","subs":[]},{"t":"b","text":"3½ tablespoons lemon juice","subs":[]},{"t":"b","text":"If desired, small bottle of maraschino cherries","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Mix and freeze","subs":[]}]}],"stub":false,"source":null},{"id":"frozen-strawberry-jam","title":"Frozen Strawberry Jam","category":"Pantry & Extras","subcategory":"Canning & Preserving","sections":[{"label":"Ingredients","items":[{"t":"b","text":"3¼ cups strawberries or raspberries (fresh, hulled, and crushed)","subs":[]},{"t":"b","text":"1 cup light corn syrup","subs":[]},{"t":"b","text":"1 package MCP pectin","subs":[]},{"t":"b","text":"4½ cups sugar","subs":[]},{"t":"b","text":"¼ cup lemon juice","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"**Prepare Fruit and Measure Ingredients:**","subs":[{"t":"b","text":"Measure out 3¼ cups of prepared strawberries or raspberries and ¼ cup of lemon juice."},{"t":"b","text":"In a separate bowl, measure 4½ cups of sugar and set aside."}]},{"t":"n","text":"**Combine Pectin with Fruit:**","subs":[{"t":"b","text":"Gradually stir 1 package of MCP pectin into the fruit mixture, making sure it is mixed thoroughly."},{"t":"b","text":"Set this mixture aside for 30 minutes, stirring occasionally to ensure the pectin fully dissolves."}]},{"t":"n","text":"**Add Corn Syrup:**","subs":[{"t":"b","text":"Pour 1 cup of light corn syrup into the fruit mixture and mix well. This helps prevent sugar from crystallizing during freezer storage."}]},{"t":"n","text":"**Add Sugar:**","subs":[{"t":"b","text":"Gradually stir in the sugar. Continue to mix until the sugar is fully dissolved."},{"t":"b","text":"Optionally, you may heat the mixture on the stove to a warm temperature (do not boil) to help dissolve the sugar."}]},{"t":"n","text":"**Prepare for Freezing:**","subs":[{"t":"b","text":"Pour the jam into freezer-safe containers, leaving about ½ inch of space at the top."},{"t":"b","text":"Wipe off the edges of each container to ensure a clean seal, then cover with lids."}]},{"t":"n","text":"**Freeze:**","subs":[{"t":"b","text":"Place containers in the freezer. The jam will last several months in the freezer and can be stored in the refrigerator once thawed."}]}]}],"stub":false,"source":null},{"id":"pickled-beets","title":"Pickled Beets","category":"Pantry & Extras","subcategory":"Canning & Preserving","sections":[{"label":"Ingredients","items":[{"t":"b","text":"10 pounds fresh, small beets, stems removed","subs":[]},{"t":"b","text":"2 cups vinegar","subs":[]},{"t":"b","text":"1 tablespoon pickling salt","subs":[]},{"t":"b","text":"1 quart vinegar","subs":[]},{"t":"b","text":"¼ cup whole cloves","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"**Prepare the Beets**","subs":[{"t":"b","text":"Place beets in a large stockpot and cover with water."},{"t":"b","text":"Bring to a boil and cook until tender, about 15 minutes (adjust time depending on beet size)."},{"t":"b","text":"If beets are large, cut them into quarters."},{"t":"b","text":"Drain the beets, reserving 2 cups of the beet cooking water. Cool and peel the beets."}]},{"t":"n","text":"**Sterilize Jars**","subs":[{"t":"b","text":"Sterilize jars and lids by immersing them in boiling water for at least 10 minutes."},{"t":"b","text":"Place several whole cloves in each sterilized jar, then fill with the peeled beets."}]},{"t":"n","text":"**Prepare the Brine**","subs":[{"t":"b","text":"In a large saucepan, combine the sugar, reserved beet water, vinegar, and pickling salt."},{"t":"b","text":"Bring to a rapid boil."}]},{"t":"n","text":"**Pour Brine and Seal Jars**","subs":[{"t":"b","text":"Pour the hot brine over the beets in the jars, filling each jar, then seal with lids."}]},{"t":"n","text":"**Process the Jars**","subs":[{"t":"b","text":"Place a rack in the bottom of a large stockpot and fill halfway with water. Bring the water to a boil over high heat."},{"t":"b","text":"Carefully lower the jars into the pot, leaving 2 inches of space between each jar."},{"t":"b","text":"Add more boiling water if needed to ensure the water level is at least 1 inch above the jar tops."},{"t":"b","text":"Cover the pot and process the jars in boiling water for 10 minutes."}]}]},{"label":"Let jars cool completely, and store in a cool, dark place.","items":[]}],"stub":false,"source":null},{"id":"salsa","title":"Salsa","category":"Pantry & Extras","subcategory":"Canning & Preserving","sections":[{"label":"Ingredients","items":[{"t":"b","text":"9 quarts diced tomatoes (4½-5 Tupperware containers)","subs":[]},{"t":"b","text":"10 large onions, chopped","subs":[]},{"t":"b","text":"4 red peppers, chopped","subs":[]},{"t":"b","text":"4 green peppers, chopped","subs":[]},{"t":"b","text":"2 or 3 jalapeño peppers, chopped (use gloves when cutting them up)","subs":[]},{"t":"b","text":"4 cloves garlic","subs":[]},{"t":"b","text":"2 cups vinegar","subs":[]},{"t":"b","text":"2 cups sugar","subs":[]},{"t":"b","text":"½ cup salt","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Cook in a heavy pan for at least 7 or 8 hours","subs":[]},{"t":"n","text":"Bottle in pint-size jars and then hot water bath for 10 minutes","subs":[]}]}],"stub":false,"source":null},{"id":"bubble-bath","title":"Bubble Bath","category":"Pantry & Extras","subcategory":"Household","sections":[{"label":"Ingredients","items":[{"t":"b","text":"½ cup dry detergent","subs":[]},{"t":"b","text":"Few drops of food coloring","subs":[]},{"t":"b","text":"1 cup Epsom salt","subs":[]},{"t":"b","text":"1-2 drops of cologne","subs":[]},{"t":"b","text":"5 drops glycerin","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Combine all ingredients in a bowl, mixing well.","subs":[]},{"t":"n","text":"Store in a tightly sealed container.","subs":[]},{"t":"n","text":"Add to your bathwater for a fragrant, relaxing soak.","subs":[]}]}],"stub":false,"source":null},{"id":"scents-of-the-holidays","title":"Scents of the Holidays","category":"Pantry & Extras","subcategory":"Household","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 cinnamon sticks","subs":[]},{"t":"b","text":"3 whole cloves","subs":[]},{"t":"b","text":"3 whole allspice","subs":[]},{"t":"b","text":"3 cups water","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"In a small saucepan, combine the cinnamon sticks, cloves, allspice, and water.","subs":[]},{"t":"n","text":"Bring to a boil, then reduce heat and simmer over low heat.","subs":[]},{"t":"n","text":"Check the mixture periodically and add more water if necessary.","subs":[]},{"t":"n","text":"Simmer the mixture before guests arrive to fill your home with the “scents of the holidays.","subs":[]}]}],"stub":false,"source":null},{"id":"baking-powder","title":"Baking Powder","category":"Pantry & Extras","subcategory":"Kitchen Staples","sections":[{"label":"Ingredients","items":[{"t":"b","text":"8 oz bicarbonate of soda","subs":[]},{"t":"b","text":"1 package tartaric acid","subs":[]},{"t":"b","text":"1 package high-grade cornstarch","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Combine all ingredients and sift thoroughly five times.","subs":[]},{"t":"n","text":"Store in a tightly covered glass jar or tin.","subs":[]}]}],"stub":false,"source":null},{"id":"flour-seasoning","title":"Flour Seasoning","category":"Pantry & Extras","subcategory":"Kitchen Staples","sections":[{"label":"Ingredients","items":[{"t":"b","text":"¾ cup salt","subs":[]},{"t":"b","text":"¼ cup MSG (Accent)","subs":[]},{"t":"b","text":"¼ cup black pepper","subs":[]},{"t":"b","text":"2 tablespoons poultry seasoning","subs":[]},{"t":"b","text":"¼ cup white pepper","subs":[]},{"t":"b","text":"½ teaspoon sage","subs":[]},{"t":"b","text":"½ teaspoon paprika","subs":[]},{"t":"b","text":"5-pound bag flour","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Mix all the ingredients together.","subs":[]},{"t":"n","text":"Add the flour and mix thoroughly until well combined.","subs":[]}]}],"stub":false,"source":null},{"id":"graham-crackers","title":"Graham Crackers","category":"Pantry & Extras","subcategory":"Kitchen Staples","sections":[{"label":"Ingredients","items":[]},{"label":"Stir together","items":[{"t":"b","text":"2 cups whole wheat flour","subs":[]},{"t":"b","text":"1 cup enriched white flour","subs":[]},{"t":"b","text":"1 teaspoon baking powder","subs":[]},{"t":"b","text":"½ teaspoon baking soda","subs":[]},{"t":"b","text":"¼ teaspoon salt","subs":[]}]},{"label":"Cream until fluffy","items":[{"t":"b","text":"½ cup shortening","subs":[]},{"t":"b","text":"1 cup packed brown sugar","subs":[]},{"t":"b","text":"1 cup granulated sugar","subs":[]},{"t":"b","text":"1 teaspoon vanilla","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Add the flour mixture to the creamed ingredients, alternating with ½ cup milk, mixing well after each addition.","subs":[]},{"t":"n","text":"Chill the dough overnight or for several hours.","subs":[]},{"t":"n","text":"Divide the dough into quarters. Roll out each portion on a floured surface to about ¼ inch thick.","subs":[]},{"t":"n","text":"Trim the dough into 5 x 15-inch rectangles, then cut into six 2½ x 5-inch rectangles.","subs":[]},{"t":"n","text":"Mark a line down the center of each dough piece with the edge of a knife. Use a fork to mark each inch.","subs":[]},{"t":"n","text":"Place on a greased cookie sheet and bake at 350°F for 10-15 minutes or until golden.","subs":[]}]}],"stub":false,"source":null},{"id":"sweet-condensed-milk","title":"Sweet + Condensed Milk","category":"Pantry & Extras","subcategory":"Kitchen Staples","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup hot water","subs":[]},{"t":"b","text":"½ cup butter","subs":[]},{"t":"b","text":"2 cups sugar","subs":[]},{"t":"b","text":"¼ cup powdered milk","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Place all ingredients in a blender and mix until smooth.","subs":[]},{"t":"n","text":"Store in the fridge.","subs":[]},{"t":"n","text":"Note: 1½ cups of this mixture equals 1 can of condensed milk.","subs":[]}]}],"stub":false,"source":null},{"id":"bean-salsa","title":"Bean Salsa","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 (16 oz) carton of your favorite fresh salsa","subs":[]},{"t":"b","text":"Juice from 1 lime, plus zest","subs":[]},{"t":"b","text":"4-5 diced tomatoes","subs":[]},{"t":"b","text":"Fresh cilantro, to taste","subs":[]},{"t":"b","text":"1 can black-eyed peas, drained","subs":[]},{"t":"b","text":"Garlic powder, to taste","subs":[]},{"t":"b","text":"1 can black beans, drained","subs":[]},{"t":"b","text":"Salt and pepper, to taste","subs":[]},{"t":"b","text":"1 can corn niblets, drained","subs":[]},{"t":"b","text":"2 avocados, cubed","subs":[]},{"t":"b","text":"1 small can chopped olives","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large bowl, combine the fresh salsa, lime juice, and lime zest.","subs":[]},{"t":"n","text":"Add the diced tomatoes, cilantro, black-eyed peas, black beans, corn, avocados, and chopped olives.","subs":[]},{"t":"n","text":"Season with garlic powder, salt, and pepper to taste.","subs":[]},{"t":"n","text":"Gently mix to combine and chill before serving.","subs":[]}]}],"stub":false,"source":null},{"id":"bread-bowl-artichoke-dip-emily-dyches","title":"Bread Bowl Artichoke Dip (Emily Dyches)","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 (16 oz) sourdough bread rounds (about 6-in diameter), divided","subs":[]},{"t":"b","text":"Vegetable oil","subs":[]},{"t":"b","text":"4 oz cream cheese, softened","subs":[]},{"t":"b","text":"1/2 cup milk","subs":[]},{"t":"b","text":"1 (14 oz) can artichoke hearts in water, drained","subs":[]},{"t":"b","text":"1 (4 oz) envelope vegetable soup mix","subs":[]},{"t":"b","text":"1 garlic clove, pressed","subs":[]},{"t":"b","text":"2 tablespoons lemon juice","subs":[]},{"t":"b","text":"1 (8 oz) sour cream","subs":[]},{"t":"b","text":"Grated fresh Parmesan cheese (optional)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 450 degrees","subs":[]},{"t":"n","text":"Slice off the top of one bread round to create a lid Carefully remove the center of the bread round to form a 4 1/2-inch-wide and 2-inch-deep well for dip","subs":[]},{"t":"n","text":"Slice the center of the first bread round and the entire second bread round into 1-inch cubes","subs":[]},{"t":"n","text":"Place the bread bowl on the center of a stoneware dish Arrange the bread cubes around the bowl and spray with vegetable oil","subs":[]},{"t":"n","text":"Whisk cream cheese until smooth Add milk to the cream cheese Chop artichokes and add them to the soup mix and pressed garlic Mix well Microwave on HIGH for 5-7 minutes or until hot (do not boil)","subs":[]},{"t":"n","text":"Stir lemon juice and sour cream into the hot artichoke mixture","subs":[]},{"t":"n","text":"Grate Parmesan cheese over the bread bowl and bread cubes Bake for 13-15 minutes or until the bread cubes and top of the dip are golden brown","subs":[]},{"t":"n","text":"Remove from oven and serve immediately Yield: 12 servings","subs":[]},{"t":"p","text":"**Variation:** Instead of using the bread bowl method, use thinly sliced baguette French bread","subs":[]}]}],"stub":false,"source":null},{"id":"carmelized-onion-bacon-dip","title":"Carmelized Onion-Bacon Dip","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 tablespoon olive oil","subs":[]},{"t":"b","text":"2 teaspoons red wine vinegar","subs":[]},{"t":"b","text":"1 pound onions, halved and thinly sliced","subs":[]},{"t":"b","text":"½ teaspoon fresh thyme leaves","subs":[]},{"t":"b","text":"4 ounces cream cheese, softened","subs":[]},{"t":"b","text":"¼ teaspoon salt","subs":[]},{"t":"b","text":"½ cup sour cream","subs":[]},{"t":"b","text":"¼ teaspoon pepper","subs":[]},{"t":"b","text":"6 strips thick-sliced bacon, crumbled","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large nonstick skillet, sauté onions in olive oil until golden brown, about 15 minutes.","subs":[]},{"t":"n","text":"Cover the skillet and reduce the heat. Cook, stirring occasionally, until the onions are deeply golden brown, 35-40 minutes.","subs":[]},{"t":"n","text":"Cool slightly, then coarsely chop the onions.","subs":[]},{"t":"n","text":"Stir together the cream cheese and sour cream until smooth.","subs":[]},{"t":"n","text":"Reserve 2 tablespoons of crumbled bacon; stir the remaining bacon, caramelized onions, red wine vinegar, thyme, salt, and pepper into the cream mixture.","subs":[]},{"t":"n","text":"Chill for at least 30 minutes.","subs":[]},{"t":"n","text":"Before serving, sprinkle the dip with the reserved bacon.","subs":[]}]}],"stub":false,"source":null},{"id":"corn-salsa","title":"Corn Salsa","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 can black-eyed peas, drained","subs":[]},{"t":"b","text":"1 can Great Northern white beans or 1 can black beans, drained","subs":[]},{"t":"b","text":"1 can corn (Shoepeg or yellow & white petite corn), drained","subs":[]},{"t":"b","text":"2-4 green onions, chopped","subs":[]},{"t":"b","text":"5 medium Roma tomatoes, diced","subs":[]},{"t":"b","text":"1 avocado, chopped","subs":[]},{"t":"b","text":"¼ - ½ bunch cilantro, finely chopped","subs":[]},{"t":"b","text":"1 package Good Seasons Italian dressing, mixed according to directions","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Drain all the canned ingredients and place them in a large bowl.","subs":[]},{"t":"n","text":"Add the chopped green onions, diced tomatoes, avocado, and cilantro.","subs":[]},{"t":"n","text":"Prepare the Italian dressing mix according to the package directions and pour it over the mixture.","subs":[]},{"t":"n","text":"Gently stir to combine, then chill before serving with tortilla chips.","subs":[]}]}],"stub":false,"source":null},{"id":"cowboy-caviar","title":"Cowboy Caviar","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 can black beans, rinsed and drained","subs":[]},{"t":"b","text":"1 can black-eyed peas, rinsed and drained","subs":[]},{"t":"b","text":"1 cup tomatoes, seeded and finely diced","subs":[]},{"t":"b","text":"1 cup corn (fresh, canned, or thawed from frozen)","subs":[]},{"t":"b","text":"1 avocado, chopped","subs":[]},{"t":"b","text":"3/4 cup red and/or orange bell pepper, seeded and finely diced","subs":[]},{"t":"b","text":"1/2 cup red onion, finely diced","subs":[]},{"t":"b","text":"1/3 cup cilantro leaves, chopped","subs":[]},{"t":"b","text":"1/3 cup olive oil","subs":[]},{"t":"b","text":"1/4 cup lime juice","subs":[]},{"t":"b","text":"1 tablespoon honey","subs":[]},{"t":"b","text":"1 teaspoon chili powder","subs":[]},{"t":"b","text":"1 teaspoon cumin","subs":[]},{"t":"b","text":"Salt and pepper to taste","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Place the beans, black-eyed peas, tomatoes, corn, avocado, bell pepper, onion, and cilantro in a large bowl","subs":[]},{"t":"n","text":"In a small bowl, whisk together the olive oil, lime juice, honey, chili powder, cumin, and salt and pepper","subs":[]},{"t":"n","text":"Pour the dressing over the bean mixture and toss gently to coat","subs":[]},{"t":"n","text":"Serve as a salad or with chips","subs":[]}]}],"stub":false,"source":null},{"id":"fresh-peach-salsa-nora-cook","title":"Fresh Peach Salsa (Nora Cook)","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"8-10 Roma tomatoes","s ","text":"Mix everything together and enjoy!","subs":[]}]}],"stub":false,"source":null},{"id":"guacamole","title":"Guacamole","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 ripe avocados, mashed with fork","subs":[]},{"t":"b","text":"1 teaspoon lemon juice","subs":[]},{"t":"b","text":"2 tablespoons sour cream","subs":[]},{"t":"b","text":"1 teaspoon salt","subs":[]},{"t":"b","text":"3 tablespoons fresh salsa","subs":[]},{"t":"b","text":"Pepper to taste","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Mix all ingredients together","subs":[]},{"t":"n","text":"Delicious with chips and quesadillas","subs":[]}]}],"stub":false,"source":null},{"id":"hot-cream-cheese-dip","title":"Hot Cream Cheese Dip","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2-3 cans Rotelle tomatoes, drained","subs":[]},{"t":"b","text":"2 (8 oz) packages cream cheese","subs":[]},{"t":"b","text":"1 cup mayonnaise","subs":[]},{"t":"b","text":"2 cups grated cheese","subs":[]},{"t":"b","text":"Green onions, diced","subs":[]},{"t":"b","text":"Olives, chopped","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Mix all ingredients together in a small crockpot","subs":[]},{"t":"n","text":"Heat on low, stirring occasionally until the cream cheese and cheese are melted and everything is well combined","subs":[]}]}],"stub":false,"source":null},{"id":"mexican-ranch-dip","title":"Mexican Ranch Dip","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 (8 oz) packages fat-free cream cheese","subs":[]},{"t":"b","text":"1 cup canned corn","subs":[]},{"t":"b","text":"2 chopped jalapeños (deseeded)","subs":[]},{"t":"b","text":"1 red pepper, chopped","subs":[]},{"t":"b","text":"1/4 cup chopped olives","subs":[]},{"t":"b","text":"1 package Hidden Valley Ranch dip seasoning","subs":[]},{"t":"b","text":"Dash of salt and pepper","subs":[]},{"t":"b","text":"1/2 teaspoon garlic salt","subs":[]},{"t":"b","text":"Vegetables, crackers, or pretzels of your choice","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Combine cream cheese, corn, jalapeños, red pepper, chopped olives, Hidden Valley Ranch mix, salt, pepper, and garlic salt until well combined","subs":[]},{"t":"n","text":"Add the cream cheese and mix until the texture is smooth","subs":[]},{"t":"n","text":"Serve with your choice of vegetables, crackers, or pretzels","subs":[]}]}],"stub":false,"source":null},{"id":"seven-layer-dip","title":"Seven Layer Dip","category":"Sauces, Dressings & Dips","subcategory":"Dips > Savory","sections":[{"label":"Directions","items":[{"t":"n","text":"**Layer one:** Spread 1 can of bean dip at the base of your serving dish.","subs":[]},{"t":"n","text":"**Layer two:** Mash 3 ripe avocados with 1 tablespoon lemon juice, salt, and pepper, then spread over the bean dip.","subs":[]},{"t":"n","text":"**Layer three:** In a bowl, mix 1 cup sour cream, 1/2 cup mayonnaise, and 2 tablespoons taco seasoning. Spread this mixture on top of the avocado layer.","subs":[]},{"t":"n","text":"**Layer four:** Sprinkle grated cheese evenly over the previous layers.","subs":[]},{"t":"n","text":"**Layer five:** Add a layer of sliced olives.","subs":[]},{"t":"n","text":"**Layer six:** Top with diced tomatoes.","subs":[]},{"t":"n","text":"**Layer seven:** Finish with chopped onion.","subs":[]}]}],"stub":false,"source":null},{"id":"fruit-dip","title":"Fruit Dip","category":"Sauces, Dressings & Dips","subcategory":"Dips > Sweet","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 (32 oz) container Low-Fat Vanilla Yogurt","subs":[]},{"t":"b","text":"1 (8 oz) container Lite Cool Whip","subs":[]},{"t":"b","text":"1 (3.4 oz) box dry instant vanilla pudding mix","subs":[]},{"t":"b","text":"Fruit for serving","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large bowl, mix together vanilla yogurt, Cool Whip, and pudding mix until completely combined and smooth","subs":[]},{"t":"n","text":"Cover with plastic wrap and chill for about 30 minutes","subs":[]},{"t":"n","text":"Serve with your choice of fruit and enjoy","subs":[]},{"t":"n","text":"Store in an airtight container in the refrigerator for up to 5 days","subs":[]}]}],"stub":false,"source":null},{"id":"marshmallow-fruit-dip","title":"Marshmallow Fruit Dip","category":"Sauces, Dressings & Dips","subcategory":"Dips > Sweet","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup sugar","subs":[]},{"t":"b","text":"½ cup hot water","subs":[]},{"t":"b","text":"⅔ cup light corn syrup","subs":[]},{"t":"b","text":"2 egg whites","subs":[]},{"t":"b","text":"¼ teaspoon vanilla","subs":[]},{"t":"b","text":"Dash of salt","subs":[]},{"t":"b","text":"¼ cup mayonnaise","subs":[]},{"t":"b","text":"1 tablespoon grated orange rind","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a saucepan, combine the sugar, corn syrup, and hot water. Heat, stirring until the sugar dissolves.","subs":[]},{"t":"n","text":"Boil the mixture without stirring to the firm ball stage (244°F to 248°F on a candy thermometer; in humid weather, cook to 248°F).","subs":[]},{"t":"n","text":"Beat the egg whites until stiff.","subs":[]},{"t":"n","text":"Slowly add the hot syrup to the egg whites, beating at high speed until thick and fluffy.","subs":[]},{"t":"n","text":"Add the salt and vanilla, mixing well.","subs":[]},{"t":"n","text":"Gently fold in the mayonnaise and grated orange rind.","subs":[]},{"t":"n","text":"Allow to cool and serve with fresh fruit.","subs":[]}]}],"stub":false,"source":null},{"id":"speckled-cinnamon-apple-dip","title":"Speckled Cinnamon Apple Dip","category":"Sauces, Dressings & Dips","subcategory":"Dips > Sweet","sections":[{"label":"Ingredients","items":[{"t":"b","text":"100g sliced Granny Smith Apple","subs":[]},{"t":"b","text":"3 Tbs
