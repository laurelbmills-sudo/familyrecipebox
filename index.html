<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Family Recipe Box</title>
<meta name="description" content="Hundreds of recipes from both sides of the family — a pinch of this, a pinch of that.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><path d='M28 66 C24 48 38 32 58 30 C80 28 96 40 95 58 C94 78 76 92 54 91 C36 90 31 80 28 66 Z' fill='%23FFE458' stroke='%233B332C' stroke-width='6'/><path d='M101 44 C95 36 99 28 109 26 C113 33 110 42 101 44 Z' fill='%232AB0A3'/></svg>">
<style>
:root{
  --paper:#FAFAF8;
  --grid:rgba(42,176,163,.16);
  --ink:#3B332C;
  --ink-soft:#7B6F63;
  --coral:#EC5D3D;
  --watermelon:#FF544C;
  --teal:#2AB0A3;
  --teal-soft:#BFE6DF;
  --yellow:#FFE458;
  --melon:#FE9A34;
  --pink:#F7C8B8;
  --pink-panel:#F9DCCE;
  --almond:#EFE3D0;
  --card:#FFFFFF;
  --shadow:0 2px 0 rgba(59,51,44,.14);
  --radius:14px;
  /* legacy aliases used in markup */
  --paper-deep:#EEECEA;
  --citrus:#EC5D3D;
  --citrus-soft:#FFE458;
  --grapefruit:#EC5D3D;
  --mint:#BFE6DF;
  --mint-deep:#2AB0A3;
  --green-ink:#1E8278;
  --blue:#1E8278;
  --blue-soft:#BFE6DF;
  --redink:#EC5D3D;
  --butter:#FFE458;
  --tan:#EFE3D0;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background-color:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:26px 26px;
  color:var(--ink);
  font-family:'Archivo',sans-serif;
  font-size:16px;line-height:1.55;
}
::selection{background:var(--yellow)}
a{color:var(--teal)}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}

/* marker-highlight effect */
.hl{background:linear-gradient(100deg, transparent 2%, var(--yellow) 6% 94%, transparent 98%);padding:0 .12em}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:2px solid var(--ink)}
.topbar .wrap{display:flex;align-items:center;gap:14px;height:58px}
.wordmark{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:1rem;text-transform:uppercase;
  letter-spacing:.04em;color:var(--ink);text-decoration:none;
  display:flex;align-items:center;gap:9px;white-space:nowrap;
}
.topsearch{
  margin-left:auto;display:flex;align-items:center;gap:8px;
  background:#fff;border:2px solid var(--ink);border-radius:999px;
  padding:6px 14px;width:min(340px,46vw);box-shadow:var(--shadow);
}
.topsearch input{
  border:none;background:none;outline:none;width:100%;
  font-family:'Courier Prime',monospace;font-size:.92rem;color:var(--ink);
}
.topsearch input::placeholder{color:var(--ink-soft)}

.src-badge{margin-top:6px;display:inline-block;font-size:.68rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);border:1px dashed var(--ink-soft);border-radius:999px;padding:2px 9px}
.tag.src{background:var(--paper-deep);border-style:dashed}
.metastrip{display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:12px;font-size:.88rem;color:var(--ink-soft)}
.metastrip b{font-weight:700;color:var(--ink)}
.filterchips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 22px}
.fchip{font-size:.84rem;border:2px solid var(--ink);border-radius:999px;padding:5px 13px;background:var(--paper);text-decoration:none;color:var(--ink)}
.fchip.on{background:var(--yellow);font-weight:700}
.fchip:hover{transform:translateY(-1px)}
/* ---------- hero ---------- */
.hero{position:relative;overflow:hidden;border-bottom:2px solid var(--ink)}
.hero-inner{position:relative;padding:66px 0 58px;text-align:center;z-index:2}
.hero .script{
  font-family:'Caveat',cursive;font-size:1.8rem;color:var(--coral);
  display:block;margin-bottom:8px;transform:rotate(-2deg);
}
.hero h1{
  font-family:'Archivo',sans-serif;font-weight:900;text-transform:uppercase;
  font-size:clamp(2.2rem,6.4vw,4.2rem);line-height:1.04;letter-spacing:.01em;
}
.hero h1 .accent{background:linear-gradient(100deg, transparent 2%, var(--yellow) 6% 94%, transparent 98%);padding:0 .14em}
.hero p.sub{margin:20px auto 0;max-width:580px;color:var(--ink-soft);font-size:1.02rem}
.hero .count-line{
  font-family:'Caveat',cursive;font-size:1.4rem;color:var(--teal);margin-top:10px;
}
.hero-fruit{position:absolute;z-index:1}
.hero-fruit.f1{top:-18px;left:-22px;transform:rotate(-12deg)}
.hero-fruit.f2{bottom:-30px;right:-18px;transform:rotate(9deg)}
.hero-fruit.f3{top:40px;right:10%;transform:rotate(-8deg)}
.hero-fruit.f4{bottom:24px;left:8%;transform:rotate(12deg)}
@media(max-width:760px){.hero-fruit.f3,.hero-fruit.f4{display:none}}
.tile-band{
  height:18px;border-top:2px solid var(--ink);
  background:
    repeating-linear-gradient(90deg, rgba(255,84,76,.45) 0 10px, transparent 10px 20px),
    repeating-linear-gradient(0deg, rgba(255,84,76,.30) 0 9px, transparent 9px 18px),
    #FFFDF6;
}

/* ---------- chips ---------- */
.chiprow{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:28px}
.chip{
  border:2px solid var(--ink);border-radius:999px;background:var(--card);
  padding:7px 15px;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
  color:var(--ink);text-decoration:none;box-shadow:var(--shadow);transition:transform .12s ease;
  display:inline-flex;align-items:center;gap:7px;
}
.chip:hover{transform:translateY(-2px);background:var(--yellow)}
.chip .dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--ink)}

/* ---------- sections ---------- */
.section{padding:46px 0}
.section-head{display:flex;align-items:baseline;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.section-head h2{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:1.7rem;text-transform:uppercase;
  border-bottom:4px solid var(--teal);line-height:1.25;
}
.section-head .script{font-family:'Caveat',cursive;font-size:1.4rem;color:var(--coral)}
.section-head .spacer{flex:1}

/* ---------- category tiles (home) ---------- */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:16px}
.cat-tile{
  background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);
  overflow:hidden;text-decoration:none;color:var(--ink);
  box-shadow:4px 4px 0 var(--teal);transition:transform .12s ease,box-shadow .12s ease;
  display:flex;flex-direction:column;
}
.cat-tile:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--coral)}
.cat-tile .band{height:46px;border-bottom:2px solid var(--ink);position:relative}
.cat-tile .band .sticker{
  position:absolute;left:14px;bottom:-13px;background:var(--card);
  border:2px solid var(--ink);border-radius:999px;padding:2px 11px;
  font-family:'Caveat',cursive;font-size:1.05rem;font-weight:700;
}
.cat-tile .body{padding:20px 16px 16px}
.cat-tile h3{font-family:'Archivo',sans-serif;font-weight:900;font-size:1.1rem;text-transform:uppercase;line-height:1.2}
.cat-tile .sample{margin-top:7px;color:var(--ink-soft);font-size:.83rem;line-height:1.5;font-family:'Courier Prime',monospace}

/* ---------- recipe cards ---------- */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:14px}
.rcard{
  background:var(--card);border:2px solid var(--ink);border-radius:12px;
  padding:15px 15px 13px;text-decoration:none;color:var(--ink);
  box-shadow:var(--shadow);transition:transform .12s ease, box-shadow .12s ease;
  display:flex;flex-direction:column;gap:7px;position:relative;
}
.rcard:hover{transform:translateY(-3px);box-shadow:0 5px 0 var(--teal)}
.rcard .tag{
  align-self:flex-start;font-family:'Courier Prime',monospace;font-size:.68rem;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;border:1.5px solid var(--ink);border-radius:4px;padding:1px 8px;
}
.rcard h3{font-family:'Archivo',sans-serif;font-weight:700;font-size:1.04rem;line-height:1.25}
.rcard .meta{font-family:'Courier Prime',monospace;font-size:.76rem;color:var(--ink-soft);margin-top:auto}
.rcard.stub{border-style:dashed;background:var(--almond)}
.rcard .penciled{font-family:'Caveat',cursive;color:var(--coral);font-size:1.05rem}

/* ---------- subcategory header ---------- */
.subhead{display:flex;align-items:center;gap:12px;margin:36px 0 14px}
.subhead h3{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:1.05rem;text-transform:uppercase;
  white-space:nowrap;background:var(--ink);color:var(--paper);padding:3px 12px;border-radius:4px;
}
.subhead .rule{flex:1;border-top:2px dashed var(--teal)}
.subhead .n{font-family:'Caveat',cursive;color:var(--ink-soft);font-size:1.15rem;white-space:nowrap}

/* ---------- recipe detail: the recipe card ---------- */
.crumbs{font-size:.82rem;color:var(--ink-soft);margin:26px 0 14px;font-family:'Courier Prime',monospace}
.crumbs a{color:var(--teal);text-decoration:none;font-weight:700}
.recipe-card{
  background:var(--card);border:2px solid var(--ink);border-radius:16px;
  box-shadow:6px 6px 0 var(--teal);overflow:hidden;margin-bottom:54px;
}
.rc-head{padding:30px 34px 24px;border-bottom:2px solid var(--ink);position:relative;background:var(--card)}
.rc-head .eyebrow{font-family:'Caveat',cursive;font-size:1.45rem;color:var(--coral);display:block}
.rc-head h1{
  font-family:'Archivo',sans-serif;font-weight:900;text-transform:uppercase;
  font-size:clamp(1.5rem,4.2vw,2.4rem);line-height:1.12;
}
.rc-head .chips{margin-top:13px;display:flex;gap:8px;flex-wrap:wrap}
.rc-head .chips .tag{
  font-family:'Courier Prime',monospace;font-size:.7rem;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;border:1.5px solid var(--ink);border-radius:4px;padding:2px 10px;
}
.rc-actions{position:absolute;top:24px;right:26px;display:flex;gap:8px}
.rc-actions button{
  background:var(--card);border:2px solid var(--ink);border-radius:999px;
  padding:6px 14px;font-weight:700;font-size:.78rem;text-transform:uppercase;
  letter-spacing:.03em;box-shadow:var(--shadow);
}
.rc-actions button:hover{background:var(--yellow)}
@media(max-width:640px){.rc-actions{position:static;margin-top:14px}}
.rc-body{display:grid;grid-template-columns:330px 1fr;min-height:300px}
@media(max-width:820px){.rc-body{grid-template-columns:1fr}}
.rc-ing{
  border-right:2px solid var(--ink);padding:24px 26px 30px;
  background-color:#FFFDF6;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:26px 26px;
}
@media(max-width:820px){.rc-ing{border-right:none;border-bottom:2px solid var(--ink)}}
.rc-steps{padding:24px 30px 36px;background:var(--pink-panel)}
.rc-label{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:1rem;text-transform:uppercase;
  letter-spacing:.06em;display:inline-block;margin-bottom:14px;
  border-top:3px solid var(--ink);border-bottom:3px solid var(--ink);padding:3px 2px;
}
.rc-sub{
  font-family:'Courier Prime',monospace;font-weight:700;font-size:.8rem;
  letter-spacing:.05em;text-transform:uppercase;color:var(--ink);
  margin:18px 0 8px;display:inline-block;
  background:linear-gradient(100deg, transparent 2%, var(--teal-soft) 6% 94%, transparent 98%);
  padding:1px 8px;
}
ul.ing{list-style:none}
ul.ing li{
  font-family:'Courier Prime',monospace;
  padding:3px 0 3px 28px;position:relative;line-height:1.5;font-size:.9rem;cursor:pointer;
}
ul.ing li::before{
  content:"";position:absolute;left:2px;top:8px;width:13px;height:13px;
  border:2px solid var(--ink);border-radius:3px;background:#fff;
}
ul.ing li.done{color:var(--ink-soft);text-decoration:line-through}
ul.ing li.done::before{background:var(--teal)}
ol.steps{list-style:none;counter-reset:step}
ol.steps>li{counter-increment:step;padding:0 0 18px 0;font-size:.97rem}
ol.steps>li::before{
  content:"Step " counter(step);
  display:inline-block;margin-right:9px;transform:skew(-5deg);
  background:var(--melon);color:var(--ink);
  font-family:'Archivo',sans-serif;font-weight:900;font-size:.72rem;
  text-transform:uppercase;letter-spacing:.07em;padding:2px 9px;border-radius:3px;
}
ol.steps ul{margin:7px 0 0 12px;list-style:none}
ol.steps ul li{padding:1px 0 1px 18px;position:relative;font-size:.92rem}
ol.steps ul li::before{content:"–";position:absolute;left:2px;color:var(--coral)}
.rc-note{
  margin-top:14px;background:#FFFDF6;border:2px dashed var(--ink-soft);
  border-radius:10px;padding:11px 15px;font-size:.9rem;color:var(--ink-soft);
  font-family:'Courier Prime',monospace;
}
.rc-img{max-width:100%;border:2px solid var(--ink);border-radius:10px;margin:10px 0}
.byline{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--teal);margin:2px 0 6px}

/* stub page */
.stub-box{
  border:2px dashed var(--ink);border-radius:var(--radius);
  background:var(--card);padding:44px 30px;text-align:center;margin-bottom:60px;
}
.stub-box .script{font-family:'Caveat',cursive;font-size:1.9rem;color:var(--coral)}
.stub-box p{max-width:430px;margin:10px auto 0;color:var(--ink-soft)}
.stub-box a.btn{
  display:inline-block;margin-top:18px;background:var(--coral);color:#fff;
  border:2px solid var(--ink);border-radius:999px;padding:9px 20px;
  font-weight:700;text-decoration:none;box-shadow:var(--shadow);text-transform:uppercase;
  font-size:.85rem;letter-spacing:.03em;
}
.stub-box a.btn:hover{background:var(--watermelon)}

/* search results */
.empty-note{padding:34px 0;color:var(--ink-soft);text-align:center;font-size:1rem}
.empty-note .script{font-family:'Caveat',cursive;font-size:1.5rem;display:block;color:var(--coral)}

/* footer */
footer{border-top:2px solid var(--ink);background:var(--card);margin-top:30px}
footer .wrap{padding:34px 22px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
footer .script{font-family:'Caveat',cursive;font-size:1.45rem;color:var(--teal)}
footer p{font-size:.85rem;color:var(--ink-soft);font-family:'Courier Prime',monospace}
footer .spacer{flex:1}
.copy-mail{
  background:var(--card);border:2px solid var(--ink);border-radius:999px;
  padding:1px 10px;font-size:.74rem;font-weight:700;margin-left:6px;vertical-align:1px;
  font-family:'Archivo',sans-serif;text-transform:uppercase;
}
.copy-mail:hover{background:var(--yellow)}

/* print: just the recipe card */
@media print{
  .topbar,.crumbs,.rc-actions,footer,.tile-band{display:none!important}
  body{background:#fff}
  .recipe-card{border-color:#000;box-shadow:none;margin:0}
  .rc-steps{background:#fff}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none!important;scroll-behavior:auto!important}
}
</style>
</head>

<header class="topbar">
  <div class="wrap">
    <a class="wordmark" href="#/">

      <input id="searchbox" type="search" placeholder="Search recipes…" autocomplete="off" aria-label="Search recipes">

</header>

<main id="app"></main>

<footer>

  </div>
</footer>

e Eats · Summer '18"},{"id":"monkey-bread","title":"Monkey Bread","category":"Breads & Rolls","subcategory":"Sweet","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 package refrigerator biscuits","subs":[]},{"t":"b","text":"1 tablespoon water","subs":[]},{"t":"b","text":"½ cup brown sugar","subs":[]},{"t":"b","text":"¼ cube butter","subs":[]},{"t":"b","text":"2 teaspoons cinnamon","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Put butter, brown sugar, water, and cinnamon in a glass pie dish and cook in the microwave for 1½ minutes to melt the butter","subs":[]},{"t":"n","text":"Stir ingredients together","subs":[]},{"t":"n","text":"Cut refrigerator biscuits into fourths","subs":[]},{"t":"n","text":"Place a glass in the middle of the pie dish","subs":[]},{"t":"n","text":"Arrange the cut-up biscuits around the glass","subs":[]},{"t":"n","text":"Bake in the microwave oven for 3 minutes, or preheat the oven to 350 degrees and bake for 30 minutes","subs":[]}]}],"stub":false,"source":null},{"id":"orange-rolls","title":"Orange Rolls","category":"Breads & Rolls","subcategory":"Sweet","sections":[{"label":"Ingredients","items":[]},{"label":"Dough","items":[{"t":"b","text":"1/2 cup warm milk","subs":[]},{"t":"b","text":"1/2 cup orange juice","subs":[]},{"t":"b","text":"1 tablespoon instant dry yeast","subs":[]},{"t":"b","text":"1 tablespoon white granulated sugar","subs":[]},{"t":"b","text":"1 teaspoon salt","subs":[]},{"t":"b","text":"3 tablespoons salted butter (softened)","subs":[]},{"t":"b","text":"1 large egg","subs":[]},{"t":"b","text":"3 to 3 1/4 cups all-purpose flour","subs":[]}]},{"label":"Filling","items":[{"t":"b","text":"1/2 cup salted butter (softened)","subs":[]},{"t":"b","text":"1 cup white granulated sugar","subs":[]},{"t":"b","text":"2 tablespoons orange zest","subs":[]}]},{"label":"Glaze","items":[{"t":"b","text":"4 ounces cream cheese (softened)","subs":[]},{"t":"b","text":"1/4 cup salted butter (softened)","subs":[]},{"t":"b"," abel":"Directions","items":[{"t":"n","text":"Preheat oven to 350 degrees.","subs":[]},{"t":"n","text":"Mash the bananas in a bowl. Beat in the butter/coconut oil, applesauce, honey and coconut sugar. Add eggs and vanilla. Beat on high until well combined.","subs":[]},{"t":"n","text":"In a separate bowl, combine the Kodiak Cakes Mix, baking soda, cinnamon and sea salt. Add the dry mixture to the wet mixture. Stir slowly until just combined.","subs":[]},{"t":"n","text":"Grease two, 9x5 inch loaf pans. Pour mixture evenly into both pans and bake for 50 minutes. Check the bread at 30 minutes. If the bread is getting too dark on the top, lightly place a sheet of foil over the top for the remaining time. Let cool. Enjoy!","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"2 loaves / 10 slices per loaf","calories":"180","macros":"28c/5f/5.5p","per":"slice"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"sweet-honey-cinnamon-rolls","title":"Sweet Honey Cinnamon Rolls","category":"Breads & Rolls","subcategory":"Sweet","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 large eggs","subs":[]},{"t":"b","text":"2 ½ tsp. instant yeast","subs":[]},{"t":"b","text":"½ cup warm water (100-115 degrees)","subs":[]},{"t":"b","text":"1 cup cooked, peeled & mashed sweet potatoes","subs":[]},{"t":"b","text":"1 cup unsweetened almond milk","subs":[]},{"t":"b","text":"½ cup cold grass-fed butter","subs":[]},{"t":"b","text":"½ cup raw honey","subs":[]},{"t":"b","text":"1 tsp. sea salt","subs":[]},{"t":"b","text":"5 cups white, whole-wheat flour","subs":[]},{"t":"b","text":"**Filling:**","subs":[]},{"t":"b","text":"2 Tbs. melted grass-fed butter","subs":[]},{"t":"b","text":"2 Tbs. coconut sugar","subs":[]},{"t":"b","text":"1 Tbs. ground cinnamon","subs":[]},{"t":"b","text":"**Icing:**","subs":[]},{"t":"b","text":"1 cup powdered sugar","subs":[]},{"t":"b","text":"2 Tbs. pasturized egg whites","subs":[]},{"t":"b","text":"¼ tsp. butter extract","subs":[]}]},{"label":"Direc []},{"t":"b","text":"5 cups white, whole-wheat flour","subs":[]},{"t":"b","text":"**Filling:**","subs":[]},{"t":"b","text":"2 Tbs. melted grass-fed butter","subs":[]},{"t":"b","text":"2 Tbs. raw honey","subs":[]},{"t":"b","text":"1 tsp. orange zest","subs":[]},{"t":"b","text":"**Glaze:**","subs":[]},{"t":"b","text":"1 cup powdered sugar","subs":[]},{"t":"b","text":"2 Tbs. pasturized egg whites","subs":[]},{"t":"b","text":"1 Tbs. fresh squeezed orange juice","subs":[]},{"t":"b","text":"1 tsp. orange zest","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Beat eggs in a small bowl; set aside. In a seperate bowl, dissolve yeast into warm water. Once dissolved, pour eggs into water with yeast; set aside. Remove the skins from the sweet potatoes and beat with hand mixers until smooth; set aside.","subs":[]},{"t":"n","text":"Heat almond milk in a pot over high heat until small bubbles form around the edges. Remove from heat. Add the cold butter, honey, salt and sweet potatoes. Stir until all the butter is melted and the mixture is smooth.","subs":[]},{"t":"n","text":"Place in a bread or Kitchen Aid mixer. Add the egg mixture and the flour. Knead for 10 minutes. Cover and let rise in the fridge for 2 hours.","subs":[]},{"t":"n","text":"Split the dough in half. Place the dough on a floured surface and roll both pieces into large, thin rectangles. Mix the filling ingredients together and then spread evenly all over dough. Slice each rectangle into 12 strips and roll up. Place on a greased baking sheet; 12 rolls per sheet. Cover with a dish towel and let rise for 5+ hours or overnight.","subs":[]},{"t":"n","text":"Bake at 375 degrees for 12 minutes or until lightly browned. Beat glaze ingredients together and drizzle over the top. Enjoy!","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"24 rolls","calories":"185","macros":"29c/6f/4p","per":"roll"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"zucchini-bread","title":"Zucchini Bread","category":"Breads & Rolls","subcategory":"Sweet","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 eggs","subs":[]},{"t":"b","text":"2 cups sugar","subs":[]},{"t":"b","text":"1 cup vegetable oil","subs":[]},{"t":"b","text":"2 cups grated zucchini","subs":[]},{"t":"b","text":"3 ½ cups flour","subs":[]},{"t":"b","text":"1 ½ teaspoons salt","subs":[]},{"t":"b","text":"1 ½ teaspoons baking soda","subs":[]},{"t":"b","text":"¾ teaspoon baking powder","subs":[]},{"t":"b","text":"2 teaspoons vanilla","subs":[]},{"t":"b","text":"½ teaspoon cinnamon","subs":[]},{"t":"b","text":"½ teaspoon nutmeg","subs":[]},{"t":"b","text":"¼ teaspoon clove","subs":[]},{"t":"b","text":"1 cup chopped nuts (or chocolate chips)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Cream together the eggs and sugar, then add the oil","subs":[]},{"t":"n","text":"Mix in the remaining ingredients, except the zucchini, flour, and nuts","subs":[]},{"t":"n","text":"Gradually add the zucchini and flour, alternating until fully combined","subs":[]},{"t":"n","text":"Stir in the nuts or chocolate chips","subs":[]},{"t":"n","text":"Bake at 350°F for 1 hour (for a loaf)","subs":[]},{"t":"b","text":"**If baking in muffin tins**, bake for 20-25 minutes","subs":[]},{"t":"b","text":"**For a small bread loaf**, bake for 40-45 minutes. Enjoy!","subs":[]}]}],"stub":false,"source":null},{"id":"bacon-egg-scramble","title":"Bacon & Egg Scramble","category":"Breakfast","subcategory":"Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 egg whites","subs":[]},{"t":"b","text":"1 slice nitrate-free turkey bacon","subs":[]},{"t":"b","text":"Veggies of choice","subs":[]},{"t":"b","text":"1 Tbsp. low-fat, shredded mozzarella cheese","subs":[]},{"t":"b","text":"20g chopped avocado","subs":[]},{"t":"b","text":"3 oz. roasted red potatoes","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Heat frying pan to medium heat. Grease pan with cooking spray. Chop bacon and add it to the pan. Cook 3 minu t":"n","text":"Beat eggs and egg whites with water. Spray a 9x13 pan with cooking spray. Pour the egg mixture into the pan and bake for 20 minutes. Slice into 12 equal portions.","subs":[]},{"t":"n","text":"Lay the English muffins out. Place one egg portion on the top of each one. Top with 1 oz. deli turkey and 1 Tbs. of cheese. Sandwich with the other half of the muffin.","subs":[]},{"t":"n","text":"Wrap sandwiches in foil, place in a Ziploc freezer bag and store in the fridge or freezer.","subs":[]},{"t":"n","text":"Transfer to the fridge the night before eating to let thaw. When ready to eat, pop in the oven at 375 degrees for 20 minutes. If frozen, reheat in the oven for an extra 15 minutes. Enjoy warm.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"12 servings / 1 breakfast sandwich per serving","calories":"245","macros":"32c/5f/18p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"breakfast-sweet-potato","title":"Breakfast Sweet Potato","category":"Breakfast","subcategory":"Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"150g baked sweet potato","subs":[]},{"t":"b","text":"1 slice turkey bacon","subs":[]},{"t":"b","text":"1 large egg","subs":[]},{"t":"b","text":"2 egg whites","subs":[]},{"t":"b","text":"1 cup spinach","subs":[]},{"t":"b","text":"1 Tbs. low-fat, shredded mozzarella cheese","subs":[]},{"t":"b","text":"25g chopped avocado","subs":[]},{"t":"b","text":"Sea salt and pepper, to taste","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Bake the sweet potato in the oven or microwave according to the directions in the Food Prep Guide.","subs":[]},{"t":"n","text":"Chop the bacon. Spray a sauté pan and heat to medium/ high. Add the bacon and cook until crispy. Remove from the pan. Spray the pan again and add the egg, egg whites and spinach.","subs":[]},{"t":"n","text":"Place the sweet potato on a plate and mash with a fork. Top with eggs, spinach, cheese, bacon and avocado; salt and pepper to taste. Enjoy warm.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"1 serving","calories":"350","macros":"35c/11.5f/26p"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"breakfast-tacos","title":"Breakfast Tacos","category":"Breakfast","subcategory":"Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"3 large eggs","subs":[]},{"t":"b","text":"6 egg whites","subs":[]},{"t":"b","text":"1 cup chopped spinach","subs":[]},{"t":"b","text":"2 light Laughing Cow cheese wedges","subs":[]},{"t":"b","text":"4 corn tortillas","subs":[]},{"t":"b","text":"2 Tbs. salsa","subs":[]},{"t":"b","text":"2 clementine oranges","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Scramble the eggs and egg whites together with spinach and cheese. Remove from pan.","subs":[]},{"t":"n","text":"Divide the egg mixture evenly between four tortillas and top each taco with ½ Tbs. salsa. Enjoy two tacos per serving and one orange on the side.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"2 servings","calories":"350","macros":"34c/12f/26p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"butternut-squash-scramble","title":"Butternut Squash Scramble","category":"Breakfast","subcategory":"Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"¾ cup butternut squash, diced and roasted","subs":[]},{"t":"b","text":"½ cup broccoli, diced and roasted","subs":[]},{"t":"b","text":"1 large egg","subs":[]},{"t":"b","text":"1 egg white","subs":[]},{"t":"b","text":"Sea salt and pepper, to taste","subs":[]},{"t":"b","text":"2 Tbs. grated Parmesan cheese","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Roast the butternut squash and broccoli according to the directions in the Food Prep Guide.","subs":[]},{"t":"n","text":"Scramble the egg and egg white in a frying pan over medium heat. Add the roasted veggies to the pan and combine. Sprinkle with sea salt and pepper then top with cheese. Enjoy warm.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"1 serving","calories":"230","macros":"23c/8f/17p"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"denver-omelet","title":"Denver Omelet","category":"Breakfast","subcategory":"Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 large egg","subs":[]},{"t":"b","text":"1 egg white","subs":[]},{"t":"b","text":"1 Tbs. water","subs":[]},{"t":"b","text":"2 Tbs. diced green bell pepper","subs":[]},{"t":"b","text":"2 Tbs. diced yellow onion","subs":[]},{"t":"b","text":"1 oz. diced, nitrate-free deli turkey","subs":[]},{"t":"b","text":"2 Tbs. low-fat, shredded cheddar cheese","subs":[]},{"t":"b","text":"Sea salt and pepper, to taste","subs":[]},{"t":"b","text":"2 small clementine oranges","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Heat a frying pan over medium heat. Spray pan and add the veggies and turkey. Sauté until veggies are tender. Remove from pan.","subs":[]},{"t":"n","text":"Beat the egg, egg white and water together in a bowl. Spray the pan again and add the egg mixture. Sprinkle with sea salt and pepper. Once the bottom is cooked, flip over.","subs":[]},{"t":"n","text":"Add the veggies and cheese to center and fold half of the fried eggs over the top creating an omelet. Once the cheese is melted, remove from pan. Enjoy warm with oranges on the side.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"1 serving","calories":"245","macros":"22c/9f/20p"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"egg-white-omelet","title":"Egg White Omelet","category":"Breakfast","subcategory":"Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"3 egg whites","subs":[]},{"t":"b","text":"1 tsp. water","subs":[]},{"t":"b","text":"6 chopped asparagus spears","subs":[]},{"t":"b","text":"60g raw shredded sweet potato","subs":[]},{"t":"b","text":"25g chopped avocado","subs":[]},{"t":"b","text":"2 Tbs. shredded Parmesan cheese","subs":[]},{"t":"b","text":"2 Tbs. fresh salsa","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Heat frying pan over medium heat.","subs":[]},{"t":"n","text":"Place shredded sweet potatoes on a plate. Spray with cooking spray and microwave for 2 minutes. Spray a frying pan with cooking spray and add asparagus and sweet potatoes. Sauté with seasonings of choice for 5 minutes, then transfer to a plate.","subs":[]},{"t":"n","text":"Beat egg whites and water together in a bowl, then add to a greased frying pan and sprinkle with sea salt. Cover and cook for 3 minutes; Flip. Add asparagus, sweet potatoes and cheese to one side of the fried egg and fold over the other side. Top with avocado and salsa. 3399","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"1 serving","calories":"230","macros":"22c/8f/19p"},"sourceLabel":"Clean Simple Eats · Summer '18"},{"id":"egg-white-pepper-jack-avocado-sandwich","title":"Egg White, Pepper Jack & Avocado Sandwich","category":"Breakfast","subcategory":"Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 Multigrain English muffin","subs":[]},{"t":"b","text":"3 egg whites","subs":[]},{"t":"b","text":"1 oz. Pepper Jack cheese","subs":[]},{"t":"b","text":"1 oz. deli-sliced chicken breast","subs":[]},{"t":"b","text":"15g mashed avocado","subs":[]},{"t":"b","text":"Handful of spinach","subs":[]},{"t":"b","text":"Sea salt & pepper to taste","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Heat a frying pan over med/high heat. Spray pan with cooking spray. Add egg whites and season with salt and pepper. Cover with a lid and heat until fully cooked through. Fold in half and then in half again, then top with cheese. Transfer to a plate. Add the deli meat to the pan and brown on both sides. Remove from heat.","subs":[]},{"t":"n","text":"Slice muffin in half and toast in the toaster. Smash avocado onto the bottom of the muffin and sandwich the spinach, egg whites, cheese and chicken in the middle. PB","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"1 serving","calories":"345","macros":"34.5c/11f/26.5p"},"sourceLabel":"Clean Simple Eats · Summer '18"},{"id":"mountain-man-breakfast","title":"Mountain Man Breakfast","category":"Breakfast","subcategory":"Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 pound mild pork sausage (such as Jimmy Dean®)","subs":[]},{"t":"b","text":"1 medium onion, chopped","subs":[]},{"t":"b","text":"1 clove garlic, minced","subs":[]},{"t":"b","text":"1 medium red bell pepper, chopped","subs":[]},{"t":"b","text":"1 medium green bell pepper, chopped","subs":[]},{"t":"b","text":"1 (2-pound) package frozen shredded hash brown potatoes","subs":[]},{"t":"b","text":"12 large eggs, beaten","subs":[]},{"t":"b","text":"1 (16 ounce) package shredded Cheddar cheese","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Build a campfire and allow it to burn down until a bed of coals forms. Place a grate over the fire.","subs":[]},{"t":"n","text":"Place a 12-inch cast iron Dutch oven onto the grate. Add sausage, onion, and garlic; cook and stir until the sausage is browned and crumbly and the onion is translucent, about 5 to 7 minutes.","subs":[]},{"t":"n","text":"Stir in the hash browns and bell peppers until well mixed. Cook, stirring occasionally, until the hash browns are hot and the peppers are tender, about 15 minutes.","subs":[]},{"t":"n","text":"Pour the beaten eggs into the Dutch oven, allowing them to seep down to the bottom. Cover the Dutch oven and place it directly onto 5 to 10 hot coals. Place another 12 to 18 hot coals on top of the lid. Let cook until the eggs are firm, about 40 minutes.","subs":[]},{"t":"n","text":"Open the lid, sprinkle with Cheddar cheese, cover, and continue cooking until the cheese has melted, about 5 minutes.","subs":[]}]}],"stub":false,"source":null},{"id":"potato-pancakes","title":"Potato Pancakes","category":"Breakfast","subcategory":"Savory","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 egg per 1½ - 2 cups mashed potatoes (leftovers)","subs":[]},{"t":"b","text":"Salt and pepper to taste","subs":[]},{"t":"b","text":"¼ cup flour","subs":[]},{"t":"b","text":"Seasoning salt","subs":[]},{"t":"b","text":"Oil/butter mixture for frying","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Mix egg, mashed potatoes, flour, and seasoning salt","subs":[]},{"t":"n","text":"Fry slowly in an oil/butter mixture until golden brown on each side","subs":[]}]}],"stub":false,"source":null},{"id":"aebleskivers","title":"Aebleskivers","category":"Breakfast","subcategory":"Sweet","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 eggs, separated","subs":[]},{"t":"b","text":"1 tbsp sugar","subs":[]},{"t":"b","text":"1 tsp baking powder","subs":[]},{"t":"b","text":"1/2 tsp salt","subs":[]},{"t":"b","text":"1/4 cup melted shortening","subs":[]},{"t":"b","text":"2 cups flour","subs":[]},{"t":"b","text":"2 cups milk","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"In a medium bowl, beat the egg yolks.","subs":[]},{"t":"n","text":"Add sugar, salt, and milk to the yolks and mix well.","subs":[]},{"t":"n","text":"Sift the flour and baking powder into the bowl, stirring to combine.","subs":[]},{"t":"n","text":"In a separate bowl, beat the egg whites until stiff peaks form, then gently fold them into the batter.","subs":[]},{"t":"n","text":"Spray an aebleskiver pan with cooking spray and place it over medium heat.","subs":[]},{"t":"n","text":"Once the pan is hot, fill each well about 2/3 full with batter.","subs":[]},{"t":"n","text":"Cook until the batter becomes bubbly, then carefully turn each aebleskiver with a fork to cook the other side until golden.","subs":[]},{"t":"n","text":"Serve warm and enjoy!","subs":[]}]}],"stub":false,"source":null},{"id":"aebleskivers-cinnamon-bun-filled-pancakes","title":"Aebleskivers Cinnamon-Bun Filled Pancakes","category":"Breakfast","subcategory":"Sweet","sections":[{"label":"Ingredients","items":[] ng CSE Simply Vanilla protein powder","subs":[]},{"t":"b","text":"¼ cup butterscotch chips","subs":[]},{"t":"b","text":"2 cups Rice Krispies cereal","subs":[]},{"t":"b","text":"**Toppings:**","subs":[]},{"t":"b","text":"¼ cup butterscotch chips","subs":[]},{"t":"b","text":"½ cup dark chocolate chips","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Mix the peanut butter, powdered peanut butter, honey, flaxseed meal, almond milk, vanilla extract, sea salt and protein powder together in a bowl. Melt ¼ cup of the butterscotch chips and mix in. Add the Rice Krispies cereal last and gently mix until well combined. Press into a 9x13 pan; set aside.","subs":[]},{"t":"n","text":"Place the chocolate chips in a bowl and microwave 30 seconds at a time until completely melted and smooth, stirring in between. Drizzle over the top of the bars and spread out smooth. Melt the remaining ¼ cup of butterscotch chips and drizzle over the top of the chocolate.","subs":[]},{"t":"n","text":"Store in the fridge for 1 hour to allow the chocolate to harden. Cut into 18 bars. Enjoy!","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"18 bars","calories":"255","macros":"28.5c/12.5f/7.5p","per":"bar"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"scotcharoos","title":"Scotcharoos","category":"Desserts","subcategory":"Brownies & Bars","sections":[{"label":"Makes approximately 24 squares","items":[]},{"label":"Ingredients","items":[{"t":"b","text":"1 tablespoon unsalted butter, or as needed","subs":[]},{"t":"b","text":"1 ½ cups peanut butter","subs":[]},{"t":"b","text":"1 cup light corn syrup","subs":[]},{"t":"b","text":"1 cup white sugar","subs":[]},{"t":"b","text":"6 cups crisp rice cereal","subs":[]},{"t":"b","text":"½ cup semisweet chocolate chips","subs":[]},{"t":"b","text":"½ cup butterscotch chips","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Prepare the Pan:**","subs":[{"t":"b","text":"Generously butter a 9x13-inch baking pan and set aside."}]},{"t":"n","text":"**Make the Peanut Butter Mixture:**","subs":[{"t":"b","text":"In a large pot, mix together the peanut butter, corn syrup, and sugar."},{"t":"b","text":"Cook over medium heat, stirring occasionally, until the peanut butter melts and the mixture begins to boil."},{"t":"b","text":"Remove from heat."}]},{"t":"n","text":"**Add Rice Cereal:**","subs":[{"t":"b","text":"Stir in the rice cereal until it is well combined with the peanut butter mixture."}]},{"t":"n","text":"**Press into Pan:**","subs":[{"t":"b","text":"Transfer the mixture into the prepared pan and use buttered hands to press it down evenly."}]},{"t":"n","text":"**Melt the Topping:**","subs":[{"t":"b","text":"In a medium saucepan, melt the semisweet chocolate chips and butterscotch chips over medium-low heat."},{"t":"b","text":"Stir until smooth and fully melted."}]},{"t":"n","text":"**Spread the Topping:**","subs":[{"t":"b","text":"Spread the melted chocolate and butterscotch mixture evenly over the pressed cereal mixture in the pan."}]},{"t":"n","text":"**Cool and Serve:**","subs":[{"t":"b","text":"Let the bars cool completely, about 20 minutes, before cutting them into 24 squares. Enjoy!"}]}]}],"stub":false,"source":null},{"id":"thin-mint-chocolate-brownies","title":"Thin Mint Chocolate Brownies","category":"Desserts","subcategory":"Brownies & Bars","sections":[{"label":"Ingredients","items":[{"t":"b","text":"¾ cup oat flour","subs":[]},{"t":"b","text":"½ cup cocoa powder","subs":[]},{"t":"b","text":"1 serving CSE Brownie Batter protein powder","subs":[]},{"t":"b","text":"½ tsp. baking powder","subs":[]},{"t":"b","text":"1 / tsp. sea salt","subs":[]},{"t":"b","text":"8","subs":[]},{"t":"b","text":"2 Tbs. grass-fed butter","subs":[]},{"t":"b","text":"½ cup raw honey","subs":[]},{"t":"b","text":"1 large egg","subs":[]},{"t":"b","text":"2 egg whites","subs":[]},{"t":"b","text":"½ cup unsweetened applesauce","subs":[]},{"t":"b","text":"1 Tbs. vanilla extract","subs":[]},{"t":"b","text":"**Toppings:**","subs":[]},{"t":"b","text":"1 cup Thin Mint Cocoa Bar in a Jar (microwave jar for 30 seconds)","subs":[]},{"t":"b","text":"2 Tbs. grass-fed butter","subs":[]},{"t":"b","text":"½ cup dark chocolate chips","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 350 degrees.","subs":[]},{"t":"n","text":"Stir the dry ingredients together in a small bowl; set aside.","subs":[]},{"t":"n","text":"In a separate bowl, beat the butter and honey together. Add the eggs, egg whites, applesauce and vanilla; mix well. Add the wet ingredients to the dry ingredients and mix until just combined.","subs":[]},{"t":"n","text":"Pour into a greased 8x8 glass baking dish. Bake for 20-25 minutes, then let cool.","subs":[]},{"t":"n","text":"Once the brownies are cool, pour softened Thin Mint Cocoa Bar in a Jar over the top and spread out evenly. Place in the freezer until the chocolate has set.","subs":[]},{"t":"n","text":"Place the butter and chocolate chips in a bowl. Microwave 30 seconds at a time until melted and smooth, stirring in between. Pour over the brownies and spread out smooth. Return to the fridge or freezer for about 1 hour or until the chocolate has set. Allow brownies to sit out at room temperature for about 5-10 minutes before slicing. Slice into 36 brownie bites and enjoy!","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"36 brownies","calories":"100","macros":"12c/4.5f/2.5p","per":"brownie"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"triple-chip-blondies","title":"Triple Chip Blondies","category":"Desserts","subcategory":"Brownies & Bars","sections":[{"label":"Ingredients","items":[{"t":"b","text":"½ cup grass-fed butter","subs":[]},{"t":"b","text":"1 cup xylitol sweetener","subs":[]},{"t":"b","text":"1 cup coconut sugar","subs":[]},{"t":"b","text":"2 large eggs","subs":[]},{"t":"b","text":"1 Tbs. vanilla extract","subs":[]},{"t":"b","text":"2 cups Kodiak Cakes All-Purpose Baking Mix","subs":[]},{"t":"b","text":"Pinch of sea salt","subs":[]},{"t":"b","text":"1 tsp. baking powder","subs":[]},{"t":"b","text":"½ cup butterscotch chips","subs":[]},{"t":"b","text":"¼ cup white or vanilla chocolate chips","subs":[]},{"t":"b","text":"¼ cup dark chocolate chips","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 350 degrees.","subs":[]},{"t":"n","text":"Beat the butter, xylitol and coconut sugar together in a bowl. Add the eggs and vanilla and beat until well combined; set aside.","subs":[]},{"t":"n","text":"In a separate bowl, stir together the Kodiak Cakes Mix, sea salt and baking powder. Add the wet ingredients to the dry ingredients and mix until just combined. Fold in all the chips.","subs":[]},{"t":"n","text":"Press the dough into a greased 9x13 baking pan and bake for 20-25 minutes or until golden brown. Let cool, then slice into 18 bars. Enjoy!","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"18 bars","calories":"270","macros":"36c/12f/4p","per":"bar"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"two-bite-brownies","title":"Two-Bite Brownies","category":"Desserts","subcategory":"Brownies & Bars","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 large egg","subs":[]},{"t":"b","text":"½ cup raw honey","subs":[]},{"t":"b","text":"¼ cup natural almond butter","subs":[]},{"t":"b","text":"2 Tbs. unsweetened almond milk","subs":[]},{"t":"b","text":"1 / cup cocoa powder","subs":[]},{"t":"b","text":"3","subs":[]},{"t":"b","text":"½ serving CSE Brownie Batter protein powder","subs":[]},{"t":"b","text":"½ tsp. sea salt","subs":[]},{"t":"b","text":"¼ cup mini chocolate chips","subs":[]},{"t":"b","text":"12 raspberries","subs":[]},{"t":"b","text":"Cooking spray","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 350 degrees.","subs":[]},{"t":"n","text":"Beat the egg, honey, almond butter and almond milk together in a bowl. Add the cocoa powder, protein powder, sea salt and mini chocolate chips; mix well.","subs":[]},{ dered sugar","subs":[]},{"t":"b","text":"1 scoop Vanilla Mamele Whey","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 350°F. In a small dish, mix together the chai spice.","subs":[]},{"t":"n","text":"In a medium mixing bowl, whisk together the cake flour, all-purpose flour, 2 tsp chai spice, baking soda, baking powder, and salt.","subs":[]},{"t":"n","text":"In a stand mixer or with a hand mixer, mix together the oil, Truvia, sugar, eggs, vanilla, and yogurt.","subs":[]},{"t":"n","text":"Add the dry ingredients to the wet and mix until just combined. Fold in the carrots.","subs":[]},{"t":"n","text":"Pour the batter into a parchment-lined loaf pan and bake for 40 minutes. If the top browns before the loaf is cooked through, tent it with foil.","subs":[]},{"t":"n","text":"For the frosting, whip together the butter, cream cheese, vanilla, powdered sugar, and protein powder until smooth.","subs":[]},{"t":"n","text":"Cool the cake completely before frosting. Spread the frosting evenly over the top and dust with chai spice. Cut into 10 even slices.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"10","active":"10 min","total":"50 min","calories":"347","macros":"45c/15f/8p"},"sourceLabel":"Mamele Macro Meals · Oct '22"},{"id":"better-than-junk-food-cake","title":"Better Than Junk Food Cake","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"CSE Devil’s Food Cake Recipe (page 55)","subs":[]},{"t":"b","text":"**Caramel Sauce Filling:**","subs":[]},{"t":"b","text":"½ cup Cashew Coconut Caramel Sauce (recipe below)","subs":[]},{"t":"b","text":"¼ cup caramel flavored chips","subs":[]},{"t":"b","text":"**Coconut Cream:**","subs":[]},{"t":"b","text":"2 cups coconut milk, full-fat","subs":[]},{"t":"b","text":"1/3 cup Swerve confectioners sweetener","subs":[]},{"t":"b","text":"1 tsp. vanilla extract","subs":[]},{"t":"b","text":"**Topping:**","subs":[]},{"t":"b","text":"½ cup mini chocolate chips","subs":[]},{"t":"b","text":"**Caramel Sauce Topping:**","subs":[]},{"t":"b","text":"¼ cup Cashew Coconut Caramel Sauce","subs":[]},{"t":"b","text":"¼","subs":[]},{"t":"b","text":"cup caramel flavored chips","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Place your coconut milk in the fridge (do not shake) to firm up for 1+ hours.","subs":[]},{"t":"n","text":"Make the CSE Devil’s Food Cake recipe. Poke holes all over, halfway down into the cake. Let cool slightly while making the caramel sauce filling.","subs":[]},{"t":"n","text":"Make the caramel sauce filling by placing ½ cup of the Cashew Coconut Caramel Sauce and ¼ cup caramel chips in a saucepan over low heat. Stir continuously until well combined and melted. Pour immediately over the top of the warm cake and let it drain down through the holes. Let cool.","subs":[]},{"t":"n","text":"Make the coconut cream by adding 2 cups of the cream portion of the coconut milk to a bowl. Beat with hand mixers on high for five minutes. Add in the Swerve sweetener and vanilla extract and mix until well combined. Once the cake has cooled completely, spread the coconut cream over the top and sprinkle with mini chocolate chips. Store in the fridge until ready to eat.","subs":[]},{"t":"n","text":"When ready to eat, make a batch of caramel sauce topping using ¼ cup of the Cashew Coconut Caramel Sauce and ¼ cup caramel chips with the same directions above in step number 3. Drizzle the warm caramel sauce over the cake and slice into 18 servings. Enjoy! CASHEW COCONUT CARAMEL SAUCE ¾ cup salted cashews ¾ cup raw honey ½ cup softened coconut butter 2-3 Tbs. water ½ tsp. caramel or vanilla extract","subs":[]},{"t":"n","text":"Soak cashews in water for one hour. Drain and place in a high-powered blender with the rest of the ingredients and blend until smooth. Store in the fridge until ready to use.","subs":[]},{"t":"n","text":"When ready to use, place the caramel sauce in a saucepan over low heat and stir until warm and melted.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"18 servings","calories":"325","macros":"39c/16f/6.5p","per":"serving"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"caramel-apple-cake","title":"Caramel Apple Cake","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup raw honey","subs":[]},{"t":"b","text":"2 Tbs. grass-fed butter or coconut oil","subs":[]},{"t":"b","text":"2 Tbs. light tasting olive oil","subs":[]},{"t":"b","text":"2 large eggs","subs":[]},{"t":"b","text":"1 tsp. vanilla extract","subs":[]},{"t":"b","text":"4 cups peeled, shredded apples","subs":[]},{"t":"b","text":"2 cups white, whole-wheat flour","subs":[]},{"t":"b","text":"2 tsp. ground cinnamon","subs":[]},{"t":"b","text":"2 tsp. baking soda","subs":[]},{"t":"b","text":"2 tsp. ground nutmeg","subs":[]},{"t":"b","text":"1 tsp. sea salt","subs":[]},{"t":"b","text":"½ tsp. ground cloves","subs":[]},{"t":"b","text":"**Almond Caramel Sauce:**","subs":[]},{"t":"b","text":"½ cup natural almond butter","subs":[]},{"t":"b","text":"½ cup raw honey","subs":[]},{"t":"b","text":"1 tsp. vanilla extract","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 350 degrees.","subs":[]},{"t":"n","text":"Beat the honey, butter and olive oil together in a bowl. Beat in the eggs and vanilla. Fold in the shredded apples then mix in all the dry ingredients.","subs":[]},{"t":"n","text":"Pour the batter into a well-greased Bundt pan. Bake for 45 minutes. Let cool for 30-60 minutes.","subs":[]},{"t":"n","text":"Make the Almond Caramel Sauce just before serving. In a small saucepan, mix the almond butter, honey and vanilla over medium heat. Stir constantly until all the ingredients melt together. Drizzle the caramel sauce evenly over the top of the cake. Slice into 16 servings. Enjoy!","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"16 servings","calories":"235","macros":"38c/7.5f/4 ,"subs":[]},{"t":"b","text":"1 tsp. pumpkin pie spice","subs":[]},{"t":"b","text":"1 tsp. sea salt","subs":[]},{"t":"b","text":"1 tsp. baking soda","subs":[]},{"t":"b","text":"2 ripe bananas","subs":[]},{"t":"b","text":"2 Tbs. grass-fed butter","subs":[]},{"t":"b","text":"½ cup raw honey","subs":[]},{"t":"b","text":"½ cup Swerve sweetener","subs":[]},{"t":"b","text":"2 cups canned pumpkin","subs":[]},{"t":"b","text":"4 large eggs","subs":[]},{"t":"b","text":"**Crumble Topping:**","subs":[]},{"t":"b","text":"¼ cup Kodiak Cakes Cinnamon Oat Mix","subs":[]},{"t":"b","text":"¼ cup coconut sugar","subs":[]},{"t":"b","text":"2 Tbs. grass-fed butter","subs":[]},{"t":"b","text":"1 tsp. ground cinnamon","subs":[]},{"t":"b","text":"**Butter Cream Frosting:**","subs":[]},{"t":"b","text":"6 oz. Neufchatel cream cheese","subs":[]},{"t":"b","text":"¼ cup grass-fed butter","subs":[]},{"t":"b","text":"½ cup raw honey","subs":[]},{"t":"b","text":"1 tsp vanilla extract","subs":[]},{"t":"b","text":"Dash of cinnamon","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 350 degrees.","subs":[]},{"t":"n","text":"Combine all dry ingredients together in a large bowl; set aside.","subs":[]},{"t":"n","text":"In a large bowl, beat the bananas, butter, honey and Swerve together until smooth. Add the pumpkin and eggs. Mix until well combined. Add the dry ingredients to the bowl and mix well.","subs":[]},{"t":"n","text":"Grease two, 9-inch, round cake pans. Pour batter evenly into both pans. Combine the crumble topping ingredients together and sprinkle over the top of each cake. Bake for 25 minutes or until golden brown and cooked through. Let cool in the pan for 10-15 minutes, then transfer to a cooling rack.","subs":[]},{"t":"n","text":"Beat the frosting ingredients together. Spread in between the two cake rounds and on the top. Slice into 16 servings. Enjoy! Store extras in the fridge.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"16 servings","calories":"305","macros":"45c/10f/9p","per":"serving"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"pumpkin-pie-energy-bites","title":"Pumpkin Pie Energy Bites","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 1 / cups dates, pitted","subs":[]},{"t":"b","text":"3","subs":[]},{"t":"b","text":"1 cup pecans","subs":[]},{"t":"b","text":"½ cup unsweetened shredded coconut","subs":[]},{"t":"b","text":"½ cup canned pumpkin","subs":[]},{"t":"b","text":"1 Tbs. vanilla extract","subs":[]},{"t":"b","text":"2 tsp. ground cinnamon","subs":[]},{"t":"b","text":"½ tsp. ground nutmeg","subs":[]},{"t":"b","text":"Dash of ground cloves","subs":[]},{"t":"b","text":"Dash of sea salt","subs":[]},{"t":"b","text":"2 servings CSE Simply Vanilla protein powder","subs":[]},{"t":"b","text":"2 cups old-fashioned rolled oats","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Soak dates for 10 minutes. Drain.","subs":[]},{"t":"n","text":"Place pecans in a food processor or high powered blender and pulse until broken up. Add the dates, coconut, pumpkin, vanilla, spices and salt. Pulse until combined.","subs":[]},{"t":"n","text":"Transfer to a bowl and stir in protein powder and oats. Store in the fridge for 30 minutes. Using a cookie scoop, roll into balls and store in the fridge or freezer. Enjoy!","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"32 bites","calories":"85","macros":"9c/4f/3p","per":"bite"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"pumpkin-sheet-cake","title":"Pumpkin Sheet Cake","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup white, whole-wheat flour","subs":[]},{"t":"b","text":"½ tsp baking powder","subs":[]},{"t":"b","text":"½ tsp baking soda","subs":[]},{"t":"b","text":"½ tsp sea salt","subs":[]},{"t":"b","text":"Pinch of ground cinnamon","subs":[]},{"t":"b","text":"Dash of ground nutmeg","subs":[]},{"t":"b","text":"1 cup canned pumpkin","subs":[]},{"t":"b","text":"1 cup raw honey","subs":[]},{"t":"b","text":"2 large eggs","subs":[]},{"t":"b","text":"2 Tbs. melted coconut oil","subs":[]},{"t":"b","text":"2 tsp. vanilla extract","subs":[]},{"t":"b","text":"**Frosting:**","subs":[]},{"t":"b","text":"8 oz. Neufchatel cream cheese","subs":[]},{"t":"b","text":"½ cup raw honey","subs":[]},{"t":"b","text":"1 tsp vanilla extract","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat oven to 350 degrees.","subs":[]},{"t":"n","text":"In a medium sized bowl, mix the flour, baking powder, baking soda, sea salt, cinnamon and nutmeg; set aside.","subs":[]},{"t":"n","text":"In a separate bowl, beat together the pumpkin, honey, eggs, melted coconut oil and vanilla. Add the wet ingredients to the dry ingredients and mix until just combined.","subs":[]},{"t":"n","text":"Pour the batter into a greased 9x13 baking dish and bake for 25 minutes. Let cool.","subs":[]},{"t":"n","text":"While the cake is baking, beat together the frosting ingredients. Store in the fridge until ready to use.","subs":[]},{"t":"n","text":"Frost the cake once cooled. Slice into 15 servings and Enjoy! Store extras in the fridge.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"15 servings","calories":"205","macros":"35c/6f/3p","per":"serving"},"sourceLabel":"Clean Simple Eats · Treats"},{"id":"raspberry-angel-food-cake","title":"Raspberry Angel Food Cake","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup sifted cake flour","subs":[]},{"t":"b","text":"12 large egg whites (about 1¾ cups)","subs":[]},{"t":"b","text":"1½ cups sugar (preferably superfine)","subs":[]},{"t":"b","text":"1 tsp cream of tartar","subs":[]},{"t":"b","text":"1 cup fresh raspberries","subs":[]},{"t":"b","text":"1½ tsp vanilla","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Preheat your oven to 350°F.","subs":[]},{"t":"n","text":"In a large bowl, sift the cake flour, ½ cup of sugar, and salt twice to ensure they are well mixed.","subs":[]},{"t":"n","text":"In a small bowl, mash the fresh raspberries and then pass them through a fine sieve to yield ¼ cup of raspberry puree. Set aside.","subs":[]},{"t":"n","text":"In a separate bowl, beat the egg whites until they become foamy. Add the cream of tartar and vanilla, then continue beating until stiff peaks form.","subs":[]},{"t":"n","text":"Gradually add the remaining 1 cup of sugar, 2 tablespoons at a time, while continuing to beat the egg whites until glossy and stiff.","subs":[]},{"t":"n","text":"Sift the flour mixture over the beaten egg whites, folding gently until just combined.","subs":[]},{"t":"n","text":"Gently transfer 1/3 of the batter into an ungreased 10-inch tube pan. Spoon 2 tablespoons of raspberry puree on top of this layer. Repeat the process with another third of the batter, adding another 2 tablespoons of raspberry puree. Top with the remaining batter.","subs":[]},{"t":"n","text":"Use a knife to gently swirl through the batter to eliminate any air pockets.","subs":[]},{"t":"n","text":"Bake in the preheated oven for 35-45 minutes, or until the cake is lightly golden.","subs":[]},{"t":"n","text":"Immediately remove the cake from the oven and invert the pan to cool by hanging it on the neck of a bottle or placing it upside down on a cooling rack.","subs":[]},{"t":"n","text":"Let the cake cool completely. Once cooled, run a knife around the edges of the pan to loosen the cake.","subs":[]},{"t":"n","text":"Serve the cake with the remaining fresh raspberries.","subs":[]}]}],"stub":false,"source":null},{"id":"score-cake-better-than-sex","title":"Score Cake (Better Than Sex)","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 Swiss cake mix","subs":[]},{"t":"b","text":"1½ cups Cool-Whip (for batter)","subs":[]},{"t":"b","text":"1 can sweetened condensed milk","subs":[]},{"t":"b","text":"12 oz Cool-Whip (for topping)","subs":[]},{"t":"b","text":"2 Score bars (crushed)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Prepare the Swiss cake mix according to the package directions, but replace the oil with 1½ cups of Cool-Whip","subs":[]},{"t":"n","text":"Bake as directed on the package","subs":[]},{"t":"n","text":"While the cake is still hot, poke holes and pour sweetened condensed milk over the cake","subs":[]},{"t":"n","text":"Allow the cake to cool, then spread the remaining 12 oz of Cool-Whip on top","subs":[]},{"t":"n","text":"Crush the 2 Score bars and sprinkle them on top","subs":[]}]}],"stub":false,"source":null},{"id":"sour-cream-banana-cake","title":"Sour Cream Banana Cake","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"½ cup butter","subs":[]},{"t":"b","text":"6 eggs (add one at a time)","subs":[]},{"t":"b","text":"2 cups sugar","subs":[]},{"t":"b","text":"2 tsp vanilla","subs":[]},{"t":"b","text":"4 cups flour","subs":[]},{"t":"b","text":"2 tsp baking powder","subs":[]},{"t":"b","text":"1½ tsp salt","subs":[]},{"t":"b","text":"2 tsp baking soda","subs":[]},{"t":"b","text":"1 to 1½ cups sour cream","subs":[]},{"t":"b","text":"2 cups mashed bananas (about 4-5 bananas)","subs":[]},{"t":"b","text":"Chopped nuts (optional)","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Preheat the oven to 375°F.","subs":[]},{"t":"n","text":"Cream together the butter and sugar until light and fluffy.","subs":[]},{"t":"n","text":"Add eggs one at a time, beating well after each addition.","subs":[]},{"t":"n","text":"Stir in the vanilla.","subs":[]},{"t":"n","text":"Sift together the flour, baking powder, salt, and baking soda.","subs":[]},{"t":"n","text":"Gradually add the dry ingredients to the butter mixture, alternating with sour cream, beginning and ending with the dry ingredients.","subs":[]},{"t":"n","text":"Fold in the mashed bananas and chopped nuts, if using.","subs":[]},{"t":"n","text":"Pour the batter into a greased 9x13-inch baking pan (or divide into loaf pans for banana bread).","subs":[]},{"t":"n","text":"Bake at 375°F for 30 minutes (or longer if using loaf pans).","subs":[]},{"t":"n","text":"If baking in a 9x13-inch pan, let cool and frost if desired. For banana bread, enjoy without frosting.","subs":[]}]}],"stub":false,"source":null},{"id":"strawberry-shortcake","title":"Strawberry Shortcake","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[]},{"label":"For the Shortcake","items":[{"t":"b","text":"3 cups flour","subs":[]},{"t":"b","text":"6 tablespoons sugar","subs":[]},{"t":"b","text":"4 teaspoons baking powder","subs":[]},{"t":"b","text":"1 teaspoon salt","subs":[]},{"t":"b","text":"12 tablespoons butter","subs":[]},{"t":"b","text":"1 teaspoon orange rind","subs":[]},{"t":"b","text":"1 cup heavy cream","subs":[]},{"t":"b","text":"½ cup whole milk","subs":[]}]},{"label":"For the Fruit Mixture","items":[{"t":"b","text":"Fresh strawberries, cut","subs":[]},{"t":"b","text":"Fresh blueberries","subs":[]},{"t":"b","text":"Sugar (to taste)","subs":[]},{"t":"b","text":"2 tablespoons orange juice","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Preheat the oven to 400°F.","subs":[]},{"t":"n","text":"In a large bowl, mix together the flour, sugar, baking powder, and salt.","subs":[]},{"t":"n","text":"Cut in the butter until the mixture resembles coarse crumbs.","subs":[]},{"t":"n","text":"Add the orange rind, heavy cream, and whole milk, and stir until combined.","subs":[]},{"t":"n","text":"Flour your surface and roll out the dough to about ½ inch thick.","subs":[]},{"t":"n","text":"Use a star-shaped cookie cutter to cut out shortcakes.","subs":[]},{"t":"n","text":"Brush the tops of the shortcakes with heavy cream and sprinkle with sugar.","subs":[]},{"t":"n","text":"Bake in the preheated oven until the shortcakes are slightly browned, about 10-12 minutes.","subs":[]},{"t":"n","text":"Let the shortcakes cool before slicing them in half.","subs":[]}]},{"label":"For the Fruit Mixture","items":[{"t":"n","text":"In a bowl, combine the cut strawberries and blueberries.","subs":[]},{"t":"n","text":"Sprinkle with sugar to taste and add the orange juice. Stir to coat the fruit.","subs":[]}]},{"label":"To Serve","items":[{"t":"n","text":"Slice the shortcakes in half.","subs":[]},{"t":"n","text":"Place a spoonful of whipped cream on the bottom half of each shortcake.","subs":[]},{"t":"n","text":"Add half of the shortcake, followed by the fruit mixture.","subs":[]},{"t":"n","text":"Top with the other half of the shortcake.","subs":[]},{"t":"n","text":"Optionally, add more whipped cream on top.","subs":[]}]}],"stub":false,"source":null},{"id":"tres-leches-cake","title":"Tres Leches Cake","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"**For the cake:**","subs":[{"t":"b","text":"1 package Betty Crocker SuperMoist yellow cake mix"},{"t":"b","text":"2 tablespoons oil"},{"t":"b","text":"1 tablespoon flour (add to cake mix)"},{"t":"b","text":"3 eggs"},{"t":"b","text":"1 ¼ cups water"}]},{"t":"b","text":"**For the milk mixture:**","subs":[{"t":"b","text":"1 cup whipping cream"},{"t":"b","text":"1 cup whole milk"},{"t":"b","text":"1 14-oz can sweetened condensed milk"},{"t":"b","text":"2 teaspoons rum extract"}]},{"t":"b","text":"**For the topping:**","subs":[{"t":"b","text":"1 cup heavy cream"},{"t":"b","text":"1 teaspoon vanilla or almond extract"},{"t":"b","text":"1 cup flaked coconut, toasted"},{"t":"b","text":"1 cup chopped pecans, toasted"}]}]},{"label":"Instructions","items":[{"t":"n","text":"**Prepare the cake:**","subs":[{"t":"b","text":"Preheat the oven to 375°F."},{"t":"b","text":"In a bowl, beat the cake mix, oil, flour, eggs, and water on medium speed for 2 minutes."},{"t":"b","text":"Pour the batter into a greased and floured 13x9-inch pan."},{"t":"b","text":"Bake for 35 minutes or until a toothpick inserted comes out clean."},{"t":"b","text":"Let the cake stand for 5 minutes after baking."}]},{"t":"n","text":"**Make the milk mixture:**","subs":[{"t":"b","text":"In a large bowl, mix together the whipping cream, whole milk, sweetened condensed milk, and rum extract."}]},{"t":"n","text":"**Soak the cake:**","subs":[{"t":"b","text":"Once the cake has cooled slightly, pierce the top every ½ inch with a fork, wiping the fork occasionally to reduce sticking."},{"t":"b","text":"Carefully pour the whipping cream mixture evenly over the cake."},{"t":"b","text":"Cover the cake and refrigerate for about 3 hours to allow the milk mixture to soak in."}]},{"t":"n","text":"**Prepare the topping:**","subs":[{"t":"b","text":"In a separate bowl, whip the heavy cream and vanilla or almond extract until soft peaks form."}]},{"t":"n","text":"**Assemble the cake:**","subs":[{"t":"b","text":"Spread the whipped cream on top of the cake."},{"t":"b","text":"Sprinkle with toasted coconut and chopped pecans."}]},{"t":"n","text":"**Serve:**","subs":[{"t":"b","text":"Store the cake covered in the refrigerator until ready to serve."}]}]}],"stub":false,"source":null},{"id":"upside-down-pumpkin-pie","title":"Upside Down Pumpkin Pie","category":"Desserts","subcategory":"Cakes & Cupcakes","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 large eggs","subs":[]},{"t":"b","text":"1 cup unsweetened almond milk","subs":[]},{"t":"b","text":"2 cups canned pumpkin","subs":[]},{"t":"b","text":"½ cup raw honey","subs":[]},{"t":"b","text":"½ serving CSE Simply Vanilla protein powder","subs":[]},{"t":"b","text":"1 tsp. ground cinnamon","subs":[]},{"t":"b","text":"2 tsp. pumpkin pie spice","subs":[]},{"t":"b","text":"**Crust:**","subs":[]},{"t":"b","text":"cup almonds","subs":[]},{"t":"b","text":"2/3","subs":[]},{"t":"b","text":"2/3 cup cashews","subs":[]},{"t":"b","text":"2/3 cup unsweetened shredded coconut","subs":[]},{"t":"b","text": ompletely."}]}]}],"stub":false,"source":null},{"id":"chocolate-chip-cookies-giant-cookies","title":"Chocolate Chip Cookies (giant cookies)","category":"Desserts","subcategory":"Cookies","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup plus 2 tablespoons salted butter (2.25 sticks)","subs":[]},{"t":"b","text":"8 oz sugar (1 cup plus 1 tablespoon)","subs":[]},{"t":"b","text":"10 oz dark brown sugar (about 1.5 cups)","subs":[]},{"t":"b","text":"2 large eggs","subs":[]},{"t":"b","text":"1 tablespoon vanilla","subs":[]},{"t":"b","text":"1.5 teaspoons kosher salt","subs":[]},{"t":"b","text":"16 oz flour (3.5 cups)","subs":[]},{"t":"b","text":"1.25 teaspoons baking soda","subs":[]},{"t":"b","text":"1.5 teaspoons baking powder","subs":[]},{"t":"b","text":"15 oz good quality chocolate (about 2 heaping cups)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Cream butter and sugars with the paddle attachment on your mixer until blended. Don’t overmix.","subs":[]},{"t":"n","text":"Add eggs one at a time, mixing well after each addition.","subs":[]},{"t":"n","text":"Stir in vanilla and salt.","subs":[]},{"t":"n","text":"Whisk dry ingredients together in a separate bowl (or pour them in and whisk the top a bit before turning on the mixer).","subs":[]},{"t":"n","text":"Mix dry ingredients into the wet ingredients on low speed until almost fully combined (avoid over-mixing when adding the chocolate).","subs":[]},{"t":"n","text":"Add chocolate and mix on low until just combined. Avoid over-mixing to prevent a tough cookie texture.","subs":[]},{"t":"n","text":"Use a large ¼ cup cookie scoop to form dough balls and place them on a parchment-lined baking sheet. Freeze the dough balls until firm, then transfer to large zip-lock bags.","subs":[]},{"t":"n","text":"Bake at 350°F for 17-20 minutes, until light golden brown. Baking from frozen is preferred, but you can bake thawed dough as well.","subs":[]},{"t":"n","text":"Optionally, sprinkle with flake salt b ups","category":"Desserts","subcategory":"Everything Else","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 roll refrigerated peanut butter cookie dough","subs":[]},{"t":"b","text":"1 cup white chocolate chips","subs":[]},{"t":"b","text":"1 cup milk chocolate chips","subs":[]},{"t":"b","text":"1 ½ cups crunchy or creamy peanut butter","subs":[]},{"t":"b","text":"4 Nature Valley Oats 'n Honey Crunch granola bars, crushed","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Prepare the Cookie Cups:**","subs":[{"t":"b","text":"Preheat the oven to 350°F."},{"t":"b","text":"Grease 24 mini muffin cups with cooking spray (like Pam)."},{"t":"b","text":"Slice the cookie dough into 24 even pieces."},{"t":"b","text":"Press one slice of cookie dough into the bottom and up the sides of each mini muffin cup, forming a 1/3-inch rim above the top of each cup."},{"t":"b","text":"Bake for 10-15 minutes, or until the edges are golden."},{"t":"b","text":"Allow the cookie cups to cool in the pan for 5 minutes on cooling racks."}]},{"t":"n","text":"**Shape the Cookie Cups:**","subs":[{"t":"b","text":"After cooling for 5 minutes, gently press the center of each cookie cup with the tip of a wooden spoon handle to create space for the filling."},{"t":"b","text":"Let the cups cool completely before removing them from the pan."}]},{"t":"n","text":"**Prepare the Filling:**","subs":[{"t":"b","text":"In a saucepan or microwave-safe bowl, melt the white chocolate chips, milk chocolate chips, and peanut butter together. Stir constantly if on the stovetop, or frequently if using a microwave."}]},{"t":"n","text":"**Assemble the Cups:**","subs":[{"t":"b","text":"Once melted, divide the filling mixture evenly into the cookie cups, about 1 tablespoon per cup."},{"t":"b","text":"Sprinkle the crushed granola bars over the top of each filled cup."}]},{"t":"n","text":"**Set the Cookies:**","subs":[{"t":"b","text":"Refrigerate the filled cookie cups until the filling is set, about
