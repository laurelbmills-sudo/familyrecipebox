<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Family Recipe Box</title>
<meta name="description" content="Hundreds of recipes from both sides of the family — a pinch of this, a pinch of that.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><path d='M28 66 C24 48 38 32 58 30 C80 28 96 40 95 58 C94 78 76 92 54 91 C36 90 31 80 28 66 Z' fill='%23FFE458' stroke='%233B332C' stroke-width='6'/><path d='M101 44 C95 36 99 28 109 26 C113 33 110 42 101 44 Z' fill='%232AB0A3'/></svg>">
<style>
:root{
  --paper:#FAFAF8;
  --grid:rgba(42,176,163,.16);
  --ink:#3B332C;
  --ink-soft:#7B6F63;
  --coral:#EC5D3D;
  --watermelon:#FF544C;
  --teal:#2AB0A3;
  --teal-soft:#BFE6DF;
  --yellow:#FFE458;
  --melon:#FE9A34;
  --pink:#F7C8B8;
  --pink-panel:#F9DCCE;
  --almond:#EFE3D0;
  --card:#FFFFFF;
  --shadow:0 2px 0 rgba(59,51,44,.14);
  --radius:14px;
  /* legacy aliases used in markup */
  --paper-deep:#EEECEA;
  --citrus:#EC5D3D;
  --citrus-soft:#FFE458;
  --grapefruit:#EC5D3D;
  --mint:#BFE6DF;
  --mint-deep:#2AB0A3;
  --green-ink:#1E8278;
  --blue:#1E8278;
  --blue-soft:#BFE6DF;
  --redink:#EC5D3D;
  --butter:#FFE458;
  --tan:#EFE3D0;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background-color:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:26px 26px;
  color:var(--ink);
  font-family:'Archivo',sans-serif;
  font-size:16px;line-height:1.55;
}
::selection{background:var(--yellow)}
a{color:var(--teal)}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}

/* marker-highlight effect */
.hl{background:linear-gradient(100deg, transparent 2%, var(--yellow) 6% 94%, transparent 98%);padding:0 .12em}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:2px solid var(--ink)}
.topbar .wrap{display:flex;align-items:center;gap:14px;height:58px}
.wordmark{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:1rem;text-transform:uppercase;
  letter-spacing:.04em;color:var(--ink);text-decoration:none;
  display:flex;align-items:center;gap:9px;white-space:nowrap;
}
.topsearch{
  margin-left:auto;display:flex;align-items:center;gap:8px;
  background:#fff;border:2px solid var(--ink);border-radius:999px;
  padding:6px 14px;width:min(340px,46vw);box-shadow:var(--shadow);
}
.topsearch input{
  border:none;background:none;outline:none;width:100%;
  font-family:'Courier Prime',monospace;font-size:.92rem;color:var(--ink);
}
.topsearch input::placeholder{color:var(--ink-soft)}

.src-badge{margin-top:6px;display:inline-block;font-size:.68rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);border:1px dashed var(--ink-soft);border-radius:999px;padding:2px 9px}
.tag.src{background:var(--paper-deep);border-style:dashed}
.metastrip{display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:12px;font-size:.88rem;color:var(--ink-soft)}
.metastrip b{font-weight:700;color:var(--ink)}
.filterchips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 22px}
.fchip{font-size:.84rem;border:2px solid var(--ink);border-radius:999px;padding:5px 13px;background:var(--paper);text-decoration:none;color:var(--ink)}
.fchip.on{background:var(--yellow);font-weight:700}
.fchip:hover{transform:translateY(-1px)}
/* ---------- hero ---------- */
.hero{position:relative;overflow:hidden;border-bottom:2px solid var(--ink)}
.hero-inner{position:relative;padding:66px 0 58px;text-align:center;z-index:2}
.hero .script{
  font-family:'Caveat',cursive;font-size:1.8rem;color:var(--coral);
  display:block;margin-bottom:8px;transform:rotate(-2deg);
}
.hero h1{
  font-family:'Archivo',sans-serif;font-weight:900;text-transform:uppercase;
  font-size:clamp(2.2rem,6.4vw,4.2rem);line-height:1.04;letter-spacing:.01em;
}
.hero h1 .accent{background:linear-gradient(100deg, transparent 2%, var(--yellow) 6% 94%, transparent 98%);padding:0 .14em}
.hero p.sub{margin:20px auto 0;max-width:580px;color:var(--ink-soft);font-size:1.02rem}
.hero .count-line{
  font-family:'Caveat',cursive;font-size:1.4rem;color:var(--teal);margin-top:10px;
}
.hero-fruit{position:absolute;z-index:1}
.hero-fruit.f1{top:-18px;left:-22px;transform:rotate(-12deg)}
.hero-fruit.f2{bottom:-30px;right:-18px;transform:rotate(9deg)}
.hero-fruit.f3{top:40px;right:10%;transform:rotate(-8deg)}
.hero-fruit.f4{bottom:24px;left:8%;transform:rotate(12deg)}
@media(max-width:760px){.hero-fruit.f3,.hero-fruit.f4{display:none}}
.tile-band{
  height:18px;border-top:2px solid var(--ink);
  background:
    repeating-linear-gradient(90deg, rgba(255,84,76,.45) 0 10px, transparent 10px 20px),
    repeating-linear-gradient(0deg, rgba(255,84,76,.30) 0 9px, transparent 9px 18px),
    #FFFDF6;
}

/* ---------- chips ---------- */
.chiprow{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:28px}
.chip{
  border:2px solid var(--ink);border-radius:999px;background:var(--card);
  padding:7px 15px;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
  color:var(--ink);text-decoration:none;box-shadow:var(--shadow);transition:transform .12s ease;
  display:inline-flex;align-items:center;gap:7px;
}
.chip:hover{transform:translateY(-2px);background:var(--yellow)}
.chip .dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--ink)}

/* ---------- sections ---------- */
.section{padding:46px 0}
.section-head{display:flex;align-items:baseline;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.section-head h2{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:1.7rem;text-transform:uppercase;
  border-bottom:4px solid var(--teal);line-height:1.25;
}
.section-head .script{font-family:'Caveat',cursive;font-size:1.4rem;color:var(--coral)}
.section-head .spacer{flex:1}

/* ---------- category tiles (home) ---------- */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:16px}
.cat-tile{
  background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);
  overflow:hidden;text-decoration:none;color:var(--ink);
  box-shadow:4px 4px 0 var(--teal);transition:transform .12s ease,box-shadow .12s ease;
  display:flex;flex-direction:column;
}
.cat-tile:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--coral)}
.cat-tile .band{height:46px;border-bottom:2px solid var(--ink);position:relative}
.cat-tile .band .sticker{
  position:absolute;left:14px;bottom:-13px;background:var(--card);
  border:2px solid var(--ink);border-radius:999px;padding:2px 11px;
  font-family:'Caveat',cursive;font-size:1.05rem;font-weight:700;
}
.cat-tile .body{padding:20px 16px 16px}
.cat-tile h3{font-family:'Archivo',sans-serif;font-weight:900;font-size:1.1rem;text-transform:uppercase;line-height:1.2}
.cat-tile .sample{margin-top:7px;color:var(--ink-soft);font-size:.83rem;line-height:1.5;font-family:'Courier Prime',monospace}

/* ---------- recipe cards ---------- */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:14px}
.rcard{
  background:var(--card);border:2px solid var(--ink);border-radius:12px;
  padding:15px 15px 13px;text-decoration:none;color:var(--ink);
  box-shadow:var(--shadow);transition:transform .12s ease, box-shadow .12s ease;
  display:flex;flex-direction:column;gap:7px;position:relative;
}
.rcard:hover{transform:translateY(-3px);box-shadow:0 5px 0 var(--teal)}
.rcard .tag{
  align-self:flex-start;font-family:'Courier Prime',monospace;font-size:.68rem;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;border:1.5px solid var(--ink);border-radius:4px;padding:1px 8px;
}
.rcard h3{font-family:'Archivo',sans-serif;font-weight:700;font-size:1.04rem;line-height:1.25}
.rcard .meta{font-family:'Courier Prime',monospace;font-size:.76rem;color:var(--ink-soft);margin-top:auto}
.rcard.stub{border-style:dashed;background:var(--almond)}
.rcard .penciled{font-family:'Caveat',cursive;color:var(--coral);font-size:1.05rem}

/* ---------- subcategory header ---------- */
.subhead{display:flex;align-items:center;gap:12px;margin:36px 0 14px}
.subhead h3{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:1.05rem;text-transform:uppercase;
  white-space:nowrap;background:var(--ink);color:var(--paper);padding:3px 12px;border-radius:4px;
}
.subhead .rule{flex:1;border-top:2px dashed var(--teal)}
.subhead .n{font-family:'Caveat',cursive;color:var(--ink-soft);font-size:1.15rem;white-space:nowrap}

/* ---------- recipe detail: the recipe card ---------- */
.crumbs{font-size:.82rem;color:var(--ink-soft);margin:26px 0 14px;font-family:'Courier Prime',monospace}
.crumbs a{color:var(--teal);text-decoration:none;font-weight:700}
.recipe-card{
  background:var(--card);border:2px solid var(--ink);border-radius:16px;
  box-shadow:6px 6px 0 var(--teal);overflow:hidden;margin-bottom:54px;
}
.rc-head{padding:30px 34px 24px;border-bottom:2px solid var(--ink);position:relative;background:var(--card)}
.rc-head .eyebrow{font-family:'Caveat',cursive;font-size:1.45rem;color:var(--coral);display:block}
.rc-head h1{
  font-family:'Archivo',sans-serif;font-weight:900;text-transform:uppercase;
  font-size:clamp(1.5rem,4.2vw,2.4rem);line-height:1.12;
}
.rc-head .chips{margin-top:13px;display:flex;gap:8px;flex-wrap:wrap}
.rc-head .chips .tag{
  font-family:'Courier Prime',monospace;font-size:.7rem;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;border:1.5px solid var(--ink);border-radius:4px;padding:2px 10px;
}
.rc-actions{position:absolute;top:24px;right:26px;display:flex;gap:8px}
.rc-actions button{
  background:var(--card);border:2px solid var(--ink);border-radius:999px;
  padding:6px 14px;font-weight:700;font-size:.78rem;text-transform:uppercase;
  letter-spacing:.03em;box-shadow:var(--shadow);
}
.rc-actions button:hover{background:var(--yellow)}
@media(max-width:640px){.rc-actions{position:static;margin-top:14px}}
.rc-body{display:grid;grid-template-columns:330px 1fr;min-height:300px}
@media(max-width:820px){.rc-body{grid-template-columns:1fr}}
.rc-ing{
  border-right:2px solid var(--ink);padding:24px 26px 30px;
  background-color:#FFFDF6;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:26px 26px;
}
@media(max-width:820px){.rc-ing{border-right:none;border-bottom:2px solid var(--ink)}}
.rc-steps{padding:24px 30px 36px;background:var(--pink-panel)}
.rc-label{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:1rem;text-transform:uppercase;
  letter-spacing:.06em;display:inline-block;margin-bottom:14px;
  border-top:3px solid var(--ink);border-bottom:3px solid var(--ink);padding:3px 2px;
}
.rc-sub{
  font-family:'Courier Prime',monospace;font-weight:700;font-size:.8rem;
  letter-spacing:.05em;text-transform:uppercase;color:var(--ink);
  margin:18px 0 8px;display:inline-block;
  background:linear-gradient(100deg, transparent 2%, var(--teal-soft) 6% 94%, transparent 98%);
  padding:1px 8px;
}
ul.ing{list-style:none}
ul.ing li{
  font-family:'Courier Prime',monospace;
  padding:3px 0 3px 28px;position:relative;line-height:1.5;font-size:.9rem;cursor:pointer;
}
ul.ing li::before{
  content:"";position:absolute;left:2px;top:8px;width:13px;height:13px;
  border:2px solid var(--ink);border-radius:3px;background:#fff;
}
ul.ing li.done{color:var(--ink-soft);text-decoration:line-through}
ul.ing li.done::before{background:var(--teal)}
ol.steps{list-style:none;counter-reset:step}
ol.steps>li{counter-increment:step;padding:0 0 18px 0;font-size:.97rem}
ol.steps>li::before{
  content:"Step " counter(step);
  display:inline-block;margin-right:9px;transform:skew(-5deg);
  background:var(--melon);color:var(--ink);
  font-family:'Archivo',sans-serif;font-weight:900;font-size:.72rem;
  text-transform:uppercase;letter-spacing:.07em;padding:2px 9px;border-radius:3px;
}
ol.steps ul{margin:7px 0 0 12px;list-style:none}
ol.steps ul li{padding:1px 0 1px 18px;position:relative;font-size:.92rem}
ol.steps ul li::before{content:"–";position:absolute;left:2px;color:var(--coral)}
.rc-note{
  margin-top:14px;background:#FFFDF6;border:2px dashed var(--ink-soft);
  border-radius:10px;padding:11px 15px;font-size:.9rem;color:var(--ink-soft);
  font-family:'Courier Prime',monospace;
}
.rc-img{max-width:100%;border:2px solid var(--ink);border-radius:10px;margin:10px 0}
.byline{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--teal);margin:2px 0 6px}

/* stub page */
.stub-box{
  border:2px dashed var(--ink);border-radius:var(--radius);
  background:var(--card);padding:44px 30px;text-align:center;margin-bottom:60px;
}
.stub-box .script{font-family:'Caveat',cursive;font-size:1.9rem;color:var(--coral)}
.stub-box p{max-width:430px;margin:10px auto 0;color:var(--ink-soft)}
.stub-box a.btn{
  display:inline-block;margin-top:18px;background:var(--coral);color:#fff;
  border:2px solid var(--ink);border-radius:999px;padding:9px 20px;
  font-weight:700;text-decoration:none;box-shadow:var(--shadow);text-transform:uppercase;
  font-size:.85rem;letter-spacing:.03em;
}
.stub-box a.btn:hover{background:var(--watermelon)}

/* search results */
.empty-note{padding:34px 0;color:var(--ink-soft);text-align:center;font-size:1rem}
.empty-note .script{font-family:'Caveat',cursive;font-size:1.5rem;display:block;color:var(--coral)}

/* footer */
footer{border-top:2px solid var(--ink);background:var(--card);margin-top:30px}
footer .wrap{padding:34px 22px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
footer .script{font-family:'Caveat',cursive;font-size:1.45rem;color:var(--teal)}
footer p{font-size:.85rem;color:var(--ink-soft);font-family:'Courier Prime',monospace}
footer .spacer{flex:1}
.copy-mail{
  background:var(--card);border:2px solid var(--ink);border-radius:999px;
  padding:1px 10px;font-size:.74rem;font-weight:700;margin-left:6px;vertical-align:1px;
  font-family:'Archivo',sans-serif;text-transform:uppercase;
}
.copy-mail:hover{background:var(--yellow)}

/* print: just the recipe card */
@media print{
  .topbar,.crumbs,.rc-actions,footer,.tile-band{display:none!important}
  body{background:#fff}
  .recipe-card{border-color:#000;box-shadow:none;margin:0}
  .rc-steps{background:#fff}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none!important;scroll-behavior:auto!important}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="wordmark" href="#/">
      <svg width="26" height="26" viewBox="0 0 120 120" aria-hidden="true"><path d="M28 66 C24 48 38 32 58 30 C80 28 96 40 95 58 C94 78 76 92 54 91 C36 90 31 80 28 66 Z" fill="#FFE458" stroke="#3B332C" stroke-width="6"/><path d="M95 55 C103 49 108 44 110 36" stroke="#1E8278" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M101 44 C95 36 99 28 109 26 C113 33 110 42 101 44 Z" fill="#2AB0A3"/></svg>
      The Family Recipe Box
    </a>
    <label class="topsearch">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7A6E5D" stroke-width="2.4" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <input id="searchbox" type="search" placeholder="Search recipes…" autocomplete="off" aria-label="Search recipes">
    </label>
  </div>
</header>

<main id="app"></main>

<footer>
  <div class="wrap">
    <div>
      <div class="script">From our kitchen to yours ♥</div>
      <p>To submit a recipe or report an edit, email Laurel:
        <a href="mailto:laurelbmills@gmail.com">laurelbmills@gmail.com</a>
        <button class="copy-mail" data-mail="laurelbmills@gmail.com" type="button">copy</button></p>
    </div>
    <div class="spacer"></div>
    <p>Made with love (and a lot of cream of chicken soup).</p>
  </div>
</footer>

<script src="recipes.js"></script>
<script>
/* ============ data setup ============ */
const R = window.COOKBOOK.recipes;
document.addEventListener("DOMContentLoaded",()=>{const sb=document.getElementById("searchbox");if(sb)sb.placeholder="Search "+R.length+" recipes…";});

const CATS = [
  {key:"Breakfast",            name:"Breakfast",                 color:"#FFE458", note:"slow mornings"},
  {key:"Main Dishes",          name:"Main Dishes",               color:"#FE9A34", note:"dinner's ready"},
  {key:"Soups & Stews",        name:"Soups & Stews",             color:"#A9D9A0", note:"ladle it up"},
  {key:"Sides & Appetizers",   name:"Sides & Appetizers",        color:"#EFE3D0", note:"pass the plate"},
  {key:"Breads & Rolls",       name:"Breads & Rolls",            color:"#F0D9A6", note:"fresh from the oven"},
  {key:"Desserts",             name:"Desserts",                  color:"#FF8B85", note:"save room"},
  {key:"Drinks & Shakes",      name:"Drinks & Shakes",           color:"#7FD6C9", note:"sips & shakes"},
  {key:"Sauces, Dressings & Dips", name:"Sauces, Dressings & Dips", color:"#F7C8B8", note:"a little extra"},
  {key:"Pantry & Extras",      name:"Pantry & Extras",           color:"#E4DBC9", note:"odds & ends"},
];
const catByKey = Object.fromEntries(CATS.map(c=>[c.key,c]));
const slugCat = s => s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
CATS.forEach(c=>c.slug=slugCat(c.name));
const catBySlug = Object.fromEntries(CATS.map(c=>[c.slug,c]));
const byId = Object.fromEntries(R.map(r=>[r.id,r]));

/* counts + search index */
R.forEach(r=>{
  let ing=0, steps=0, hay=[r.title];
  r.sections.forEach(s=>{
    if(s.label) hay.push(s.label);
    s.items.forEach(it=>{
      hay.push(it.text);
      if(it.t==="b") ing++;
      if(it.t==="n") steps++;
      (it.subs||[]).forEach(x=>{hay.push(x.text); if(x.t==="b") ing++; if(x.t==="n") steps++;});
    });
  });
  r._ing=ing; r._steps=steps;
  if(r.sourceLabel) hay.push(r.sourceLabel);
  r._hay=hay.join(" ").toLowerCase();
});

/* ============ tiny helpers ============ */
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
function inline(s){
  let t = esc(s);
  t = t.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  t = t.replace(/(^|[\s(])((https?:\/\/)[^\s<)]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  t = t.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  t = t.replace(/\*([^*]+)\*/g,"<em>$1</em>");
  return t;
}
/* loose, hand-painted-style doodles */
const lemonSVG = sz => `<svg width="${sz}" height="${sz}" viewBox="0 0 120 120" aria-hidden="true">
  <path d="M28 66 C24 48 38 32 58 30 C80 28 96 40 95 58 C94 78 76 92 54 91 C36 90 31 80 28 66 Z" fill="#FFE458"/>
  <path d="M33 64 C30 50 41 37 58 35 C76 33 90 43 89 58 C88 74 73 86 55 85 C40 84 36 75 33 64 Z" fill="#FFF3B8" opacity=".7"/>
  <path d="M95 55 C103 49 108 44 110 36" stroke="#1E8278" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M101 44 C95 36 99 28 109 26 C113 33 110 42 101 44 Z" fill="#2AB0A3"/>
  <path d="M104 47 C112 45 119 47 121 53 C115 58 106 55 104 47 Z" fill="#6FC4A6"/>
</svg>`;
const sprigSVG = sz => `<svg width="${sz}" height="${sz}" viewBox="0 0 120 120" aria-hidden="true">
  <path d="M22 102 C42 84 66 58 96 22" stroke="#1E8278" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M44 80 C34 70 36 58 47 54 C55 62 54 74 44 80 Z" fill="#6FC4A6"/>
  <path d="M58 64 C66 52 78 50 84 58 C78 68 64 70 58 64 Z" fill="#2AB0A3"/>
  <path d="M70 50 C62 40 64 30 74 26 C82 34 80 46 70 50 Z" fill="#6FC4A6"/>
  <path d="M84 38 C92 28 102 26 108 32 C102 42 90 44 84 38 Z" fill="#2AB0A3"/>
  <path d="M32 92 C24 84 24 74 32 70 C40 76 40 86 32 92 Z" fill="#2AB0A3"/>
</svg>`;
const melonSVG = sz => `<svg width="${sz}" height="${sz}" viewBox="0 0 120 120" aria-hidden="true">
  <path d="M14 50 C28 88 86 92 106 52 C108 48 106 44 100 44 L20 44 C14 44 12 46 14 50 Z" fill="#FF544C"/>
  <path d="M22 52 C34 80 84 82 98 52 Z" fill="#FF7A6E"/>
  <path d="M10 46 C40 38 80 38 110 46 C112 40 110 36 104 34 L18 34 C11 36 9 40 10 46 Z" fill="#6FC4A6"/>
  <circle cx="46" cy="60" r="3" fill="#3B332C"/><circle cx="64" cy="66" r="3" fill="#3B332C"/><circle cx="80" cy="58" r="3" fill="#3B332C"/>
</svg>`;
const orangeSVG = sz => `<svg width="${sz}" height="${sz}" viewBox="0 0 120 120" aria-hidden="true">
  <path d="M60 12 C90 14 108 34 106 62 C104 90 84 108 58 106 C32 104 14 86 14 60 C14 32 32 10 60 12 Z" fill="#FE9A34"/>
  <circle cx="60" cy="60" r="38" fill="#FFD9A0"/>
  <path d="M60 60 L60 26 C72 27 82 33 87 43 Z M60 60 L90 50 C93 61 90 72 82 80 Z M60 60 L72 92 C61 96 49 94 41 87 Z M60 60 L28 68 C26 56 30 45 39 38 Z" fill="#FE9A34"/>
</svg>`;

/* ============ usage tracking (stored on this device only) ============ */
const LS_KEY = "rb_views";
function loadViews(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }catch(e){ return {}; } }
function bumpView(id){
  try{
    const v = loadViews();
    v[id] = (v[id]||0) + 1;
    localStorage.setItem(LS_KEY, JSON.stringify(v));
  }catch(e){}
}
function topRecipes(n){
  const v = loadViews();
  return Object.entries(v)
    .filter(([id,c]) => byId[id] && !byId[id].stub && c >= 2)
    .sort((a,b) => b[1]-a[1])
    .slice(0,n)
    .map(([id]) => byId[id]);
}
function dailyPicks(n){
  const pool = R.filter(r => !r.stub);
  let seed = Math.floor(Date.now() / 86400000); /* changes once a day */
  const rand = () => { seed = (seed * 1103515245 + 12345) % 2147483648; return seed / 2147483648; };
  const arr = pool.slice();
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(rand() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, n);
}

/* ============ views ============ */
const app = document.getElementById("app");

function tagHTML(r){
  const c = catByKey[r.category];
  return `<span class="tag" style="background:${c?c.color:"var(--paper-deep)"}">${esc(c?c.name:r.category)}</span>`;
}
function cardHTML(r){
  if(r.stub){
    return `<a class="rcard stub" href="#/recipe/${r.id}">
      ${tagHTML(r)}<h3>${esc(r.title)}</h3>
      <div class="penciled">recipe coming soon…</div></a>`;
  }
  const bits=[];
  if(r._ing) bits.push(r._ing+" ingredients");
  if(r._steps) bits.push(r._steps+" steps");
  return `<a class="rcard" href="#/recipe/${r.id}">
    ${tagHTML(r)}<h3>${esc(r.title)}</h3>
    <div class="meta">${bits.join(" · ")||"&nbsp;"}</div>
    ${r.sourceLabel?`<div class="src-badge">${esc(r.sourceLabel)}</div>`:""}</a>`;
}

function homeView(){
  const tiles = CATS.map(c=>{
    const rs = R.filter(r=>r.category===c.key);
    const sample = rs.slice().sort(()=>0)
      .slice(0,3).map(r=>r.title).join(" · ");
    return `<a class="cat-tile" href="#/category/${c.slug}">
      <div class="band" style="background:${c.color}">
        <span class="sticker">${esc(c.note)}</span>
      </div>
      <div class="body">
        <h3>${esc(c.name)}</h3>
        <div class="sample">${rs.length} recipes — ${esc(sample)}…</div>
      </div></a>`;
  }).join("");
  const top = topRecipes(8);
  const hasHistory = top.length >= 4;
  let picks = hasHistory ? top : dailyPicks(8);
  if(hasHistory && picks.length < 8){
    const ids = new Set(picks.map(r=>r.id));
    picks = picks.concat(dailyPicks(16).filter(r=>!ids.has(r.id)).slice(0, 8-picks.length));
  }
  const favs = picks.map(cardHTML).join("");
  const favTitle = hasHistory ? "Your kitchen regulars" : "Pulled from the box today";
  const favScript = hasHistory ? "the ones you keep coming back to" : "a fresh handful every day";
  app.innerHTML = `
  <section class="hero">
    <div class="hero-fruit f1">${orangeSVG(150)}</div>
    <div class="hero-fruit f2">${lemonSVG(150)}</div>
    <div class="hero-fruit f3">${melonSVG(92)}</div>
    <div class="hero-fruit f4">${sprigSVG(72)}</div>
    <div class="wrap hero-inner">
      <span class="script">a pinch of this, a pinch of that</span>
      <h1>The Family<br><span class="accent">Recipe Box</span></h1>
      <p class="sub">My side, your side — and everyone who married in. Every recipe worth passing down, gathered in one place: the Sunday roasts, the holiday wassail, and all the cream-of-something casseroles in between.</p>
      <div class="count-line">${R.length} recipes &amp; counting</div>
      <nav class="chiprow">${CATS.map(c=>`<a class="chip" href="#/category/${c.slug}"><span class="dot" style="background:${c.color}"></span>${esc(c.name)}</a>`).join("")}</nav>
    </div>
  </section>
  <div class="tile-band"></div>
  <section class="section"><div class="wrap">
    <div class="section-head"><h2>Browse the shelves</h2><span class="script">where do we start?</span></div>
    <div class="cat-grid">${tiles}</div>
  </div></section>
  <section class="section" style="padding-top:8px"><div class="wrap">
    <div class="section-head"><h2>${favTitle}</h2><span class="script">${favScript}</span></div>
    <div class="card-grid">${favs}</div>
  </div></section>`;
  document.title = "The Family Recipe Box";
}

function categoryView(slug, subslug){
  const c = catBySlug[slug];
  if(!c) return homeView();
  const rs = R.filter(r=>r.category===c.key);
  /* group by subcategory, preserving original order */
  const groups=[]; const gmap={};
  rs.forEach(r=>{
    const k = r.subcategory || "";
    if(!(k in gmap)){gmap[k]=[]; groups.push(k);}
    gmap[k].push(r);
  });
  const activeSub = subslug ? groups.find(g=>slugCat(g||"x")===subslug) : undefined;
  const showGroups = (activeSub!==undefined) ? [activeSub] : groups;
  const filterChips = groups.length>1 ? `<nav class="filterchips">
      <a class="fchip${activeSub===undefined?" on":""}" href="#/category/${c.slug}">All (${rs.length})</a>
      ${groups.map(g=>`<a class="fchip${g===activeSub?" on":""}" href="#/category/${c.slug}/${slugCat(g||"x")}">${esc((g||"Everything else").replace(/ > /g," · "))} (${gmap[g].length})</a>`).join("")}
    </nav>` : "";
  const body = filterChips + showGroups.map(g=>{
    const label = g ? g.replace(/ > /g," · ") : "Everything else";
    const inner = gmap[g].map(cardHTML).join("");
    if(showGroups.length===1 && !g) return `<div class="card-grid">${inner}</div>`;
    return `<div class="subhead"><h3>${esc(label)}</h3><div class="rule"></div><span class="n">${gmap[g].length} recipes</span></div>
      <div class="card-grid">${inner}</div>`;
  }).join("");
  app.innerHTML = `
  <section class="section"><div class="wrap">
    <div class="crumbs"><a href="#/">← All categories</a></div>
    <div class="section-head">
      <h2 style="font-size:2.3rem">${esc(c.name)}</h2>
      <span class="script">${esc(c.note)}</span>
      <div class="spacer"></div>
      <span class="n" style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--ink-soft)">${rs.length} recipes</span>
    </div>
    ${body}
  </div></section>`;
  document.title = c.name + " — The Family Recipe Box";
  window.scrollTo(0,0);
}

function sectionKind(label){
  const l = label.toLowerCase();
  if(/ingredient/.test(l)) return "ing";
  if(/direction|instruction|step/.test(l)) return "steps";
  return "other";
}
function itemHTML(it){
  if(it.t==="img") return `<img class="rc-img" src="${it.text}" alt="Handwritten reference chart">`;
  let h = inline(it.text);
  if(it.subs && it.subs.length){
    h += `<ul>${it.subs.map(s=>`<li>${inline(s.text)}</li>`).join("")}</ul>`;
  }
  return h;
}

function recipeView(id){
  const r = byId[id];
  if(!r) return homeView();
  bumpView(id);
  const c = catByKey[r.category];
  const crumb = `<div class="wrap"><div class="crumbs">
    <a href="#/">Home</a> &nbsp;›&nbsp; <a href="#/category/${c.slug}">${esc(c.name)}</a>
    ${r.subcategory?`&nbsp;›&nbsp; ${esc(r.subcategory.replace(/ > /g," · "))}`:""}
  </div>`;

  if(r.stub){
    app.innerHTML = `<section class="section">${crumb}
      <div class="stub-box">
        <div class="script">“${esc(r.title)}”</div>
        <h1 style="font-family:'Fraunces',serif;font-weight:900;font-size:1.7rem;margin-top:6px">This page is still blank.</h1>
        <p>Somebody in the family knows this one by heart. If it's you, send it in so it doesn't get lost.</p>
        ${r.source?`<p style="margin-top:10px">In the meantime: <a href="${esc(r.source)}" target="_blank" rel="noopener">original source</a></p>`:""}
        <a class="btn" href="mailto:laurelbmills@gmail.com?subject=Recipe for the cookbook: ${encodeURIComponent(r.title)}">Email it in</a>
        <p style="margin-top:12px;font-size:.9rem">or copy the address:
          <strong>laurelbmills@gmail.com</strong>
          <button class="copy-mail" data-mail="laurelbmills@gmail.com" type="button">copy</button></p>
      </div></div></section>`;
    document.title = r.title + " — The Family Recipe Box";
    window.scrollTo(0,0);
    return;
  }

  /* split sections into ingredient-side vs step-side */
  const ingSecs=[], stepSecs=[], noteSecs=[];
  let by=null;
  let mode="ing"; // sections before the first steps-labeled section w/ bullets default to ingredients
  r.sections.forEach(s=>{
    const kind = s.label ? sectionKind(s.label) : null;
    const m = s.label && /^by\s+(.+)$/i.exec(s.label.trim());
    if(m && !s.items.length){ by=m[1]; return; }
    if(kind==="steps"){ mode="steps"; stepSecs.push(s); return; }
    if(kind==="ing"){ mode="ing"; ingSecs.push(s); return; }
    /* unlabeled or other-labeled: follow current side by content */
    const hasNum = s.items.some(i=>i.t==="n");
    const hasBul = s.items.some(i=>i.t==="b");
    if(hasNum && !hasBul){ stepSecs.push(s); mode="steps"; }
    else if(hasBul && !hasNum){ (mode==="steps"?stepSecs:ingSecs).push(s); }
    else if(!s.items.length && s.label){ (mode==="steps"?stepSecs:ingSecs).push(s); }
    else if(s.items.length){ (mode==="steps"?stepSecs:noteSecs).push(s); }
  });

  function renderSide(secs, isSteps){
    return secs.map(s=>{
      let h = "";
      if(s.label && !/^(ingredients?|directions?|instructions?)$/i.test(s.label))
        h += `<span class="rc-sub">${inline(s.label)}</span>`;
      const bullets = s.items.filter(i=>i.t==="b");
      const nums = s.items.filter(i=>i.t==="n");
      const paras = s.items.filter(i=>i.t==="p"||i.t==="img");
      if(paras.length) h += paras.map(p=>`<p style="margin:6px 0;font-size:.93rem;color:var(--ink-soft)">${itemHTML(p)}</p>`).join("");
      if(bullets.length && !isSteps) h += `<ul class="ing">${bullets.map(b=>`<li tabindex="0">${itemHTML(b)}</li>`).join("")}</ul>`;
      if(bullets.length && isSteps) h += `<ul class="ing">${bullets.map(b=>`<li tabindex="0">${itemHTML(b)}</li>`).join("")}</ul>`;
      if(nums.length) h += `<ol class="steps">${nums.map(n=>`<li>${itemHTML(n)}</li>`).join("")}</ol>`;
      return h;
    }).join("");
  }
  const notes = noteSecs.length
    ? `<div class="rc-note">${noteSecs.map(s=>s.items.map(i=>`<div>${itemHTML(i)}</div>`).join("")).join("")}</div>` : "";

  app.innerHTML = `<section class="section">${crumb}
    <article class="recipe-card">
      <div class="rc-head">
        <span class="eyebrow">straight from the recipe box</span>
        <h1>${esc(r.title)}</h1>
        ${by?`<div class="byline">by ${esc(by)}</div>`:""}
        <div class="chips">${tagHTML(r)}${r.subcategory?`<span class="tag" style="background:var(--paper-deep)">${esc(r.subcategory.replace(/ > /g," · "))}</span>`:""}${r.sourceLabel?`<span class="tag src">${esc(r.sourceLabel)}</span>`:""}</div>
        ${r.meta && Object.keys(r.meta).length?`<div class="metastrip">${[
          r.meta.serves?`<span><b>Serves</b> ${esc(r.meta.serves)}</span>`:"",
          r.meta.active?`<span><b>Active</b> ${esc(r.meta.active)}</span>`:"",
          r.meta.total?`<span><b>Total</b> ${esc(r.meta.total)}</span>`:"",
          r.meta.calories?`<span><b>Calories</b> ${esc(r.meta.calories)}${r.meta.per?` per ${esc(r.meta.per)}`:""}</span>`:"",
          r.meta.macros?`<span><b>Macros</b> ${esc(r.meta.macros)}</span>`:""
        ].filter(Boolean).join("")}</div>`:""}
        <div class="rc-actions">
          <button onclick="window.print()">Print</button>
          <button id="sharebtn">Copy link</button>
        </div>
      </div>
      <div class="rc-body">
        <div class="rc-ing">
          <span class="rc-label">Ingredients</span>
          ${renderSide(ingSecs,false) || '<p style="color:var(--ink-soft);font-size:.92rem">See directions →</p>'}
        </div>
        <div class="rc-steps">
          <span class="rc-label">Directions</span>
          ${renderSide(stepSecs,true)}
          ${notes}
        </div>
      </div>
    </article>
  </div></section>`;
  document.title = r.title + " — The Family Recipe Box";
  window.scrollTo(0,0);

  /* tap to cross off ingredients */
  app.querySelectorAll("ul.ing li").forEach(li=>{
    const toggle=()=>li.classList.toggle("done");
    li.addEventListener("click",e=>{if(e.target.tagName!=="A")toggle();});
    li.addEventListener("keydown",e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle();}});
  });
  const sb=document.getElementById("sharebtn");
  if(sb) sb.addEventListener("click",()=>{
    navigator.clipboard.writeText(location.href).then(()=>{sb.textContent="Copied!";setTimeout(()=>sb.textContent="Copy link",1500);});
  });
}

function searchView(q){
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  const hits = terms.length ? R.filter(r=>terms.every(t=>r._hay.includes(t))) : [];
  app.innerHTML = `<section class="section"><div class="wrap">
    <div class="crumbs"><a href="#/">← Back to the cookbook</a></div>
    <div class="section-head"><h2>Search</h2>
      <span class="script">looking for “${esc(q)}”</span>
      <div class="spacer"></div>
      <span style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--ink-soft)">${hits.length} found</span>
    </div>
    ${hits.length
      ? `<div class="card-grid">${hits.map(cardHTML).join("")}</div>`
      : `<div class="empty-note"><span class="script">nothing in the recipe box yet…</span>
         Try a different ingredient or dish name — or browse a category from the home page.</div>`}
  </div></section>`;
  document.title = `“${q}” — The Family Recipe Box`;
}

/* ============ router ============ */
function route(){
  const h = location.hash || "#/";
  let m;
  if((m=h.match(/^#\/recipe\/(.+)$/))) return recipeView(decodeURIComponent(m[1]));
  if((m=h.match(/^#\/category\/([^\/]+)(?:\/(.+))?$/))) return categoryView(decodeURIComponent(m[1]), m[2]?decodeURIComponent(m[2]):undefined);
  if((m=h.match(/^#\/search\/(.*)$/))) return searchView(decodeURIComponent(m[1]));
  return homeView();
}
function wireCopyMail(){
  document.querySelectorAll(".copy-mail").forEach(b=>{
    if(b._wired) return; b._wired = true;
    b.addEventListener("click",()=>{
      navigator.clipboard.writeText(b.dataset.mail).then(()=>{
        b.textContent="copied!"; setTimeout(()=>b.textContent="copy",1500);
      });
    });
  });
}
window.addEventListener("hashchange",()=>{route();wireCopyMail();});
route();
wireCopyMail();

/* search box */
const box = document.getElementById("searchbox");
let deb;
box.addEventListener("input",()=>{
  clearTimeout(deb);
  deb = setTimeout(()=>{
    const q = box.value.trim();
    if(q) location.hash = "#/search/"+encodeURIComponent(q);
    else if(location.hash.startsWith("#/search/")) location.hash = "#/";
  },220);
});
box.addEventListener("keydown",e=>{
  if(e.key==="Enter"){const q=box.value.trim(); if(q) location.hash="#/search/"+encodeURIComponent(q);}
});
</script>
