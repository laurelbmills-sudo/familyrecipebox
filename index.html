*Refrigerate:** Chill the salad for at least 2 hours","subs":[]},{"t":"n","text":"**Serve:** When ready to serve, toss with the remaining dressing. Taste and adjust salt and pepper as needed. Garnish with fresh dill","subs":[]}]}],"stub":false,"source":null},{"id":"macaroni-salad","title":"Macaroni Salad","category":"Sides & Appetizers","subcategory":"Salads","sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Salad:**","subs":[]},{"t":"b","text":"8 oz macaroni noodles","subs":[]},{"t":"b","text":"2 hard-boiled eggs, chopped","subs":[]},{"t":"b","text":"½ c Persian cucumbers, chopped","subs":[]},{"t":"b","text":"½ c red bell peppers, chopped","subs":[]},{"t":"b","text":"¼ c celery, chopped","subs":[]},{"t":"b","text":"2 tbsp red onion, chopped","subs":[]},{"t":"b","text":"**Dressing:**","subs":[]},{"t":"b","text":"½ c light mayo","subs":[]},{"t":"b","text":"¼ c plain nonfat Greek yogurt","subs":[]},{"t":"b","text":"½ tbsp sugar","subs":[]},{"t":"b","text":"2 tsp Dijon mustard","subs":[]},{"t":"b","text":"1 tbsp pickle juice","subs":[]},{"t":"b","text":"1 tsp white wine vinegar","subs":[]},{"t":"b","text":"¼ tsp garlic powder, ¼ tsp paprika, salt and pepper to taste","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Cook the macaroni according to the package instructions and hard boil the eggs.","subs":[]},{"t":"n","text":"In a large mixing bowl, toss together the salad ingredients.","subs":[]},{"t":"n","text":"In a small mixing bowl, whisk together the dressing ingredients.","subs":[]},{"t":"n","text":"Pour the dressing over the salad and toss until well incorporated. Split into 6 servings.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"6","active":"10 min","total":"20 min","calories":"232","macros":"32c/8f/48p"},"sourceLabel":"Mamele Macro Meals · Dec '23"},{"id":"strawberry-feta-spinach-salad","title":"Strawberry Feta Spinach Salad","category":"Sides & Appetizers","subcategory":"Salads","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 cups spinach","subs":[]},{"t":"b","text":"1 tablespoon extra virgin olive oil","subs":[]},{"t":"b","text":"2 tablespoons balsamic vinegar","subs":[]},{"t":"b","text":"1/8 teaspoon black pepper","subs":[]},{"t":"b","text":"2 cups strawberries, sliced","subs":[]},{"t":"b","text":"1 cup walnuts","subs":[]},{"t":"b","text":"1/2 cup feta cheese","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large salad bowl, combine spinach, olive oil, balsamic vinegar, and pepper. Toss to mix well","subs":[]},{"t":"n","text":"Add strawberries and walnuts, and toss again","subs":[]},{"t":"n","text":"Add feta cheese and toss gently","subs":[]}]}],"stub":false,"source":null},{"id":"air-fryer-garlic-parmesan-potatoes","title":"Air Fryer Garlic Parmesan Potatoes","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1/2 teaspoon basil, dried","subs":[]},{"t":"b","text":"5 cloves garlic, minced","subs":[]},{"t":"b","text":"1/2 teaspoon oregano, dried","subs":[]},{"t":"b","text":"2 tablespoons parsley leaves","subs":[]},{"t":"b","text":"3 pounds red potatoes","subs":[]},{"t":"b","text":"1 teaspoon thyme, dried","subs":[]},{"t":"b","text":"Kosher salt and freshly ground black pepper, to taste","subs":[]},{"t":"b","text":"2 tablespoons olive oil","subs":[]},{"t":"b","text":"2 tablespoons unsalted butter, melted","subs":[]},{"t":"b","text":"1/3 cup Parmesan cheese, grated","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Clean and cut the potatoes into quarters","subs":[]},{"t":"n","text":"In a large bowl or ziplock bag, combine the potatoes and the rest of the ingredients, mixing or shaking well","subs":[]},{"t":"n","text":"Place a piece of baking paper in your Air Fryer","subs":[]},{"t":"n","text":"Set the Air Fryer to 400°F and cook for 18 to 20 minutes, or until the potatoes are crisp and golden","subs":[]},{"t":"n","text":"Tip: Toss the potatoes about 10 minutes into cooking for even baking","subs":[]}]}],"stub":false,"source":null},{"id":"brown-rice","title":"Brown Rice","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 cup white rice","subs":[]},{"t":"b","text":"2 cans French Onion Soup (or 1 can French Onion Soup & 1 can water)","subs":[]},{"t":"b","text":"1/3 cup butter","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 400°F.","subs":[]},{"t":"n","text":"In a baking dish, mix the rice and soup together until well combined.","subs":[]},{"t":"n","text":"Cut the butter into small pieces and place them evenly over the top of the mixture.","subs":[]},{"t":"n","text":"Bake in the oven for 40-45 minutes, or until the rice is tender.","subs":[]}]}],"stub":false,"source":null},{"id":"cheesy-oven-potatoes","title":"Cheesy Oven Potatoes","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"½ - ¾ cup butter","subs":[]},{"t":"b","text":"½ cup chopped onion","subs":[]},{"t":"b","text":"1 small can cream of mushroom soup","subs":[]},{"t":"b","text":"½ empty can full of milk","subs":[]},{"t":"b","text":"1 cup shredded cheddar cheese","subs":[]},{"t":"b","text":"Salt and pepper to taste","subs":[]},{"t":"b","text":"6 large potatoes, boiled, drained, and cut in half","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Melt the butter and sauté the chopped onion until transparent","subs":[]},{"t":"n","text":"Add the cream of mushroom soup and milk, stirring to combine, then heat through","subs":[]},{"t":"n","text":"Stir in the shredded cheddar cheese until melted and smooth","subs":[]},{"t":"n","text":"Season with salt and pepper to taste","subs":[]},{"t":"n","text":"Place the sliced potatoes in a 9x13 casserole dish and pour the sauce mixture over the top","subs":[]},{"t":"n","text":"Bake at 350° for 30 minutes","subs":[]}]}],"stub":false,"source":null},{"id":"cinnamon-roasted-sweet-potatoes","title":"Cinnamon Roasted Sweet Potatoes","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 sweet potatoes, peeled and chopped (660 g)","subs":[]},{"t":"b","text":"1 tbsp butter","subs":[]},{"t":"b","text":"2 tbsp Truvia brown sugar","subs":[]},{"t":"b","text":"1 tsp cinnamon","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 425°F.","subs":[]},{"t":"n","text":"In a medium mixing bowl, toss the sweet potatoes with the butter, Truvia brown sugar, and cinnamon. Transfer to a baking sheet and roast for 40 minutes.","subs":[]},{"t":"n","text":"Split into 4 portions and serve.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"5 min","total":"45 min","calories":"143","macros":"26c/3f/3p"},"sourceLabel":"Mamele Macro Meals · Oct '22"},{"id":"creamy-scalloped-potatoes","title":"Creamy Scalloped Potatoes","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"6 medium potatoes, peeled and sliced thin","subs":[]},{"t":"b","text":"1 teaspoon salt","subs":[]},{"t":"b","text":"¼ teaspoon pepper","subs":[]},{"t":"b","text":"3 tablespoons margarine","subs":[]},{"t":"b","text":"3 tablespoons flour","subs":[]},{"t":"b","text":"2½ cups milk","subs":[]},{"t":"b","text":"1 small onion, sliced","subs":[]},{"t":"b","text":"Optional: ¼ lb grated cheddar cheese (for a cheesy version)","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Preheat the oven to 350°F.","subs":[]},{"t":"n","text":"Peel and slice the potatoes into thin rounds and layer them in a baking pan.","subs":[]},{"t":"n","text":"Add the sliced onion on top of the potatoes.","subs":[]},{"t":"n","text":"In a saucepan, melt the margarine over low heat. Once melted, blend in the flour, salt, and pepper.","subs":[]},{"t":"n","text":"Gradually stir in the milk, and cook over medium heat until the mixture thickens into a smooth sauce.","subs":[]},{"t":"n","text":"Pour the white sauce evenly over the potatoes and onion in the pan.","subs":[]},{"t":"n","text":"Cover the pan with aluminum foil and bake for 1 hour.","subs":[]},{"t":"n","text":"If you’d like a cheesy version, sprinkle the grated cheddar cheese over the potatoes before baking or mix it into the sauce before pouring it over the potatoes.","subs":[]}]}],"stub":false,"source":null},{"id":"dressing-stuffing","title":"Dressing (Stuffing)","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 sticks butter","subs":[]},{"t":"b","text":"1-2 celery stalks, finely chopped","subs":[]},{"t":"b","text":"1 onion, finely chopped","subs":[]},{"t":"b","text":"4-5 chicken bouillon cubes","subs":[]},{"t":"b","text":"Water","subs":[]},{"t":"b","text":"3-4 packages of dressing mix","subs":[]},{"t":"b","text":"2 medium carrots, grated","subs":[]},{"t":"b","text":"Salt and pepper to taste","subs":[]},{"t":"b","text":"1 tsp sage","subs":[]},{"t":"b","text":"1 tsp poultry seasoning","subs":[]},{"t":"b","text":"6-8 eggs","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Melt the butter in a pan and sauté the celery and onion until softened.","subs":[]},{"t":"n","text":"In a large frying pan, add enough water to cover the top and dissolve 4-5 chicken bouillon cubes.","subs":[]},{"t":"n","text":"To the dressing mix, add grated carrots, salt, pepper, sage, and poultry seasoning, then stir in the butter mixture.","subs":[]},{"t":"n","text":"Gradually add the liquid and eggs, alternating between the two, mixing well.","subs":[]},{"t":"n","text":"Grease a casserole dish and pour the mixture in.","subs":[]},{"t":"n","text":"Bake at 350°F for 30-45 minutes until golden and set.","subs":[]}]}],"stub":false,"source":null},{"id":"easy-fried-rice","title":"Easy Fried Rice","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"½ tbsp olive oil","subs":[]},{"t":"b","text":"½ yellow onion, chopped","subs":[]},{"t":"b","text":"4 garlic cloves, minced","subs":[]},{"t":"b","text":"1 c frozen peas","subs":[]},{"t":"b","text":"1 c frozen corn","subs":[]},{"t":"b","text":"12 oz rotisserie chicken, shredded and chopped","subs":[]},{"t":"b","text":"2 c rice, cooked","subs":[]},{"t":"b","text":"¼ c coconut aminos or low-sodium soy sauce","subs":[]},{"t":"b","text":"2 tsp sesame oil","subs":[]},{"t":"b","text":"1 tsp ground ginger","subs":[]},{"t":"b","text":"2 eggs","subs":[]},{"t":"b","text":"Salt and pepper to taste","subs":[]},{"t":"b","text":"2 green onions, chopped","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large skillet or wok, heat the olive oil over medium-high heat. Sauté the onion and garlic 3–4 minutes.","subs":[]},{"t":"n","text":"Add the peas, corn, chicken, rice, coconut aminos, sesame oil, and ginger. Sauté 5–6 minutes, until the vegetables are soft and cooked through.","subs":[]},{"t":"n","text":"Make a well in the middle of the skillet and scramble the eggs. Once cooked through, mix them into the rice. Season with salt and pepper and top with green onions.","subs":[]},{"t":"n","text":"Split into 6 portions and serve.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"6","active":"20 min","total":"20 min","calories":"197","macros":"16c/5f/22p"},"sourceLabel":"Mamele Macro Meals · Nov '22"},{"id":"funeral-potatoes","title":"Funeral Potatoes","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"32 oz package of frozen hash browns","subs":[]},{"t":"b","text":"1 cup sour cream","subs":[]},{"t":"b","text":"1/2 cup butter, melted","subs":[]},{"t":"b","text":"1 can cream of chicken soup","subs":[]},{"t":"b","text":"2 cups grated cheese","subs":[]},{"t":"b","text":"Salt and pepper, to taste","subs":[]},{"t":"b","text":"Onion salt, to taste","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Preheat the oven to 350°F.","subs":[]},{"t":"n","text":"Spread the hash browns evenly in a 9x11 baking pan.","subs":[]},{"t":"n","text":"In a large bowl, mix together the sour cream, melted butter, cream of chicken soup, grated cheese, salt, pepper, and onion salt.","subs":[]},{"t":"n","text":"Pour the mixture over the hash browns, spreading it evenly.","subs":[]},{"t":"n","text":"Bake in the oven for about 1 hour, or until the top is golden and bubbly.","subs":[]}]}],"stub":false,"source":null},{"id":"orange-glazed-yams","title":"Orange Glazed Yams","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"6 medium sweet potatoes","subs":[]},{"t":"b","text":"2 tablespoons white Karo syrup","subs":[]},{"t":"b","text":"2 tablespoons butter","subs":[]},{"t":"b","text":"¾ cup brown sugar","subs":[]},{"t":"b","text":"1 tablespoon grated orange peel","subs":[]},{"t":"b","text":"½ cup orange juice","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Peel and chop the sweet potatoes into chunks. Boil them in water until tender, then drain.","subs":[]},{"t":"n","text":"In a separate saucepan, melt the butter over low heat.","subs":[]},{"t":"n","text":"Add the brown sugar, orange juice, grated orange peel, and Karo syrup. Stir well and cook on low heat for 10-15 minutes until the mixture thickens slightly.","subs":[]},{"t":"n","text":"Add the cooked sweet potatoes to the glaze and stir to coat them.","subs":[]},{"t":"n","text":"Simmer the sweet potatoes in the glaze for 20-30 minutes, allowing them to absorb the flavors and become tender.","subs":[]}]}],"stub":false,"source":null},{"id":"sweet-potatoe-casserole-boston-market-copycat","title":"Sweet Potato Casserole (Boston Market Copycat)","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"*3 ½ - 4 pounds yams, peeled and cut into 1” pieces* (or *2-29oz cans yams, drained*)","subs":[]},{"t":"b","text":"*4 tablespoons (½ stick) unsalted butter*","subs":[]},{"t":"b","text":"*¾ cup packed light brown sugar*","subs":[]},{"t":"b","text":"*½ cup heavy cream or milk* (or *1/4 C if using canned yams*)","subs":[]},{"t":"b","text":"*1 teaspoon kosher salt*","subs":[]},{"t":"b","text":"*1 tablespoon pure vanilla extract*","subs":[]},{"t":"b","text":"*1 teaspoon ground cinnamon*","subs":[]},{"t":"b","text":"*¼ teaspoon ground nutmeg*","subs":[]}]},{"label":"For the Topping","items":[{"t":"b","text":"*2 cups mini marshmallows*","subs":[]},{"t":"b","text":"*½ cup flour*","subs":[]},{"t":"b","text":"*4 tablespoons unsalted butter*","subs":[]},{"t":"b","text":"*6 tablespoons packed light brown sugar*","subs":[]},{"t":"b","text":"*¼ cup old fashioned rolled oats*","subs":[]},{"t":"b","text":"*¼ teaspoon ground cinnamon*","subs":[]},{"t":"b","text":"*Flaked coconut (optional)*","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Fill a large pot with sweet potato pieces and water. Bring to a boil over high heat. Cook until fork-tender. Drain potatoes and place them back into the pot. Mash potatoes with a potato masher or blend with an electric mixer until mostly smooth","subs":[]},{"t":"n","text":"Add remaining ingredients (except topping ingredients). Mix until combined","subs":[]},{"t":"n","text":"Preheat oven to 350°F. Grease an 8”x10” casserole dish (8x8 or 9x9 works too)","subs":[]},{"t":"n","text":"Spoon sweet potatoes into the casserole dish and smooth out. Sprinkle the top of the sweet potatoes with marshmallows","subs":[]},{"t":"n","text":"Melt butter in a medium microwave-safe bowl. Add remaining topping ingredients and mix with a fork. Sprinkle the mixture over the top of the casserole","subs":[]},{"t":"n","text":"Bake for 20-25 minutes until the streusel is crisp and marshmallows are golden brown","subs":[]}]}],"stub":false,"source":null},{"id":"twice-baked-potatoes","title":"Twice Baked Potatoes","category":"Sides & Appetizers","subcategory":"Starches","sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 medium baked potatoes","subs":[]},{"t":"b","text":"¼ cup butter","subs":[]},{"t":"b","text":"½ cup milk","subs":[]},{"t":"b","text":"Salt and pepper to taste","subs":[]},{"t":"b","text":"1 cup grated cheddar cheese (reserve ¼ cup for topping)","subs":[]},{"t":"b","text":"1 tablespoon finely chopped onion","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Bake the potatoes, then let them stand for a few minutes. Once cooled slightly, halve the potatoes lengthwise and carefully scoop out the insides. Set the shells aside.","subs":[]},{"t":"n","text":"In a mixing bowl, combine the potato insides, butter, milk, salt, and pepper. Mash until fluffy.","subs":[]},{"t":"n","text":"Stir in ¾ cup cheese and chopped onion. Spoon the mashed potato mixture back into the potato shells.","subs":[]},{"t":"n","text":"Sprinkle the remaining ¼ cup cheese on top.","subs":[]},{"t":"n","text":"Place the stuffed potatoes on a serving plate and microwave for 1 ½ to 2 minutes on high, or until the cheese melts and the potatoes are hot.","subs":[]}]}],"stub":false,"source":null},{"id":"absurdly-addictive-asparagus","title":"Absurdly Addictive Asparagus","category":"Sides & Appetizers","subcategory":"Vegetables","sections":[{"label":"Ingredients","items":[{"t":"b","text":"*4 ounces pancetta, cut into 3/8 inch to 1/4 inch dice*","subs":[]},{"t":"b","text":"*1 tablespoon butter*","subs":[]},{"t":"b","text":"*1 pound asparagus, woody ends trimmed and sliced into 2-inch pieces on the bias*","subs":[]},{"t":"b","text":"*1 1/4 cup leek, thinly sliced crosswise (white and pale green parts only)*","subs":[]},{"t":"b","text":"*2 cloves garlic, minced*","subs":[]},{"t":"b","text":"*Zest of one lemon*","subs":[]},{"t":"b","text":"*1 teaspoon orange zest*","subs":[]},{"t":"b","text":"*2 tablespoons toasted pine nuts*","subs":[]},{"t":"b","text":"*1-2 tablespoon Italian parsley, chopped*","subs":[]},{"t":"b","text":"*Salt and freshly ground pepper to taste*","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large non-stick pan, sauté pancetta, stirring frequently, over medium heat, until crisp and lightly golden","subs":[]},{"t":"n","text":"Add 1 tablespoon of butter to the pan. Add asparagus pieces and leek and sauté until asparagus is tender-crisp, about 3-4 minutes","subs":[]},{"t":"n","text":"Add garlic, lemon and orange zest, toasted pine nuts, and parsley, and sauté for about 1 minute, until fragrant","subs":[]},{"t":"n","text":"Season to taste with freshly ground pepper and salt and serve immediately","subs":[]}]}],"stub":false,"source":null},{"id":"air-fryer-green-beans","title":"Air Fryer Green Beans","category":"Sides & Appetizers","subcategory":"Vegetables","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 cups green beans","subs":[]},{"t":"b","text":"1/2 tsp oil","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Wash green beans and cut off ends if necessary","subs":[]},{"t":"n","text":"Toss beans with oil","subs":[]},{"t":"n","text":"Place beans into air fryer and cook at 390°F for 10 minutes","subs":[]}]}],"stub":false,"source":null},{"id":"air-fryer-zucchini-squash-carrots","title":"Air Fryer Zucchini, Squash, & Carrots","category":"Sides & Appetizers","subcategory":"Vegetables","sections":[{"label":"Ingredients","items":[{"t":"b","text":"½ pound carrots, peeled and cut into 1-inch cubes","subs":[]},{"t":"b","text":"6 teaspoons olive oil","subs":[]},{"t":"b","text":"1 pound zucchini, stem and root ends trimmed and cut into ¾-inch half moons","subs":[]},{"t":"b","text":"1 pound yellow squash, stem and root ends trimmed and cut into ¾-inch half moons","subs":[]},{"t":"b","text":"1 teaspoon kosher salt","subs":[]},{"t":"b","text":"½ teaspoon ground white pepper","subs":[]},{"t":"b","text":"1 tablespoon tarragon leaves, roughly chopped","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a small bowl, combine the carrot cubes with 2 teaspoons of the olive oil and toss well to combine. Place the carrots in the basket of the Air Fryer and close the drawer. Set the temperature to 400°F and the timer to 5 minutes.","subs":[]},{"t":"n","text":"While the carrots cook, place the zucchini and yellow squash pieces in a medium bowl. Drizzle with the remaining 4 teaspoons of olive oil and season with the salt and pepper. Toss well to coat the vegetables evenly.","subs":[]},{"t":"n","text":"Once the timer goes off, add the zucchini and yellow squash to the basket of the Air Fryer along with the carrots and close the drawer. Set the timer for 30 minutes and cook the vegetables, tossing two or three times throughout the cooking process to ensure even browning.","subs":[]},{"t":"n","text":"When the timer goes off, remove the vegetables from the Air Fryer and toss with the tarragon.","subs":[]}]}],"stub":false,"source":null},{"id":"bacon-garlic-green-beans","title":"Bacon Garlic Green Beans","category":"Sides & Appetizers","subcategory":"Vegetables","sections":[{"label":"Ingredients","items":[{"t":"b","text":"3 pieces bacon","subs":[]},{"t":"b","text":"16 oz green beans","subs":[]},{"t":"b","text":"4 garlic cloves, minced","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large skillet, cook the bacon until crispy. Remove from the pan and set aside.","subs":[]},{"t":"n","text":"Add the green beans directly to the skillet and cook 4–5 minutes. Add the garlic and cook until the green beans are fork-tender, about 15 minutes.","subs":[]},{"t":"n","text":"Crumble the bacon over the top, split into 4 portions, and serve.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"5 min","total":"20 min","calories":"58","macros":"6c/2f/4p"},"sourceLabel":"Mamele Macro Meals · Oct '22"},{"id":"cheesy-velveeta-vegetables","title":"Cheesy Velveeta Vegetables","category":"Sides & Appetizers","subcategory":"Vegetables","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 (4oz) package of Velveeta Cheese","subs":[]},{"t":"b","text":"1 (16 oz) package of California vegetables","subs":[]},{"t":"b","text":"1 can cream of chicken soup (can use mushroom)","subs":[]},{"t":"b","text":"1 cube of butter","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Cook the vegetables according to the package","subs":[]},{"t":"n","text":"When cooked, add cream of chicken soup, butter, and Velveeta cheese","subs":[]},{"t":"n","text":"Stir until the cheese and butter are melted and the mixture is well combined","subs":[]},{"t":"n","text":"Serve hot","subs":[]}]}],"stub":false,"source":null},{"id":"creamed-corn","title":"Creamed Corn","category":"Sides & Appetizers","subcategory":"Vegetables","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 packages (20 oz) frozen corn, thawed","subs":[]},{"t":"b","text":"1 cup (8 oz) heavy whipping cream","subs":[]},{"t":"b","text":"1 cup (8 oz) whole milk","subs":[]},{"t":"b","text":"6 teaspoons granulated sugar","subs":[]},{"t":"b","text":"1 teaspoon salt","subs":[]},{"t":"b","text":"A pinch of white or red pepper","subs":[]},{"t":"b","text":"2 tablespoons melted butter","subs":[]},{"t":"b","text":"2 tablespoons flour","subs":[]},{"t":"b","text":"¼ cup grated Parmesan cheese","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a medium-sized saucepan, combine the thawed corn, heavy whipping cream, whole milk, sugar, salt, and pepper.","subs":[]},{"t":"n","text":"Bring the mixture to a boil, then reduce the heat and let it simmer for about 5 minutes.","subs":[]},{"t":"n","text":"In a separate bowl, blend the melted butter with the flour to create a smooth mixture. Add this to the simmering corn mixture and mix well.","subs":[]},{"t":"n","text":"Remove the saucepan from the heat and pour the mixture into a medium-sized heat-proof casserole dish.","subs":[]},{"t":"n","text":"Sprinkle the Parmesan cheese evenly over the top.","subs":[]},{"t":"n","text":"Place the casserole dish under the broiler until the top is lightly browned (about 2-3 minutes). Watch carefully to avoid burning.","subs":[]}]}],"stub":false,"source":null},{"id":"four-cheese-garlic-spaghetti-squash","title":"Four Cheese Garlic Spaghetti Squash","category":"Sides & Appetizers","subcategory":"Vegetables","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 large spaghetti squash","subs":[]},{"t":"b","text":"5 garlic cloves, minced","subs":[]},{"t":"b","text":"1/2 cup water","subs":[]},{"t":"b","text":"1 chicken bouillon cube, crumbled","subs":[]},{"t":"b","text":"1 cup heavy cream","subs":[]},{"t":"b","text":"1 cup Four-Cheese Italian White Cheese Blend (Mozzarella, White Cheddar, Provolone, Asiago)","subs":[]},{"t":"b","text":"Fresh thyme","subs":[]},{"t":"b","text":"Fresh ground pepper","subs":[]},{"t":"b","text":"Parsley, chives, or green onions, finely chopped","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat your oven to 400°F","subs":[]},{"t":"n","text":"Cut the spaghetti squash in half lengthwise, scoop out the innards and seeds, and place both halves on a baking sheet. Use a small foil ring to stabilize the squash halves. Sprinkle fresh cracked pepper over each half","subs":[]},{"t":"n","text":"In a large bowl, combine minced garlic, heavy cream with 1/2 cup water, crumbled bouillon cube, chives, and fresh thyme. Mix well","subs":[]},{"t":"n","text":"Sprinkle a layer of grated cheese into the cavities of each squash half. Divide the cream mixture evenly on top of the cheese in each half, then top with more cheese","subs":[]},{"t":"n","text":"Roast in the oven for 40 to 50 minutes, or until the flesh is very tender when poked with a fork. Remove from the oven and serve immediately","subs":[]}]},{"label":"Notes","items":[{"t":"b","text":"To cut baking time, place raw squash halves face down in a shallow dish with a bit of water, and microwave for 8 minutes (adjust based on the squash size). The flesh will be nearly cooked through, and then ed carrots and cook for 6-8 minutes, stirring occasionally, until tender. Drizzle with honey and sprinkle with cinnamon (if using). Stir and cook for 2 more minutes.","subs":[]}]}],"stub":false,"source":null},{"id":"honey-roasted-carrots","title":"Honey Roasted Carrots","category":"Sides & Appetizers","subcategory":"Vegetables","sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 lb carrots, peeled and cut into 2-inch pieces","subs":[]},{"t":"b","text":"2½ tbsp butter, melted","subs":[]},{"t":"b","text":"2 garlic cloves","subs":[]},{"t":"b","text":"1½ tbsp honey","subs":[]},{"t":"b","text":"¼ tsp salt and pepper","subs":[]},{"t":"b","text":"Fresh parsley, for garnish (optional)","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 400°F.","subs":[]},{"t":"n","text":"In a large mixing bowl, toss the carrots with the butter, garlic, honey, salt, and pepper. Transfer to a baking sheet and roast for 35–40 minutes.","subs":[]},{"t":"n","text":"Garnish with fresh parsley if desired. Split into 4 portions and serve.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"5 min","total":"40 min","calories":"123","macros":"14c/7f/1p"},"sourceLabel":"Mamele Macro Meals · Oct '22"},{"id":"honey-roasted-delicata-squash","title":"Honey Roasted Delicata Squash","category":"Sides & Appetizers","subcategory":"Vegetables","sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 delicata squash, seeds removed, cut into crescent moons","subs":[]},{"t":"b","text":"1½ tbsp olive oil","subs":[]},{"t":"b","text":"2 tbsp honey","subs":[]},{"t":"b","text":"½ tsp salt","subs":[]},{"t":"b","text":"2 tbsp hot honey","subs":[]},{"t":"b","text":"1 tbsp walnuts, finely chopped","subs":[]},{"t":"b","text":"1 tbsp dried basil","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Preheat the oven to 425°F.","subs":[]},{"t":"n","text":"Place the squash on a baking sheet, drizzle with the olive oil and honey, and season with salt. Ro  oven to 400°F.","subs":[]},{"t":"n","text":"In a large mixing bowl, toss the cauliflower with the sweet and sour sauce until well coated.","subs":[]},{"t":"n","text":"Air fry 12–15 minutes, or roast in the oven 30–35 minutes.","subs":[]},{"t":"n","text":"Sprinkle with green onions and sesame seeds. Serving size is 1 c.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"5 min","total":"20 min","calories":null,"macros":null},"sourceLabel":"Mamele Macro Meals · Dec '23"},{"id":"autumn-vegetable-soup","title":"Autumn Vegetable Soup","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 tbsp olive oil","subs":[]},{"t":"b","text":"2 c butternut squash, chopped","subs":[]},{"t":"b","text":"3 medium carrots, peeled and chopped","subs":[]},{"t":"b","text":"2 large red bell peppers, chopped","subs":[]},{"t":"b","text":"1 large yellow onion, chopped","subs":[]},{"t":"b","text":"1 c cauliflower, chopped","subs":[]},{"t":"b","text":"4 garlic cloves, chopped","subs":[]},{"t":"b","text":"¼ c tomato paste","subs":[]},{"t":"b","text":"1 tsp salt, 1 tsp pepper, 2 tbsp Italian seasoning, 1 tbsp parsley, 1 tsp rubbed sage, 1 tsp coriander","subs":[]},{"t":"b","text":"6 c chicken bone broth","subs":[]},{"t":"b","text":"1 chicken bouillon cube","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large stockpot (preferably cast iron), heat the olive oil over medium-high heat. Add the butternut squash, carrots, bell peppers, onion, cauliflower, and garlic and sauté about 5 minutes.","subs":[]},{"t":"n","text":"Add the seasonings and tomato paste and mix until well combined. Add the bone broth and bouillon. Bring to a boil, cover, and boil 15–20 minutes, until the vegetables are completely cooked.","subs":[]},{"t":"n","text":"Blend with an immersion blender (or in batches in a regular blender) to your desired texture.","subs":[]},{"t":"n","text":"One serving is about ⅙ of the soup.","subs":[]}]}],"st re recipe and divide the weight by four to get the amount needed for one serving. Serve warm topped with cheese, Greek yogurt and avocado.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"350","macros":"36c/12f/24p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"butternut-squash-soup-with-sourdough-grilled-cheese","title":"Butternut Squash Soup with Sourdough Grilled Cheese","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Soup:**","subs":[]},{"t":"b","text":"2 tbsp butter","subs":[]},{"t":"b","text":"1 yellow onion, chopped","subs":[]},{"t":"b","text":"1 large carrot, peeled and chopped","subs":[]},{"t":"b","text":"2 garlic cloves, minced","subs":[]},{"t":"b","text":"1 tbsp dried rubbed sage","subs":[]},{"t":"b","text":"1 tsp salt and pepper","subs":[]},{"t":"b","text":"3 c butternut squash, chopped","subs":[]},{"t":"b","text":"6 c chicken bone broth","subs":[]},{"t":"b","text":"1 c water","subs":[]},{"t":"b","text":"1 chicken bouillon cube","subs":[]},{"t":"b","text":"**Grilled Cheese:**","subs":[]},{"t":"b","text":"12 slices sourdough bread","subs":[]},{"t":"b","text":"1 tbsp butter","subs":[]},{"t":"b","text":"6 slices mozzarella cheese","subs":[]},{"t":"b","text":"16 oz deli turkey slices","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large stockpot (cast iron is great), melt the butter over medium-high heat. Add the onion, carrot, garlic, and butternut squash and sauté 4–5 minutes. Add the sage, salt, and pepper.","subs":[]},{"t":"n","text":"Add the bone broth, water, and bouillon. Bring to a boil, cover, and boil 15–18 minutes. Turn off the heat.","subs":[]},{"t":"n","text":"Blend with an immersion blender until creamy and smooth (or blend in batches in a regular blender). Add more salt, pepper, and sage to taste.","subs":[]},{"t":"n","text":"In a large skillet, make the grilled cheese sandwiches with the sourdough, mozzarella, and turkey: butter the outside of the bread and cook until golden brown and melty.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"6","active":"10 min","total":"40 min","calories":"278","macros":"37c/10f/36p"},"sourceLabel":"Mamele Macro Meals · Oct '22"},{"id":"chicken-fajita-tortilla-soup","title":"Chicken Fajita Tortilla Soup","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"3 cloves garlic, minced","subs":[]},{"t":"b","text":"1 onion, chopped","subs":[]},{"t":"b","text":"3 tablespoons butter","subs":[]},{"t":"b","text":"2 tablespoons flour","subs":[]},{"t":"b","text":"2 teaspoons cumin","subs":[]},{"t":"b","text":"1 package fajita seasoning","subs":[]},{"t":"b","text":"3 cans chicken broth","subs":[]},{"t":"b","text":"4 cups half & half","subs":[]},{"t":"b","text":"1 can cream of chicken soup","subs":[]},{"t":"b","text":"1 cup fresh salsa (or bottled)","subs":[]},{"t":"b","text":"1 can creamed corn","subs":[]},{"t":"b","text":"6 cooked chicken breasts, chunked","subs":[]},{"t":"b","text":"3 tablespoons cilantro, chopped","subs":[]},{"t":"b","text":"Lime tortilla chips, for serving","subs":[]},{"t":"b","text":"1 cup shredded cheese, for serving","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Sauté Onion and Garlic:** In a large pot, sauté the onion and garlic in butter until softened.","subs":[]},{"t":"n","text":"**Add Flour and Seasonings:** Stir in flour, cumin, and fajita seasoning. Cook for about 1 minute.","subs":[]},{"t":"n","text":"**Add Liquids and Bring to Boil:** Pour in the chicken broth and half & half. Bring the mixture to a boil.","subs":[]},{"t":"n","text":"**Add Remaining Ingredients:** Add the cream of chicken soup, salsa, creamed corn, and chicken chunks. Stir to combine and let the soup heat through for about 15 minutes.","subs":[]},{"t":"n","text":"**Serve:** Ladle the soup into bowls and top with lime tortilla chips and shredded cheese. Garnish with fresh cilantro if desired.","subs":[]}]}],"stub":false,"source":null},{"id":"chicken-noodle-soup","title":"Chicken Noodle Soup","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 whole chicken (or 1 pkg chicken thighs & breasts)","subs":[]},{"t":"b","text":"Water to cover chicken","subs":[]},{"t":"b","text":"Basil (for flavor)","subs":[]},{"t":"b","text":"1 peeled carrot","subs":[]},{"t":"b","text":"1 stalk celery with top leaves","subs":[]},{"t":"b","text":"1 onion","subs":[]},{"t":"b","text":"2-3 chicken bouillon cubes","subs":[]},{"t":"b","text":"4-6 potatoes, cubed (partially cooked)","subs":[]},{"t":"b","text":"6-8 carrots, sliced (partially cooked, reserve cooking liquid)","subs":[]},{"t":"b","text":"4 stalks celery, finely chopped","subs":[]},{"t":"b","text":"1 onion, chopped","subs":[]},{"t":"b","text":"Olive oil and butter (for sautéing)","subs":[]},{"t":"b","text":"Noodles (to add during the last 8 minutes of cooking)","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Cook the Chicken:** Place the whole chicken or chicken thighs and breasts in a large pot, and cover with water. Add basil, the peeled carrot, a celery stalk with leaves, the onion, and chicken bouillon cubes. Cook until the meat is tender.","subs":[]},{"t":"n","text":"**Strain the Broth:** Pour the broth through a strainer to remove flavorings, creating a clear broth. Let the chicken cool, then remove meat from the bones and set aside.","subs":[]},{"t":"n","text":"**Prepare Vegetables:** Partially cook the cubed potatoes and sliced carrots in separate water, then reserve the liquid from the carrots.","subs":[]},{"t":"n","text":"**Sauté Vegetables:** In a separate skillet, heat a combination of olive oil and butter. Sauté the finely chopped celery and chopped onion until softened.","subs":[]},{"t":"n","text":"**Combine Ingredients:** Add the shredded chicken, sautéed vegetables, and partially cooked potatoes and carrots to the strained broth. Cook until the vegetables are just barely tender.","subs":[]},{"t":"n","text":"**Add Noodles:** During the last 8 minutes of cooking, add the noodles to the soup. Continue to cook until the noodles are tender.","subs":[]}]}],"stub":false,"source":null},{"id":"chicken-veggie-ramen","title":"Chicken Veggie Ramen","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 tbsp olive oil","subs":[]},{"t":"b","text":"½ onion, chopped","subs":[]},{"t":"b","text":"4 oz shiitake mushrooms, sliced","subs":[]},{"t":"b","text":"4 garlic cloves, minced","subs":[]},{"t":"b","text":"1 tbsp ginger, minced","subs":[]},{"t":"b","text":"16 oz chicken breast","subs":[]},{"t":"b","text":"1 c water","subs":[]},{"t":"b","text":"3 c chicken bone broth","subs":[]},{"t":"b","text":"1½ chicken bouillon cubes","subs":[]},{"t":"b","text":"1 tbsp chili garlic sauce","subs":[]},{"t":"b","text":"2 tbsp oyster sauce","subs":[]},{"t":"b","text":"1 tbsp fish sauce","subs":[]},{"t":"b","text":"½ c coconut aminos or low-sodium soy sauce","subs":[]},{"t":"b","text":"¼ c rice vinegar","subs":[]},{"t":"b","text":"2 squares brown rice ramen noodles","subs":[]},{"t":"b","text":"3 bundles baby bok choy","subs":[]},{"t":"b","text":"2 soft-boiled eggs","subs":[]},{"t":"b","text":"¼ c green onions, chopped","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Heat the olive oil in a large stockpot (cast iron is great). Sauté the onion 3–4 minutes, then add the mushrooms, garlic, and ginger and sauté another 3–4 minutes. Add the chicken breasts and sear 2–3 minutes per side.","subs":[]},{"t":"n","text":"Add the water, bone broth, bouillon, chili garlic sauce, oyster sauce, fish sauce, coconut aminos, and rice vinegar. Bring to a soft boil, cover, and boil 18–20 minutes.","subs":[]},{"t":"n","text":"In a separate pot, cook the ramen noodles according to the package instructions.","subs":[]},{"t":"n","text":"Reduce the heat to medium-low. Remove the chicken, shred it, and return it to the broth. Add the bok choy and simmer 6–8 minutes. Remove from heat.","subs":[]},{"t":"n","text":"In each bowl, serve ¼ of the noodles, 1½ c broth, half a soft-boiled egg, and 1 tbsp green onions.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"10 min","total":"40 min","calories":"413","macros":"25c/13f/49p"},"sourceLabel":"Mamele Macro Meals · Dec '23"},{"id":"chili-lime-cod","title":"Chili Lime Cod","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Fish:**","subs":[]},{"t":"b","text":"4 6-oz cod filets","subs":[]},{"t":"b","text":"2 tbsp olive oil","subs":[]},{"t":"b","text":"1 tsp lime zest","subs":[]},{"t":"b","text":"1 lime, juiced","subs":[]},{"t":"b","text":"1 garlic clove, minced","subs":[]},{"t":"b","text":"2 tsp chili powder, 1 tsp paprika, 1 tsp oregano, ½ tsp salt and pepper","subs":[]},{"t":"b","text":"**Sides:**","subs":[]},{"t":"b","text":"1 c rice","subs":[]},{"t":"b","text":"16 oz asparagus, trimmed","subs":[]},{"t":"b","text":"1 tbsp olive oil","subs":[]},{"t":"b","text":"2 tsp chili powder, ½ tsp salt and pepper","subs":[]},{"t":"b","text":"Lime wedges","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"In a large mixing bowl or gallon-size zip-top bag, combine all the fish ingredients. Marinate for at least an hour or up to overnight.","subs":[]},{"t":"n","text":"Preheat the oven to 400°F. Line two baking sheets with foil or parchment paper.","subs":[]},{"t":"n","text":"Make the rice according to the package instructions.","subs":[]},{"t":"n","text":"Place the asparagus on one baking sheet, drizzle with olive oil, and season with the chili powder, salt, and pepper. Roast 25–30 minutes.","subs":[]},{"t":"n","text":"Place the fish on the other baking sheet and bake 22–25 minutes, until the internal temperature reaches 145°F.","subs":[]},{"t":"n","text":"Each serving is 6 oz cod with lime wedges, ½ c rice, and 4 oz asparagus.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4","active":"5 min","total":"1 hr","calories":"351","macros":"24c/11f/39p"},"sourceLabel":"Mamele Macro Meals · Dec '23"},{"id":"chili-lime-junkyard-fries","title":"Chili-Lime Junkyard Fries","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Chili-Lime Chicken:**","subs":[]},{"t":"b","text":"9 oz. raw chicken breast","subs":[]},{"t":"b","text":"½ cup yellow onions, chopped","subs":[]},{"t":"b","text":"**Marinade:**","subs":[]},{"t":"b","text":"1 Tbs. olive oil","subs":[]},{"t":"b","text":"1 lime, juice & zest of","subs":[]},{"t":"b","text":"½ tsp. coconut sugar","subs":[]},{"t":"b","text":"½ tsp. chili powder","subs":[]},{"t":"b","text":"¼ tsp. cumin","subs":[]},{"t":"b","text":"¼ tsp. paprika","subs":[]},{"t":"b","text":"¼ tsp. garlic powder","subs":[]},{"t":"b","text":"¼ tsp. sea salt","subs":[]},{"t":"b","text":"Dash black pepper","subs":[]},{"t":"b","text":"**Junkyard Fries:**","subs":[]},{"t":"b","text":"19 oz. raw sweet potatoes","subs":[]},{"t":"b","text":"¾ cup shredded mozzarella cheese","subs":[]},{"t":"b","text":"2 slices turkey bacon","subs":[]},{"t":"b","text":"1 jalapeno, chopped (optional)","subs":[]},{"t":"b","text":"Chives, for garnish","subs":[]},{"t":"b","text":"**Fry Sauce per serving:**","subs":[]},{"t":"b","text":"1 Tbs. olive oil mayo","subs":[]},{"t":"b","text":"½ Tbs. ketchup","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Add chicken and onions to a crockpot. Combine all marinade ingredients together in a bowl and then pour over the chicken and onions. Cook on low for 4 hours.","subs":[]},{"t":"n","text":"Preheat oven to 425 degrees. Slice sweet potatoes into fries. Spread fries out in a single layer onto a baking sheet lined with parchment paper. Spray tops with cooking spray and sprinkle with sea salt. Bake for 20 minutes. Flip and return to the oven to bake for another 15 minutes. Remove from the oven.","subs":[]},{"t":"n","text":"Chop bacon and cook in a greased frying pan over medium/high heat. Cook until crispy. Remove from heat and set aside.","subs":[]},{"t":"n","text":"Top sweet potato fries with Chili-Lime Chicken and cheese. Return to the oven and cook 5 minutes until the cheese is melted. Split into 4 equal portions and top each serving with ½ slice bacon crumbles, jalapenos, fry sauce and chives. Enjoy warm with a fork. PB","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"350","macros":"34c/12.5f/25p"},"sourceLabel":"Clean Simple Eats · Summer '18"},{"id":"cincinnati-style-chili","title":"Cincinnati Style Chili","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"10 oz. raw lean ground beef","subs":[]},{"t":"b","text":"2 cups kidney beans, drained and rinsed","subs":[]},{"t":"b","text":"¼ cup yellow onions","subs":[]},{"t":"b","text":"½ cup tomato sauce","subs":[]},{"t":"b","text":"2 Tbs. water","subs":[]},{"t":"b","text":"½ Tbs. white wine vinegar","subs":[]},{"t":"b","text":"½ tsp. Worcestershire sauce","subs":[]},{"t":"b","text":"1 tsp. fresh minced garlic","subs":[]},{"t":"b","text":"¼ ounce of unsweetened baking chocolate","subs":[]},{"t":"b","text":"1 Tbs. chili powder","subs":[]},{"t":"b","text":"¼ tsp. sea salt","subs":[]},{"t":"b","text":"¼ tsp. ground cumin","subs":[]},{"t":"b","text":"¼ tsp. ground cinnamon","subs":[]},{"t":"b","text":"Dash of cayenne pepper","subs":[]},{"t":"b","text":"Dash of ground cloves","subs":[]},{"t":"b","text":"1 bay leaf","subs":[]},{"t":"b","text":"4 cups cooked spaghetti squash","subs":[]},{"t":"b","text":"½ cup low-fat, shredded cheddar cheese","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Place all the chili ingredients into a crockpot except for the spaghetti squash and cheese. Cook on low for 6-8 hours or on high for 3-4 hours. Weigh the chili and divide by four.","subs":[]},{"t":"n","text":"Cook the spaghetti squash according to the directions in the Food Prep Guide. Rake the cooked spaghetti squash into a bowl and sprinkle with salt and pepper; set aside.","subs":[]},{"t":"n","text":"Serve by placing one serving of chili over 1 cup of spaghetti squash. Top each portion with two tablespoons of cheddar cheese.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"345","macros":"33c/12f/26p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"cowboy-stew","title":"Cowboy Stew","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"Spray oil","subs":[]},{"t":"b","text":"1 small yellow onion, chopped","subs":[]},{"t":"b","text":"1 lb 95% lean ground beef","subs":[]},{"t":"b","text":"2 garlic cloves, minced","subs":[]},{"t":"b","text":"1 andouille turkey sausage (Jennie-O brand), sliced","subs":[]},{"t":"b","text":"2 14.5-oz cans diced tomatoes","subs":[]},{"t":"b","text":"1 4-oz can green chilies","subs":[]},{"t":"b","text":"1 large russet potato (450 g), peeled and chopped","subs":[]},{"t":"b","text":"1 can pinto beans, drained and rinsed","subs":[]},{"t":"b","text":"1 10-oz package frozen mixed vegetables","subs":[]},{"t":"b","text":"2 tsp dried parsley, 1 tbsp cumin, 2 tsp chili powder, salt and pepper to taste","subs":[]},{"t":"b","text":"4 c chicken bone broth","subs":[]},{"t":"b","text":"1 chicken bouillon cube","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Spray a large stockpot (cast iron is great) with oil and heat over medium. Sauté the onion 2–3 minutes. Add the ground beef and cook 6–8 minutes, until cooked through; drain any extra liquid.","subs":[]},{"t":"n","text":"Add the garlic, sausage, tomatoes, chilies, potatoes, pinto beans, and frozen veggies. Season with the parsley, cumin, chili powder, salt, and pepper.","subs":[]},{"t":"n","text":"Add the broth and bouillon. Bring to a boil, stirring until the bouillon dissolves. Turn the heat to medium-low, cover, and simmer 35–45 minutes.","subs":[]},{"t":"n","text":"Split into 6 servings and serve.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"6","active":"10 min","total":"55 min","calories":"399","macros":"32c/11f/43p"},"sourceLabel":"Mamele Macro Meals · Dec '23"},{"id":"cream-of-broccoli-soup","title":"Cream of Broccoli Soup","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"1 lb broccoli, stems cut into ¼-inch thick pieces, florets sectioned (about 6 cups)","subs":[]},{"t":"b","text":"1 quart lightly salted water","subs":[]},{"t":"b","text":"2 tsp olive oil","subs":[]},{"t":"b","text":"1 onion, chopped","subs":[]},{"t":"b","text":"1 clove garlic, crushed","subs":[]},{"t":"b","text":"¼ cup flour","subs":[]},{"t":"b","text":"3 cups chicken broth, reduced to 1½ cups","subs":[]},{"t":"b","text":"2½ cups extra light 1% milk, divided","subs":[]},{"t":"b","text":"1 tsp dried tarragon","subs":[]},{"t":"b","text":"1 tsp dried oregano","subs":[]},{"t":"b","text":"1 tsp dried thyme","subs":[]},{"t":"b","text":"2 tsp lemon juice","subs":[]},{"t":"b","text":"Salt & pepper, to taste","subs":[]},{"t":"b","text":"Grated cheddar cheese, to taste","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Bring 1 quart of lightly salted water to a boil. Add the broccoli and cook until tender, about 7-10 minutes. Drain and set aside.","subs":[]},{"t":"n","text":"In a large non-stick skillet, heat the olive oil over medium heat. Add the onion and cook until soft, about 3-5 minutes. Stir in the garlic and flour, mixing well.","subs":[]},{"t":"n","text":"Pour in the reduced chicken broth and 1 cup of milk. Add the tarragon, oregano, and thyme, and continue stirring over heat until the mixture thickens slightly, about 2 minutes.","subs":[]},{"t":"n","text":"Transfer the mixture and cooked broccoli to a blender or food processor. Blend until smooth.","subs":[]},{"t":"n","text":"Return e butter to a large frying pan over low heat. Once melted, stir in the Kodiak Cakes. Add one cup of broth from the soup to the pan, then slowly whisk it in alond with the coconut milk. Bring to a boil; stirring constantly. Remove from heat and add to the pot of soup once the noodles are done.","subs":[]},{"t":"n","text":"Add the shredded chicken last and simmer until the chicken is warm. Squeeze lemon juice over the soup and it is ready to serve! Garnish each bowl with fresh parsley. Weigh the entire soup and divide the weight by four to get the amount needed for one serving.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"350","macros":"33c/12f/27p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"creamy-chicken-vegetable-soup","title":"Creamy Chicken Vegetable Soup","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"2½ lbs potatoes, diced","subs":[]},{"t":"b","text":"2-3 chicken breasts","subs":[]},{"t":"b","text":"1 lb baby carrots, cut into equal-sized pieces","subs":[]},{"t":"b","text":"4-5 cups water","subs":[]},{"t":"b","text":"5 teaspoons or cubes chicken bouillon","subs":[]},{"t":"b","text":"½ to 1 package frozen peas","subs":[]},{"t":"b","text":"Salt & pepper, to taste","subs":[]},{"t":"b","text":"Dried onion flakes, to taste","subs":[]}]},{"label":"Roux","items":[{"t":"b","text":"¼ to ½ cup margarine, melted","subs":[]},{"t":"b","text":"¼ to ½ cup flour","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"Boil the chicken breasts in water for 1 to 1½ hours until fully cooked. Remove from water, let cool, and then cut into cubes.","subs":[]},{"t":"n","text":"In a separate pot, add the diced potatoes and baby carrots. Boil until tender, then drain.","subs":[]},{"t":"n","text":"In a large saucepan, bring 4-5 cups of water to a rapid boil. Add the chicken bouillon, salt, pepper, and a sprinkle of dried onion flakes. Stir well.","subs": e clams. Bring the chowder back to a boil, then reduce heat and cook for an additional 1 to 2 minutes.","subs":[]},{"t":"n","text":"**Serve:** Ladle the chowder into bowls, and sprinkle each serving with the crumbled bacon.","subs":[]}]}],"stub":false,"source":null},{"id":"roasted-cauliflower-soup","title":"Roasted Cauliflower Soup","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"4 slices Homemade Honey-Wheat Bread","subs":[]},{"t":"b","text":"(See Food Prep Guide)","subs":[]},{"t":"b","text":"4 cups cauliflower florets","subs":[]},{"t":"b","text":"½ cup chopped yellow onion","subs":[]},{"t":"b","text":"½ tsp. fresh, minced garlic","subs":[]},{"t":"b","text":"1 Tbs. olive oil","subs":[]},{"t":"b","text":"2 cups chicken broth","subs":[]},{"t":"b","text":"cup low-fat, shredded mozzarella cheese","subs":[]},{"t":"b","text":"2/3","subs":[]},{"t":"b","text":"2/3 cup nonfat, plain Greek yogurt","subs":[]},{"t":"b","text":"Sea salt and pepper, to taste","subs":[]},{"t":"b","text":"4 slices chopped turkey bacon","subs":[]},{"t":"b","text":"Chives, for garnish","subs":[]}]},{"label":"Directions","items":[{"t":"n","text":"Make the Homemade, Honey-Wheat Bread in advance.","subs":[]},{"t":"n","text":"Preheat oven to 400 degrees.","subs":[]},{"t":"n","text":"Add the cauliflower florets, onion, garlic and olive oil to a large Ziploc bag. Massage until well coated. Spread out onto a baking sheet lined with parchment paper and roast for 20 minutes.","subs":[]},{"t":"n","text":"Spray a frying pan and place over medium heat. Add chopped bacon to the pan and cook until crispy. Remove from pan and set aside.","subs":[]},{"t":"n","text":"Add roasted cauliflower and onions, chicken broth, mozzarella cheese, Greek yogurt, salt and pepper to a blender. Blend on high until smooth. Weigh the soup and divide the weight by four to get the amount needed for one serving.","subs":[]},{"t":"n","text":"Top each serving of soup with one slice crumbled bacon and chives. Enjoy with homemade bread on the side.","subs":[]}]}],"stub":false,"source":null,"meta":{"serves":"4 servings","calories":"340","macros":"37c/10f/25p","per":"serving"},"sourceLabel":"Clean Simple Eats · Winter '19"},{"id":"taco-soup","title":"Taco Soup","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"2 cans vegetable soup","subs":[]},{"t":"b","text":"1 quart whole tomatoes","subs":[]},{"t":"b","text":"1 can tomato soup","subs":[]},{"t":"b","text":"1 lb hamburger, fried with onions","subs":[]},{"t":"b","text":"2 cans kidney beans","subs":[]},{"t":"b","text":"1 tablespoon taco seasoning mix","subs":[]},{"t":"b","text":"1 bottle salsa","subs":[]}]},{"label":"Instructions","items":[{"t":"n","text":"**Cook the Hamburger:** In a skillet, fry the hamburger with onions until the meat is browned and the onions are tender. Drain any excess fat.","subs":[]},{"t":"n","text":"**Combine Ingredients:** In a large pot, mix together the vegetable soup, whole tomatoes (with juice), tomato soup, cooked hamburger and onions, kidney beans, taco seasoning mix, and salsa.","subs":[]},{"t":"n","text":"**Simmer:** Bring the mixture to a simmer over medium heat, stirring occasionally. Allow it to simmer until heated through and flavors are well combined.","subs":[]}]}],"stub":false,"source":null},{"id":"thai-red-curry-coconut-soup","title":"Thai Red Curry Coconut Soup","category":"Soups & Stews","subcategory":null,"sections":[{"label":"Ingredients","items":[{"t":"b","text":"**Meatballs:**","subs":[]},{"t":"b","text":"1 lb 99% lean ground turkey","subs":[]},{"t":"b","text":"¼ c green onions, chopped","subs":[]},{"t":"b","text":"3 garlic cloves, minced","subs":[]},{"t":"b","text":"¼ c panko breadcrumbs","subs":[]},{"t":"b","text":"½ tsp salt and pepper, ½ tsp dried basil","subs":[]},{"t":"b","text":"½ tbsp olive oil","subs":[]},{"t":"b","text":"**Soup:**","subs":[]},{"t":"b","text":"1 tbsp olive oil","subs" R.forEach(r=>{

      (it.subs||[]).forEach(x=>{hay.push(x.text); if(x.t==="b") ing++; if(x.t==="n") steps++;});

  });
  r._ing=ing; r._steps=steps;
  if(r.sourceLabel) hay.push(r.sourceLabel);
  r._hay=hay.join(" ").toLowerCase();
});

/* ============ tiny helpers ============ */
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
function inline(s){
  let t = esc(s);
  t = t.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  t = t.replace(/(^|[\s(])((https?:\/\/)[^\s<)]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  t = t.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  t = t.replace(/\*([^*]+)\*/g,"<em>$1</em>");

}

/* ============ usage tracking (stored on this device only) ============ */
const LS_KEY = "rb_views";
function loadViews(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }catch(e){ return {}; } }
function bumpView(id){
  try{
    const v = loadViews();
    v[id] = (v[id]||0) + 1;
    localStorage.setItem(LS_KEY, JSON.stringify(v));
  }catch(e){}

function topRecipes(n){
  const v = loadViews();
  return Object.entries(v)
    .filter(([id,c]) => byId[id] && !byId[id].stub && c >= 2)
    .sort((a,b) => b[1]-a[1])

function dailyPicks(n){

  const arr = pool.slice();
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(rand() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.slice(0, n);
}

/* ============ views ============ */
const app = document.getElementById("app");

function tagHTML(r){
  const c = catByKey[r.category];
  return `<span class="tag" style="background:${c?c.color:"var(--paper-deep)"}">${esc(c?c.name:r.category)}</span>`;
}
function cardHTML(r){
  if(r.stub){
    return `<a class="rcard stub" href="#/recipe/${r.id}">
      ${tagHTML(r)}<h3>${esc(r.title)}</h3>
      <div class="penciled">recipe coming soon…</div></a>`;
  }
  const bits=[];
  if(r._ing) bits.push(r._ing+" ingredients");
  if(r._steps) bits.push(r._steps+" steps");
  return `<a class="rcard" href="#/recipe/${r.id}">
    ${tagHTML(r)}<h3>${esc(r.title)}</h3>
    <div class="meta">${bits.join(" · ")||"&nbsp;"}</div>
    ${r.sourceLabel?`<div class="src-badge">${esc(r.sourceLabel)}</div>`:""}</a>`;
}

function homeView(){
  const tiles = CATS.map(c=>{
    const rs = R.filter(r=>r.category===c.key);
    const sample = rs.slice().sort(()=>0)
      .slice(0,3).map(r=>r.title).join(" · ");
    return `<a class="cat-tile" href="#/category/${c.slug}">
      <div class="band" style="background:${c.color}">
        <span class="sticker">${esc(c.note)}</span>
      </div>
      <div class="body">
        <h3>${esc(c.name)}</h3>
        <div class="sample">${rs.length} recipes — ${esc(sample)}…</div>
      </div></a>`;
  }).join("");
  const top = topRecipes(8);
  const hasHistory = top.length >= 4;
  let picks = hasHistory ? top : dailyPicks(8);
  if(hasHistory && picks.length < 8){
    const ids = new Set(picks.map(r=>r.id));
    picks = picks.concat(dailyPicks(16).filter(r=>!ids.has(r.id)).slice(0, 8-picks.length));
  }
  const favs = picks.map(cardHTML).join("");
  const favTitle = hasHistory ? "Your kitchen regulars" : "Pulled from the box today";
  const favScript = hasHistory ? "the ones you keep coming back to" : "a fresh handful every day";
  app.innerHTML = `
  <section class="hero">
    <div class="hero-fruit f1">${orangeSVG(150)}</div>
    <div class="hero-fruit f2">${lemonSVG(150)}</div>
    <div class="hero-fruit f3">${melonSVG(92)}</div>
    <div class="hero-fruit f4">${sprigSVG(72)}</div>
    <div class="wrap hero-inner">
      <span class="script">a pinch of this, a pinch of that</span>
      <h1>The Family<br><span class="accent">Recipe Box</span></h1>
      <p class="sub">My side, your side — and everyone who married in. Every recipe worth passing down, gathered in one place: the Sunday roasts, the holiday wassail, and all the cream-of-something casseroles in between.</p>
      <div class="count-line">${R.length} recipes &amp; counting</div>
      <nav class="chiprow">${CATS.map(c=>`<a class="chip" href="#/category/${c.slug}"><span class="dot" style="background:${c.color}"></span>${esc(c.name)}</a>`).join("")}</nav>
    </div>
  </section>
  <div class="tile-band"></div>
  <section class="section"><div class="wrap">
    <div class="section-head"><h2>Browse the shelves</h2><span class="script">where do we start?</span></div>
    <div class="cat-grid">${tiles}</div>
  </div></section>
  <section class="section" style="padding-top:8px"><div class="wrap">
    <div class="section-head"><h2>${favTitle}</h2><span class="script">${favScript}</span></div>
    <div class="card-grid">${favs}</div>
  </div></section>`;
  document.title = "The Family Recipe Box";
}

function categoryView(slug, subslug){
  const c = catBySlug[slug];
  if(!c) return homeView();
  const rs = R.filter(r=>r.category===c.key);
  /* group by subcategory, preserving original order */
  const groups=[]; const gmap={};
  rs.forEach(r=>{
    const k = r.subcategory || "";
    if(!(k in gmap)){gmap[k]=[]; groups.push(k);}
    gmap[k].push(r);
  });
  const activeSub = subslug ? groups.find(g=>slugCat(g||"x")===subslug) : undefined;
  const showGroups = (activeSub!==undefined) ? [activeSub] : groups;
  const filterChips = groups.length>1 ? `<nav class="filterchips">
      <a class="fchip${activeSub===undefined?" on":""}" href="#/category/${c.slug}">All (${rs.length})</a>
      ${groups.map(g=>`<a class="fchip${g===activeSub?" on":""}" href="#/category/${c.slug}/${slugCat(g||"x")}">${esc((g||"Everything else").replace(/ > /g," · "))} (${gmap[g].length})</a>`).join("")}
    </nav>` : "";
  const body = filterChips + showGroups.map(g=>{
    const label = g ? g.replace(/ > /g," · ") : "Everything else";
    const inner = gmap[g].map(cardHTML).join("");
    if(showGroups.length===1 && !g) return `<div class="card-grid">${inner}</div>`;
    return `<div class="subhead"><h3>${esc(label)}</h3><div class="rule"></div><span class="n">${gmap[g].length} recipes</span></div>
      <div class="card-grid">${inner}</div>`;
  }).join("");
  app.innerHTML = `
  <section class="section"><div class="wrap">
    <div class="crumbs"><a href="#/">← All categories</a></div>
    <div class="section-head">
      <h2 style="font-size:2.3rem">${esc(c.name)}</h2>
      <span class="script">${esc(c.note)}</span>
      <div class="spacer"></div>
      <span class="n" style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--ink-soft)">${rs.length} recipes</span>
    </div>
    ${body}
  </div></section>`;
  document.title = c.name + " — The Family Recipe Box";
  window.scrollTo(0,0);
}

function sectionKind(label){
  const l = label.toLowerCase();
  if(/ingredient/.test(l)) return "ing";
  if(/direction|instruction|step/.test(l)) return "steps";
  return "other";
}
function itemHTML(it){
  if(it.t==="img") return `<img class="rc-img" src="${it.text}" alt="Handwritten reference chart">`;
  let h = inline(it.text);
  if(it.subs && it.subs.length){
    h += `<ul>${it.subs.map(s=>`<li>${inline(s.text)}</li>`).join("")}</ul>`;
  }
  return h;
}

function recipeView(id){
  const r = byId[id];
  if(!r) return homeView();
  bumpView(id);
  const c = catByKey[r.category];
  const crumb = `<div class="wrap"><div class="crumbs">
    <a href="#/">Home</a> &nbsp;›&nbsp; <a href="#/category/${c.slug}">${esc(c.name)}</a>
    ${r.subcategory?`&nbsp;›&nbsp; ${esc(r.subcategory.replace(/ > /g," · "))}`:""}
  </div>`;

  if(r.stub){
    app.innerHTML = `<section class="section">${crumb}
      <div class="stub-box">
        <div class="script">“${esc(r.title)}”</div>
        <h1 style="font-family:'Fraunces',serif;font-weight:900;font-size:1.7rem;margin-top:6px">This page is still blank.</h1>
        <p>Somebody in the family knows this one by heart. If it's you, send it in so it doesn't get lost.</p>
        ${r.source?`<p style="margin-top:10px">In the meantime: <a href="${esc(r.source)}" target="_blank" rel="noopener">original source</a></p>`:""}
        <a class="btn" href="mailto:laurelbmills@gmail.com?subject=Recipe for the cookbook: ${encodeURIComponent(r.title)}">Email it in</a>
        <p style="margin-top:12px;font-size:.9rem">or copy the address:
          <strong>laurelbmills@gmail.com</strong>
          <button class="copy-mail" data-mail="laurelbmills@gmail.com" type="button">copy</button></p>
      </div></div></section>`;
    document.title = r.title + " — The Family Recipe Box";
    window.scrollTo(0,0);
    return;
  }

  /* split sections into ingredient-side vs step-side */
  const ingSecs=[], stepSecs=[], noteSecs=[];
  let by=null;
  let mode="ing"; // sections before the first steps-labeled section w/ bullets default to ingredients
  r.sections.forEach(s=>{
    const kind = s.label ? sectionKind(s.label) : null;
    const m = s.label && /^by\s+(.+)$/i.exec(s.label.trim());
    if(m && !s.items.length){ by=m[1]; return; }
    if(kind==="steps"){ mode="steps"; stepSecs.push(s); return; }
    if(kind==="ing"){ mode="ing"; ingSecs.push(s); return; }
    /* unlabeled or other-labeled: follow current side by content */
    const hasNum = s.items.some(i=>i.t==="n");
    const hasBul = s.items.some(i=>i.t==="b");
    if(hasNum && !hasBul){ stepSecs.push(s); mode="steps"; }
    else if(hasBul && !hasNum){ (mode==="steps"?stepSecs:ingSecs).push(s); }
    else if(!s.items.length && s.label){ (mode==="steps"?stepSecs:ingSecs).push(s); }
    else if(s.items.length){ (mode==="steps"?stepSecs:noteSecs).push(s); }
  });

  function renderSide(secs, isSteps){
    return secs.map(s=>{
      let h = "";
      if(s.label && !/^(ingredients?|directions?|instructions?)$/i.test(s.label))
        h += `<span class="rc-sub">${inline(s.label)}</span>`;
      const bullets = s.items.filter(i=>i.t==="b");
      const nums = s.items.filter(i=>i.t==="n");
      const paras = s.items.filter(i=>i.t==="p"||i.t==="img");
      if(paras.length) h += paras.map(p=>`<p style="margin:6px 0;font-size:.93rem;color:var(--ink-soft)">${itemHTML(p)}</p>`).join("");
      if(bullets.length && !isSteps) h += `<ul class="ing">${bullets.map(b=>`<li tabindex="0">${itemHTML(b)}</li>`).join("")}</ul>`;
      if(bullets.length && isSteps) h += `<ul class="ing">${bullets.map(b=>`<li tabindex="0">${itemHTML(b)}</li>`).join("")}</ul>`;
      if(nums.length) h += `<ol class="steps">${nums.map(n=>`<li>${itemHTML(n)}</li>`).join("")}</ol>`;
      return h;
    }).join("");
  }
  const notes = noteSecs.length
    ? `<div class="rc-note">${noteSecs.map(s=>s.items.map(i=>`<div>${itemHTML(i)}</div>`).join("")).join("")}</div>` : "";

  app.innerHTML = `<section class="section">${crumb}
    <article class="recipe-card">
      <div class="rc-head">
        <span class="eyebrow">straight from the recipe box</span>
        <h1>${esc(r.title)}</h1>
        ${by?`<div class="byline">by ${esc(by)}</div>`:""}
        <div class="chips">${tagHTML(r)}${r.subcategory?`<span class="tag" style="background:var(--paper-deep)">${esc(r.subcategory.replace(/ > /g," · "))}</span>`:""}${r.sourceLabel?`<span class="tag src">${esc(r.sourceLabel)}</span>`:""}</div>
        ${r.meta && Object.keys(r.meta).length?`<div class="metastrip">${[
          r.meta.serves?`<span><b>Serves</b> ${esc(r.meta.serves)}</span>`:"",
          r.meta.active?`<span><b>Active</b> ${esc(r.meta.active)}</span>`:"",
          r.meta.total?`<span><b>Total</b> ${esc(r.meta.total)}</span>`:"",
          r.meta.calories?`<span><b>Calories</b> ${esc(r.meta.calories)}${r.meta.per?` per ${esc(r.meta.per)}`:""}</span>`:"",
          r.meta.macros?`<span><b>Macros</b> ${esc(r.meta.macros)}</span>`:""
        ].filter(Boolean).join("")}</div>`:""}
        <div class="rc-actions">
          <button onclick="window.print()">Print</button>
          <button id="sharebtn">Copy link</button>
        </div>
      </div>
      <div class="rc-body">
        <div class="rc-ing">
          <span class="rc-label">Ingredients</span>
          ${renderSide(ingSecs,false) || '<p style="color:var(--ink-soft);font-size:.92rem">See directions →</p>'}
        </div>
        <div class="rc-steps">
          <span class="rc-label">Directions</span>
          ${renderSide(stepSecs,true)}
          ${notes}
        </div>
      </div>
    </article>
  </div></section>`;
  document.title = r.title + " — The Family Recipe Box";
  window.scrollTo(0,0);

  /* tap to cross off ingredients */
  app.querySelectorAll("ul.ing li").forEach(li=>{
    const toggle=()=>li.classList.toggle("done");
    li.addEventListener("click",e=>{if(e.target.tagName!=="A")toggle();});
    li.addEventListener("keydown",e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();toggle();}});
  });
  const sb=document.getElementById("sharebtn");
  if(sb) sb.addEventListener("click",()=>{
    navigator.clipboard.writeText(location.href).then(()=>{sb.textContent="Copied!";setTimeout(()=>sb.textContent="Copy link",1500);});
  });
}

function searchView(q){
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  const hits = terms.length ? R.filter(r=>terms.every(t=>r._hay.includes(t))) : [];
  app.innerHTML = `<section class="section"><div class="wrap">
    <div class="crumbs"><a href="#/">← Back to the cookbook</a></div>
    <div class="section-head"><h2>Search</h2>
      <span class="script">looking for “${esc(q)}”</span>
      <div class="spacer"></div>
      <span style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--ink-soft)">${hits.length} found</span>
    </div>
    ${hits.length
      ? `<div class="card-grid">${hits.map(cardHTML).join("")}</div>`
      : `<div class="empty-note"><span class="script">nothing in the recipe box yet…</span>
         Try a different ingredient or dish name — or browse a category from the home page.</div>`}
  </div></section>`;
  document.title = `“${q}” — The Family Recipe Box`;
}

/* ============ router ============ */
function route(){
  const h = location.hash || "#/";
  let m;
  if((m=h.match(/^#\/recipe\/(.+)$/))) return recipeView(decodeURIComponent(m[1]));
  if((m=h.match(/^#\/category\/([^\/]+)(?:\/(.+))?$/))) return categoryView(decodeURIComponent(m[1]), m[2]?decodeURIComponent(m[2]):undefined);
  if((m=h.match(/^#\/search\/(.*)$/))) return searchView(decodeURIComponent(m[1]));
  return homeView();
}
function wireCopyMail(){
  document.querySelectorAll(".copy-mail").forEach(b=>{
    if(b._wired) return; b._wired = true;
    b.addEventListener("click",()=>{
      navigator.clipboard.writeText(b.dataset.mail).then(()=>{
        b.textContent="copied!"; setTimeout(()=>b.textContent="copy",1500);
      });
    });
  });
}
window.addEventListener("hashchange",()=>{route();wireCopyMail();});
route();
wireCopyMail();

/* search box */
const box = document.getElementById("searchbox");
let deb;
box.addEventListener("input",()=>{
  clearTimeout(deb);
  deb = setTimeout(()=>{
    const q = box.value.trim();
    if(q) location.hash = "#/search/"+encodeURIComponent(q);
    else if(location.hash.startsWith("#/search/")) location.hash = "#/";
  },220);
});
box.addEventListener("keydown",e=>{
  if(e.key==="Enter"){const q=box.value.trim(); if(q) location.hash="#/search/"+encodeURIComponent(q);}
});
</script>
